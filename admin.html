<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --bg: #F0F2F5; --accent: #16A34A; --red: #8B0000; --blue: #007AFF; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); padding: 25px; margin: 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { margin: 0; font-weight: 800; font-size: 28px; }
        .revenue-box { text-align: right; background: #fff; padding: 10px 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .card { background: #fff; border-radius: 40px; padding: 35px; border: 1px solid #E0E0E0; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .card-time { position: absolute; top: 35px; right: 35px; color: #BBB; font-size: 14px; font-weight: 500; }
        
        .order-item { border-bottom: 1px solid #F0F0F0; padding: 12px 0; }
        .order-item:last-child { border-bottom: none; }
        
        .status-row { display: flex; gap: 8px; margin: 25px 0; }
        .s-btn { flex: 1; padding: 14px; font-size: 13px; border: none; border-radius: 15px; cursor: pointer; font-weight: 700; font-family: 'Prompt'; transition: 0.2s; }
        .s-btn:active { transform: translateY(2px); }

        .btn-qr { width: 100%; background: #000; color: #fff; padding: 20px; border-radius: 20px; font-weight: 700; margin-top: 25px; border: none; cursor: pointer; font-size: 16px; }
        .btn-cash { width: 100%; background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 20px; border-radius: 20px; font-weight: 700; margin-top: 10px; cursor: pointer; font-size: 16px; }
        
        .alert-bar { background: var(--red); color: #fff; padding: 18px; border-radius: 20px; text-align: center; margin-bottom: 25px; cursor: pointer; font-weight: 700; box-shadow: 0 10px 30px rgba(139,0,0,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="staff-alert" class="alert-bar" onclick="clearCallAlert()" style="display:none;">โต๊ะ <span id="alert-table"></span> เรียกพนักงาน (คลิกเพื่อปิด)</div>
    
    <div class="header">
        <h1>WITHU ADMIN</h1>
        <div class="revenue-box">รายได้วันนี้: <b id="revenue" style="color:var(--accent); font-size:24px;">฿0</b></div>
    </div>
    
    <div style="margin-bottom: 30px;">
        <button onclick="showSec('orders')" style="padding:12px 30px; background:#000; color:#fff; border:none; border-radius:15px; cursor:pointer; font-weight:700;">รายการออเดอร์</button>
        <button onclick="showSec('stock')" style="padding:12px 30px; background:var(--red); color:#fff; border:none; border-radius:15px; cursor:pointer; font-weight:700; margin-left:10px;">คลังสินค้า</button>
    </div>

    <div id="container" class="grid"></div>
    <div id="stock-sec" style="display:none;" class="grid"></div>

    <div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;z-index:1000;align-items:center;justify-content:center;" onclick="this.style.display='none'"><div class="modal-box" style="background:#fff;padding:40px;border-radius:50px;text-align:center;max-width:400px;width:90%;" onclick="event.stopPropagation()"><h3 id="m-table" style="margin-top:0; font-size:24px;"></h3><img id="m-qr" style="width:100%; margin: 20px 0; border: 1px solid #eee; border-radius: 20px;"><div id="m-total" style="font-size:40px;font-weight:800;"></div><button class="btn-qr" style="background:var(--accent);" id="m-confirm">ได้รับเงินแล้ว</button></div></div>

    <script>
        const API_URL = "ใส่_API_URL_ของคุณ";
        let cAlertT = "";

        async function refresh() {
            try {
                const r = await fetch(API_URL + "?action=getAdminData"); const d = await r.json();
                document.getElementById('revenue').innerText = "฿" + d.summary.revenue.toLocaleString();
                if(d.calls.length > 0) { cAlertT = d.calls[0][1]; document.getElementById('staff-alert').style.display = 'block'; document.getElementById('alert-table').innerText = cAlertT; }
                else { document.getElementById('staff-alert').style.display = 'none'; }

                const c = document.getElementById('container'); if(!d.orders.length){ c.innerHTML = "<div style='padding:50px; color:#999;'>ไม่มีออเดอร์ในขณะนี้</div>"; return; }
                let groups = {}; d.orders.forEach(o => { if(!groups[o.table]) groups[o.table] = { items:[], total:0, rows:[], time:o.time }; groups[o.table].items.push(o); groups[o.table].total += parseFloat(o.total.replace(/,/g,'')); groups[o.table].rows.push(o.rowNum); });
                
                c.innerHTML = Object.keys(groups).map(t => `
                    <div class="card">
                        <div class="card-time">${groups[t].time}</div>
                        <h2 style="margin:0 0 25px 0; font-weight:800; font-size:24px;">โต๊ะ ${t}</h2>
                        ${groups[t].items.map(i => `<div class="order-item"><div><b>${i.qty}x ${i.menu}</b> <span style="float:right">฿${i.total}</span></div><small style="color:var(--blue); font-weight:600;">${i.details} [${i.status}]</small></div>`).join('')}
                        <div class="status-row">
                            <button class="s-btn" style="background:#FFF9C4; color:#856404;" onclick='upS(${JSON.stringify(groups[t].rows)},"กำลังทำ")'>กำลังทำ</button>
                            <button class="s-btn" style="background:#E8F5E9; color:#2E7D32;" onclick='upS(${JSON.stringify(groups[t].rows)},"รอเสิร์ฟ")'>พร้อมเสิร์ฟ</button>
                            <button class="s-btn" style="background:#E3F2FD; color:#1565C0;" onclick='upS(${JSON.stringify(groups[t].rows)},"สำเร็จ")'>เสิร์ฟแล้ว</button>
                        </div>
                        <div style="font-size:38px;font-weight:800;text-align:right;margin:25px 0;">฿${groups[t].total.toLocaleString()}</div>
                        <button class="btn-qr" onclick='shQR("${t}",${groups[t].total},${JSON.stringify(groups[t].rows)})'>ชำระผ่าน QR</button>
                        <button class="btn-cash" onclick='pay("${t}",${JSON.stringify(groups[t].rows)})'>ปิดโต๊ะ (เงินสด)</button>
                    </div>`).join('');
                
                let sh = d.menu.map(m => `<div class="card" style="padding:20px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; border-radius:25px;"><span>${m[0]}</span><button class="s-btn" style="flex:none; width:100px; background:${m[5]=='หมด'?'#eee':'#000'};color:${m[5]=='หมด'?'#000':'#fff'}" onclick="tgS('menu','${m[0]}','${m[5]=='หมด'?'ปกติ':'หมด'}')">${m[5]=='หมด'?'เปิด':'ปิด'}</button></div>`).join('');
                document.getElementById('stock-sec').innerHTML = `<h3 style="padding-left:10px;">จัดการสต็อกสินค้า</h3>${sh}`;
            } catch(e){}
        }

        function showSec(n) { document.getElementById('container').style.display=(n=='orders'?'grid':'none'); document.getElementById('stock-sec').style.display=(n=='stock'?'grid':'none'); }
        async function upS(r, s) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStatus',rowNums:r,nextStatus:s})}); refresh(); }
        async function tgS(type, name, status) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStock',type:type,name:name,status:status})}); refresh(); }
        function shQR(t, a, r) { document.getElementById('m-table').innerText = "โต๊ะ "+t; document.getElementById('m-total').innerText = "฿"+a.toLocaleString(); document.getElementById('m-qr').src = `https://promptpay.io/0931805507/${a}.png`; document.getElementById('m-confirm').onclick = () => { document.getElementById('modal').style.display='none'; pay(t, r); }; document.getElementById('modal').style.display = 'flex'; }
        async function pay(t, r) { if(confirm("ยืนยันปิดโต๊ะ "+t+"?")){ await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'markMultipleDone',rowNums:r})}); refresh(); }}
        async function clearCallAlert() { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'clearCall',table:cAlertT})}); refresh(); }
        setInterval(refresh, 5000); refresh();
    </script>
</body>
</html>
