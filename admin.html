<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU Admin Portal | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg: #f9fafb; --accent: #10b981; --red: #d63031; --blue: #2563eb; --navy: #0f172a; --text-main: #1f2937; --shadow: 0 10px 25px rgba(0,0,0,0.05); }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; flex-wrap: wrap; gap: 20px; }
        .stat-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-card { background: #fff; padding: 15px 25px; border-radius: 20px; box-shadow: var(--shadow); text-align: right; border: 1px solid #f3f4f6; min-width: 120px; }
        .stat-card small { display: block; color: #64748b; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .stat-card b { font-size: 22px; }

        .nav-group { margin-bottom: 30px; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .nav-btn { padding: 12px 28px; border: none; border-radius: 15px; font-family: 'Prompt'; font-weight: 600; cursor: pointer; transition: 0.3s; background: #fff; color: #64748b; border: 1px solid #e2e8f0; white-space: nowrap; }
        .nav-btn.active { background: var(--navy) !important; color: #fff !important; border-color: var(--navy); box-shadow: 0 10px 20px rgba(15,23,42,0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .card { background: #fff; border-radius: 40px; padding: 35px; box-shadow: var(--shadow); border: 1px solid rgba(229,231,235,0.5); position: relative; transition: 0.3s; }
        .card-time-box { position: absolute; top: 35px; right: 35px; text-align: right; }
        .time-elapsed { font-size: 18px; font-weight: 800; color: var(--navy); }
        .time-warning { color: var(--red); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .order-item { border-bottom: 1px solid #f1f5f9; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .order-item b { font-size: 18px; color: var(--navy); }
        .btn-void { background: #fff1f0; color: var(--red); border: none; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }

        .status-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 25px 0; }
        .s-btn { padding: 10px; font-size: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-family: 'Prompt'; }
        
        .btn-cds { width: 100%; background: var(--blue); color: #fff; padding: 14px; border-radius: 18px; font-weight: 700; border: none; cursor: pointer; margin-bottom: 10px; font-size: 15px; transition: 0.2s; }
        .btn-cds:active { transform: scale(0.96); }

        .btn-qr { width: 100%; background: var(--navy); color: #fff; padding: 16px; border-radius: 18px; font-weight: 700; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-cash { width: 100%; background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 16px; border-radius: 18px; font-weight: 700; margin-top: 10px; cursor: pointer; font-size: 16px; font-family: 'Prompt'; }

        #modal, #cash-modal { position:fixed; inset:0; background:rgba(15,23,42,0.9); backdrop-filter:blur(5px); display:none; z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:#fff; padding:40px; border-radius:45px; text-align:center; max-width:400px; width:90%; }
        .cash-input { width:100%; padding:15px; border-radius:15px; border:2px solid #eee; font-size:28px; text-align:center; font-family:'Prompt'; font-weight:700; margin:20px 0; outline:none; }
        
        .alert-bar { background: var(--red); color: #fff; padding: 18px; border-radius: 20px; margin-bottom: 25px; text-align: center; cursor: pointer; font-weight: 700; box-shadow: 0 10px 25px rgba(214,48,49,0.3); }

        .chart-wrapper { background: #fff; padding: 30px; border-radius: 30px; box-shadow: var(--shadow); margin-bottom: 25px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .toggle-btn { padding: 8px 16px; border-radius: 10px; border: none; font-family: 'Prompt'; font-weight: 700; cursor: pointer; background: #f1f5f9; color: var(--text-gray); }
        .toggle-btn.active { background: var(--blue); color: #fff; }

        @keyframes bounceBtn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .sound-btn { animation: bounceBtn 2s infinite; box-shadow: 0 10px 25px rgba(15,23,42,0.4); }
    </style>
</head>
<body>

    <button id="sound-unlock" class="sound-btn" style="position:fixed; bottom:25px; right:25px; z-index:3000; background:var(--navy); color:#fff; border:none; padding:15px 30px; border-radius:50px; cursor:pointer; font-family:'Prompt'; font-size: 16px; font-weight: 700;" onclick="this.style.display='none'; unlockSound();">🔔 กดเพื่อเปิดเสียงแจ้งเตือน</button>

    <div id="staff-alert" class="alert-bar" onclick="clearCallAlert()" style="display:none;">⚠️ โต๊ะ <span id="alert-table"></span> เรียกพนักงาน (คลิกเพื่อปิด)</div>
    
    <div class="header">
        <h1>WITHU Admin</h1>
        <div class="stat-group">
            <div class="stat-card"><small>บิลวันนี้</small><b id="stat-count">0</b></div>
            <div class="stat-card"><small>PromptPay</small><b id="stat-qr" style="color:var(--blue);">฿0</b></div>
            <div class="stat-card"><small>ยอดรวมทั้งหมด</small><b id="revenue" style="color:var(--accent);">฿0</b></div>
        </div>
    </div>
    
    <div class="nav-group">
        <button id="nav-orders" onclick="showSec('orders')" class="nav-btn active">ออเดอร์ค้าง</button>
        <button id="nav-stock" onclick="showSec('stock')" class="nav-btn">จัดการสต็อก</button>
        <button id="nav-report" onclick="showSec('report')" class="nav-btn">สรุปยอดขาย</button>
    </div>

    <div id="container" class="grid"></div>
    <div id="stock-sec" style="display:none;" class="grid"></div>
    
    <div id="report-sec" style="display:none;">
        <div class="chart-wrapper">
            <div class="chart-header">
                <h2 style="margin: 0; color: var(--navy);">กราฟยอดขาย</h2>
                <div>
                    <button class="toggle-btn active" id="btn-day" onclick="switchChart('day')">รายวัน</button>
                    <button class="toggle-btn" id="btn-month" onclick="switchChart('month')">รายเดือน</button>
                </div>
            </div>
            <canvas id="salesChart" height="100"></canvas>
        </div>
        <div id="report-list"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="m-table" style="font-size:28px; margin-bottom:10px;"></h3>
            <img id="m-qr" style="width:100%; border-radius: 20px; border: 1px solid #eee;">
            <div id="m-total" style="font-size:40px; font-weight:800; margin:15px 0;"></div>
            <button class="btn-qr" style="background:var(--accent);" id="m-confirm">ยืนยันได้รับเงินแล้ว</button>
        </div>
    </div>

    <div id="cash-modal">
        <div class="modal-box">
            <h3 id="c-table" style="margin-top:0;"></h3>
            <div style="font-size:16px; color:#64748b;">ยอดชำระ: <b id="c-total" style="color:var(--navy); font-size:24px;"></b></div>
            <input type="number" id="cash-received" class="cash-input" placeholder="ระบุเงินที่รับมา" oninput="calcChange()">
            <div id="change-display" style="font-size:40px; font-weight:800; color:var(--accent); display:none; margin-bottom:20px;">ทอน: ฿0</div>
            <button id="btn-finish-cash" class="btn-qr" style="background:var(--accent); display:none;">ปิดโต๊ะและบันทึก</button>
            <button onclick="document.getElementById('cash-modal').style.display='none'" style="background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 
        
        let orderSound = null, callSound = null;
        let isSoundUnlocked = false; 

        // 🚩 โหลดไฟล์เสียงแบบมีการป้องกัน Error (Try-Catch)
        try {
            orderSound = new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_7325997672.mp3'); 
            callSound = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625624707.mp3');  
            orderSound.preload = 'auto'; callSound.preload = 'auto';
        } catch(e) {
            console.log("Audio load blocked by browser:", e);
        }
        
        let lastOrderCount = 0, lastCallCount = 0, isFirstLoad = true, cAlertT = "";
        let currentPayingTotal = 0, currentPayingRows = [], currentPayingTable = "";
        let salesChartInst = null, cDataDaily = [], cDataMonthly = [], currentChartMode = 'day';

        // 🚩 ฟังก์ชันปลดล็อกเสียง (ปรับให้ทำงานได้ 100% ไม่มีค้าง)
        function unlockSound() {
            isSoundUnlocked = true;
            if (!orderSound || !callSound) return; // ถ้าโหลดเสียงไม่ได้ ให้ข้ามไปเลย ระบบจะได้ไม่พัง

            try {
                orderSound.play().then(() => {
                    orderSound.pause(); orderSound.currentTime = 0;
                }).catch(e => {});
                
                callSound.play().then(() => {
                    callSound.pause(); callSound.currentTime = 0;
                }).catch(e => {});
            } catch(e) {}
        }

        async function refresh() {
            try {
                const response = await fetch(API_URL + "?action=getAdminData");
                const d = await response.json();
                if (!d) return;

                document.getElementById('revenue').innerText = "฿" + (d.summary.revenue ? d.summary.revenue.toLocaleString() : "0");
                document.getElementById('stat-qr').innerText = "฿" + (d.summary.qr ? d.summary.qr.toLocaleString() : "0");
                document.getElementById('stat-count').innerText = d.summary.orders || 0;

                // แจ้งเตือนพนักงาน
                if(d.calls && d.calls.length > 0) { 
                    cAlertT = d.calls[0][1]; document.getElementById('staff-alert').style.display='block'; document.getElementById('alert-table').innerText=cAlertT; 
                    if(!isFirstLoad && d.calls.length > lastCallCount && isSoundUnlocked && callSound) {
                        callSound.play().catch(e => {});
                    }
                } else { document.getElementById('staff-alert').style.display='none'; }
                lastCallCount = d.calls ? d.calls.length : 0;

                // จัดการออเดอร์
                const container = document.getElementById('container'); 
                if(!d.orders || d.orders.length === 0){ 
                    container.innerHTML="<div style='grid-column:1/-1;text-align:center;padding:100px;color:#94a3b8;'>ไม่มีออเดอร์ค้าง</div>"; 
                    lastOrderCount = 0; 
                } else {
                    if(!isFirstLoad && d.orders.length > lastOrderCount && isSoundUnlocked && orderSound) {
                        orderSound.play().catch(e => {});
                    }
                    lastOrderCount = d.orders.length;
                    
                    let groups={}; d.orders.forEach(o=>{
                        if(!groups[o.table]) groups[o.table]={items:[], total:0, rows:[], time:o.time}; 
                        groups[o.table].items.push(o); 
                        groups[o.table].total += parseFloat(o.total.toString().replace(/,/g,'')) || 0; 
                        groups[o.table].rows.push(o.rowNum);
                    });

                    container.innerHTML = Object.keys(groups).map(t => {
                        const timeDiff = getTimeDiff(groups[t].time);
                        return `
                        <div class="card">
                            <div class="card-time-box">
                                <div style="font-size:11px; color:#94a3b8; font-weight:600;">รอมาแล้ว</div>
                                <div class="time-elapsed ${timeDiff > 15 ? 'time-warning' : ''}">${timeDiff} นาที</div>
                            </div>
                            <h2 style="margin:0 0 15px 0; font-size:28px;">โต๊ะ ${t}</h2>
                            <div>
                                ${groups[t].items.map(i=>`
                                    <div class="order-item">
                                        <div><b>${i.qty}x ${i.menu}</b><br><small style="color:var(--blue); font-weight:600;">${i.details} [${i.status}]</small></div>
                                        <button class="btn-void" onclick="voidIt(${i.rowNum}, '${i.menu}')">ลบ</button>
                                    </div>`).join('')}
                            </div>
                            <div class="status-group">
                                <button class="s-btn" style="background:#fef3c7; color:#92400e;" onclick='upS(${JSON.stringify(groups[t].rows)},"กำลังทำ")'>กำลังทำ</button>
                                <button class="s-btn" style="background:#dcfce9; color:#166534;" onclick='upS(${JSON.stringify(groups[t].rows)},"รอเสิร์ฟ")'>รอเสิร์ฟ</button>
                                <button class="s-btn" style="background:#e0f2fe; color:#0369a1;" onclick='upS(${JSON.stringify(groups[t].rows)},"สำเร็จ")'>เสิร์ฟแล้ว</button>
                            </div>
                            
                            <button class="btn-cds" onclick='triggerCDS("${t}")'>📡 ส่งข้อมูลขึ้นจอ CDS</button>

                            <div style="font-size:38px; font-weight:800; text-align:right; margin:15px 0; color:var(--navy);">฿${groups[t].total.toLocaleString()}</div>
                            <button class="btn-qr" onclick='shQR("${t}",${groups[t].total},${JSON.stringify(groups[t].rows)})'>เก็บเงิน (PromptPay)</button>
                            <button class="btn-cash" onclick='openCashModal("${t}", ${groups[t].total}, ${JSON.stringify(groups[t].rows)})'>ปิดโต๊ะ (เงินสด)</button>
                        </div>`}).join('');
                }
                
                if (d.menu) renderStock(d.menu);
                if (d.summary.report) renderReport(d.summary.report);
                
                // กราฟ
                if (d.summary.chartDaily && d.summary.chartMonthly) {
                    cDataDaily = d.summary.chartDaily;
                    cDataMonthly = d.summary.chartMonthly;
                    drawChart();
                }

                isFirstLoad = false;
            } catch(e){ console.log(e); }
        }

        // --- ส่วน Chart ---
        function drawChart() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            if(salesChartInst) salesChartInst.destroy();

            let dataArr = currentChartMode === 'day' ? [...cDataDaily] : [...cDataMonthly];
            dataArr.sort((a,b) => {
               let ap = a.date.split('/'), bp = b.date.split('/');
               let as = ap.length === 3 ? ap[2] + ap[1].padStart(2,'0') + ap[0].padStart(2,'0') : ap[1] + ap[0].padStart(2,'0');
               let bs = bp.length === 3 ? bp[2] + bp[1].padStart(2,'0') + bp[0].padStart(2,'0') : bp[1] + bp[0].padStart(2,'0');
               return as.localeCompare(bs);
            });

            if(currentChartMode === 'day' && dataArr.length > 30) dataArr = dataArr.slice(-30);
            if(currentChartMode === 'month' && dataArr.length > 12) dataArr = dataArr.slice(-12);

            const labels = dataArr.map(i => i.date);
            const vals = dataArr.map(i => i.total);
            const color = currentChartMode === 'day' ? '#3b82f6' : '#0f172a';
            const bgColor = currentChartMode === 'day' ? 'rgba(59, 130, 246, 0.7)' : 'rgba(15, 23, 42, 0.8)';

            salesChartInst = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'ยอดขาย (บาท)', data: vals, backgroundColor: bgColor, borderColor: color, borderWidth: 1, borderRadius: 6 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } }
            });
        }

        function switchChart(mode) {
            currentChartMode = mode;
            document.getElementById('btn-day').classList.toggle('active', mode === 'day'); document.getElementById('btn-month').classList.toggle('active', mode === 'month');
            drawChart();
        }

        function getTimeDiff(timeStr) {
            const now = new Date();
            const [date, time] = timeStr.split(' ');
            const [d, m, y] = date.split('/');
            const [h, min, s] = time.split(':');
            const orderTime = new Date(y, m - 1, d, h, min, s);
            return Math.floor((now - orderTime) / 60000);
        }

        async function triggerCDS(t) {
            try {
                await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:t, status:'paying'})});
                alert("ส่งข้อมูลโต๊ะ " + t + " ขึ้นจอหน้าบ้านเรียบร้อยค่ะ");
            } catch(e) { alert("Error: " + e); }
        }

        // --- ส่วน Cash Assistant ---
        function openCashModal(t, total, rows) {
            currentPayingTotal = total; currentPayingRows = rows; currentPayingTable = t;
            localStorage.setItem('cds_cash_received', 0); // Reset CDS
            document.getElementById('c-table').innerText = "ปิดโต๊ะ " + t; document.getElementById('c-total').innerText = "฿" + total.toLocaleString();
            document.getElementById('cash-received').value = ""; document.getElementById('change-display').style.display = "none"; document.getElementById('btn-finish-cash').style.display = "none";
            document.getElementById('cash-modal').style.display = 'flex'; setTimeout(()=> document.getElementById('cash-received').focus(), 100);
        }

        function calcChange() {
            const received = parseFloat(document.getElementById('cash-received').value) || 0;
            const change = received - currentPayingTotal;
            localStorage.setItem('cds_cash_received', received); // 🚩 Sync ไป CDS
            const display = document.getElementById('change-display');
            const btn = document.getElementById('btn-finish-cash');
            if (received >= currentPayingTotal) {
                display.innerText = "ทอน: ฿" + change.toLocaleString(); display.style.display = "block"; btn.style.display = "block";
                btn.onclick = () => { document.getElementById('cash-modal').style.display='none'; pay(currentPayingTable, currentPayingRows, 'เงินสด'); };
            } else { display.style.display = "none"; btn.style.display = "none"; }
        }

        async function voidIt(row, name) { if(confirm(`ยืนยันลบรายการ "${name}"?`)) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'voidItem',rowNum:row})}); refresh(); } }
        async function upS(r, s) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStatus',rowNums:r,nextStatus:s})}); refresh(); }
        async function tgS(type, name, status) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStock',type:type,name:name,status:status})}); refresh(); }
        
        async function shQR(t, a, r) { 
            await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:t, status:'paying'})});
            document.getElementById('m-table').innerText = "โต๊ะ " + t; document.getElementById('m-total').innerText = "฿" + a.toLocaleString(); 
            document.getElementById('m-qr').src = `https://promptpay.io/0931805507/${a}.png`; 
            document.getElementById('m-confirm').onclick = () => { document.getElementById('modal').style.display='none'; pay(t,r,'PromptPay'); }; 
            document.getElementById('modal').style.display = 'flex'; 
        }

        async function pay(t, r, method) { 
            if(confirm(`ยืนยันปิดโต๊ะ ${t} (${method})?`)){ 
                localStorage.setItem('cds_cash_received', 0); // 🚩 เคลียร์หน้า CDS กลับไปเป็นแบบเดิม
                await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:t, status:'idle'})});
                await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'markMultipleDone',rowNums:r, paymentMethod:method})}); refresh(); 
            }
        }

        function renderStock(menu) {
            let html = menu.map(m=>`<div class="card" style="padding:20px; display:flex; justify-content:space-between; align-items:center;"><b>${m[0]}</b><button style="padding:10px 20px; border-radius:12px; border:none; background:${m[5]=='หมด'?'#f1f5f9':'var(--navy)'}; color:${m[5]=='หมด'?'#ef4444':'#fff'}; cursor:pointer; font-weight:700;" onclick="tgS('menu','${m[0]}','${m[5]=='หมด'?'ปกติ':'หมด'}')">${m[5]=='หมด'?'เปิดขาย':'ปิด (หมด)'}</button></div>`).join('');
            document.getElementById('stock-sec').innerHTML = `<h2 style="grid-column:1/-1;">จัดการสต็อกสินค้า</h2>${html}`;
        }

        function renderReport(report) {
            let html = `<table style="width:100%; border-collapse:collapse; background:#fff; border-radius:25px; overflow:hidden; box-shadow:var(--shadow);">
                <thead style="background:#f8fafc;"><tr><th style="padding:20px; text-align:left;">เมนู</th><th style="padding:20px; text-align:center;">จำนวน</th><th style="padding:20px; text-align:right;">ยอดรวม</th></tr></thead>
                <tbody>${report.map(item => `<tr style="border-top:1px solid #f1f5f9;"><td style="padding:20px;"><b>${item.name}</b></td><td style="padding:20px; text-align:center;">${item.qty}</td><td style="padding:20px; text-align:right; font-weight:700;">฿${item.total.toLocaleString()}</td></tr>`).join('')}</tbody>
            </table>`;
            document.getElementById('report-list').innerHTML = (report.length === 0) ? "<div style='text-align:center; padding:50px;'>ไม่มีข้อมูล</div>" : html;
        }

        function showSec(n) { 
            document.getElementById('container').style.display = (n==='orders'?'grid':'none'); 
            document.getElementById('stock-sec').style.display = (n==='stock'?'grid':'none');
            document.getElementById('report-sec').style.display = (n==='report'?'block':'none');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-'+n).classList.add('active');
        }

        async function clearCallAlert() { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'clearCall',table:cAlertT})}); refresh(); }
        setInterval(refresh, 5000); refresh();
    </script>
</body>
</html>
