<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU Admin | Smart Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --bg: #fdfdfe; --card: #ffffff; --p: #0f172a; --muted: #94a3b8;
            --blue: #2563eb; --indigo: #4f46e5; --emerald: #10b981; --rose: #ef4444; --amber: #f59e0b;
            --border: #f1f5f9; --radius: 20px;
            --shadow-soft: 0 2px 15px -3px rgba(0,0,0,0.04), 0 4px 6px -2px rgba(0,0,0,0.02);
            --shadow-hard: 0 20px 25px -5px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0b0f1a; --card: #151b2d; --p: #f8fafc; --muted: #64748b;
            --border: #1e2638;
        }

        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        body { background: var(--bg); color: var(--p); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }

        /* --- 🔝 Minimalist Header --- */
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .logo-area h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .logo-area span { color: var(--blue); }

        .stat-inline { display: flex; gap: 12px; }
        .s-mini { background: var(--card); padding: 12px 20px; border-radius: 18px; border: 1px solid var(--border); box-shadow: var(--shadow-soft); display: flex; flex-direction: column; min-width: 140px; }
        .s-mini small { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
        .s-mini b { font-size: 20px; font-weight: 800; }

        /* --- 🏷 Top Nav --- */
        .nav-pill-box { background: var(--card); padding: 5px; border-radius: 16px; display: inline-flex; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: var(--shadow-soft); }
        .nav-item { padding: 10px 24px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--muted); font-size: 13px; transition: 0.2s; }
        .nav-item.active { background: var(--p); color: #fff; }

        /* --- 📦 Card Grid --- */
        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .order-card { background: var(--card); border-radius: 28px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow-soft); position: relative; }
        .order-card:hover { border-color: var(--blue); box-shadow: var(--shadow-hard); }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .table-id { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        .time-pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: var(--bg); color: var(--muted); }
        .time-pill.late { background: var(--rose); color: #fff; animation: pulse 1.5s infinite; }

        .item-box { margin-bottom: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .row-item { display: flex; justify-content: space-between; padding: 8px 0; align-items: flex-start; }
        .row-item b { font-size: 15px; }
        .row-item small { color: var(--muted); font-weight: 500; font-size: 12px; }

        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .btn-s { padding: 10px; border: none; border-radius: 12px; font-weight: 800; font-size: 10px; cursor: pointer; background: var(--bg); color: var(--muted); transition: 0.2s; }
        .btn-s:hover { background: var(--border); color: var(--p); }

        .btn-pay-now { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--p); color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-pay-now:active { transform: scale(0.97); }

        /* ---  Receipt Modal --- */
        #pay-modal { position:fixed; inset:0; background:rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); display:none; z-index:9999; align-items:center; justify-content:center; }
        .receipt-inner { background: var(--card); width: 90%; max-width: 420px; padding: 40px; border-radius: 35px; box-shadow: var(--shadow-hard); border: 1px solid var(--border); text-align: center; }
        .receipt-list { background: var(--bg); padding: 20px; border-radius: 20px; margin: 20px 0; text-align: left; }
        
        .pay-method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .pay-btn { padding: 20px; border-radius: 20px; border: 2px solid var(--border); background: var(--card); cursor: pointer; transition: 0.3s; }
        .pay-btn:hover { border-color: var(--blue); }
        .pay-btn img { width: 35px; margin-bottom: 8px; }

        /* --- Analytics --- */
        .chart-card { background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border); box-shadow: var(--shadow-soft); margin-bottom: 30px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .sound-toggle { position: fixed; bottom: 25px; right: 25px; background: var(--blue); color: #fff; padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: 800; z-index: 1000; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>

    <button id="s-unlock" class="sound-toggle" onclick="unlockSound(); this.remove();">🔔 เปิดเสียงระบบ</button>

    <div class="header-box">
        <div class="logo-area">
            <h1>WITHU <span>Admin</span></h1>
            <div style="display:flex; gap:8px; margin-top:8px;">
                <button class="nav-item" style="padding:4px 10px; font-size:10px; border: 1px solid var(--border);" onclick="toggleTheme()">Dark Mode</button>
                <button class="nav-item" style="padding:4px 10px; font-size:10px; border: 1px solid var(--border);" onclick="toggleLayout()">Compact</button>
            </div>
        </div>
        <div class="stat-inline">
            <div class="s-mini">
                <small>Gross Profit</small>
                <b id="gross-profit" style="color:var(--emerald);">฿0</b>
            </div>
            <div class="s-mini">
                <small>Revenue</small>
                <b id="revenue">฿0</b>
            </div>
        </div>
    </div>

    <div class="nav-pill-box">
        <button id="nav-orders" onclick="showSec('orders')" class="nav-item active">คำสั่งซื้อค้าง</button>
        <button id="nav-stock" onclick="showSec('stock')" class="nav-item">จัดการสต็อก</button>
        <button id="nav-report" onclick="showSec('report')" class="nav-item">วิเคราะห์ยอดขาย</button>
    </div>

    <div id="container" class="order-grid"></div>

    <div id="stock-sec" style="display:none;" class="order-grid"></div>

    <div id="report-sec" style="display:none;">
        <div class="chart-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">ยอดขายรายชั่วโมง / รายวัน</h3>
                <div style="display:flex; gap:8px;">
                    <button class="nav-item active" style="font-size:11px; padding:6px 14px;" id="btn-peak" onclick="switchChart('peak')">ชั่วโมง</button>
                    <button class="nav-item" style="font-size:11px; padding:6px 14px;" id="btn-day" onclick="switchChart('day')">รายวัน</button>
                </div>
            </div>
            <canvas id="salesChart" height="100"></canvas>
        </div>
        <div id="report-list"></div>
    </div>

    <div id="pay-modal">
        <div class="receipt-inner">
            <h2 id="p-table-title" style="margin:0; font-size:32px; font-weight:900;">T-</h2>
            <div class="receipt-list" id="p-bill-items"></div>
            <small style="color:var(--muted); font-weight:800; letter-spacing:1px;">TOTAL AMOUNT</small>
            <div id="p-total-price" style="font-size:60px; font-weight:900; color:var(--p); margin-bottom:20px; letter-spacing:-2px;">฿0</div>

            <div id="p-methods" class="pay-method-grid">
                <div class="pay-btn" onclick="selectPayMethod('qr')">
                    <img src="https://img.icons8.com/fluency/48/qr-code.png"><br><b>QR PAY</b>
                </div>
                <div class="pay-btn" onclick="selectPayMethod('cash')">
                    <img src="https://img.icons8.com/fluency/48/money-bag.png"><br><b>CASH</b>
                </div>
            </div>

            <div id="p-qr-area" style="display:none; margin-top:20px;">
                <img id="p-qr-img" style="width:100%; border-radius:25px; border:1px solid var(--border); margin-bottom:15px;">
                <button class="btn-pay-now" style="background:var(--emerald);" onclick="finalPay('PromptPay')">ยืนยันรับชำระ</button>
            </div>

            <div id="p-cash-area" style="display:none; margin-top:20px;">
                <input type="number" id="p-cash-input" style="width:100%; padding:18px; border-radius:18px; border:2px solid var(--blue); font-size:32px; text-align:center; font-weight:900; outline:none;" placeholder="0" oninput="calcChangeUnified()">
                <div id="p-change-display" style="font-size:38px; font-weight:900; color:var(--emerald); margin:15px 0; display:none;">ทอน: ฿0</div>
                <button id="p-cash-submit" class="btn-pay-now" style="background:var(--emerald); display:none;" onclick="finalPay('เงินสด')">ปิดยอดบิล</button>
            </div>

            <button onclick="closePayModal()" style="margin-top:25px; background:none; border:none; color:var(--muted); cursor:pointer; font-weight:700; font-size:13px;">ยกเลิกและย้อนกลับ</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 
        let salesChartInst = null, currentChartMode = 'peak', fullData = null;
        let pTable = "", pTotal = 0, pRows = [];
        let orderSound = new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_7325997672.mp3');

        function unlockSound() { orderSound.play().then(()=>orderSound.pause()); }

        async function refresh() {
            try {
                const r = await fetch(API_URL + "?action=getAdminData");
                const d = await r.json();
                if (!d) return;
                fullData = d;

                document.getElementById('revenue').innerText = "฿" + d.summary.revenue.toLocaleString();
                document.getElementById('gross-profit').innerText = "฿" + (d.summary.grossProfit || 0).toLocaleString();

                const container = document.getElementById('container'); 
                if(!d.orders?.length){ 
                    container.innerHTML="<div style='grid-column:1/-1;text-align:center;padding:100px;color:var(--muted);font-weight:700;'>ไม่มีรายการค้างในขณะนี้ 🎉</div>"; 
                } else {
                    let groups={}; d.orders.forEach(o=>{
                        if(!groups[o.table]) groups[o.table]={items:[], total:0, rows:[], time:o.time}; 
                        groups[o.table].items.push(o); 
                        groups[o.table].total += parseFloat(String(o.total).replace(/,/g,'')) || 0; 
                        groups[o.table].rows.push(o.rowNum);
                    });

                    container.innerHTML = Object.keys(groups).map(t => {
                        const wait = getTimeDiff(groups[t].time);
                        return `
                        <div class="order-card">
                            <div class="card-top">
                                <h2 class="table-id">T${t}</h2>
                                <span class="time-pill ${wait > 15 ? 'late' : ''}">${wait} นาทีที่แล้ว</span>
                            </div>
                            <div class="item-box">
                                ${groups[t].items.map(i=>`
                                    <div class="row-item">
                                        <div><b>${i.qty}x ${i.menu}</b><small>${i.details}</small></div>
                                        <button style="color:var(--rose); background:none; border:none; font-weight:800; cursor:pointer; font-size:10px;" onclick="voidIt(${i.rowNum})">VOID</button>
                                    </div>`).join('')}
                            </div>
                            <div class="btn-group">
                                <button class="btn-s" onclick='upS(${JSON.stringify(groups[t].rows)},"กำลังทำ")'>PREP</button>
                                <button class="btn-s" onclick='upS(${JSON.stringify(groups[t].rows)},"รอเสิร์ฟ")'>READY</button>
                                <button class="btn-s" onclick='upS(${JSON.stringify(groups[t].rows)},"สำเร็จ")'>DONE</button>
                            </div>
                            <div style="font-size:24px; font-weight:900; text-align:right; margin-bottom:15px; letter-spacing:-1px;">฿${groups[t].total.toLocaleString()}</div>
                            <button class="btn-pay-now" onclick='openPayModal("${t}", ${groups[t].total}, ${JSON.stringify(groups[t].rows)}, ${JSON.stringify(groups[t].items)})'>CHECKOUT</button>
                        </div>`}).join('');
                }
                renderStock(d.menu);
                renderReport(d.summary.report);
                drawChart();
            } catch(e){}
        }

        async function openPayModal(table, total, rows, items) {
            pTable = table; pTotal = total; pRows = rows;
            document.getElementById('p-table-title').innerText = "T" + table;
            document.getElementById('p-total-price').innerText = "฿" + total.toLocaleString();
            document.getElementById('p-bill-items').innerHTML = items.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px;"><span>${i.qty}x ${i.menu}</span><b>฿${parseFloat(String(i.total).replace(/,/g,'')).toLocaleString()}</b></div>`).join('');
            
            fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:table, status:'paying'})});
            document.getElementById('p-methods').style.display = 'grid';
            document.getElementById('p-qr-area').style.display = 'none';
            document.getElementById('p-cash-area').style.display = 'none';
            document.getElementById('pay-modal').style.display = 'flex';
        }

        function selectPayMethod(m) {
            document.getElementById('p-methods').style.display = 'none';
            if(m === 'qr') {
                document.getElementById('p-qr-img').src = `https://promptpay.io/0931805507/${pTotal}.png`;
                document.getElementById('p-qr-area').style.display = 'block';
            } else {
                document.getElementById('p-cash-input').value = "";
                document.getElementById('p-change-display').style.display = 'none';
                document.getElementById('p-cash-submit').style.display = 'none';
                document.getElementById('p-cash-area').style.display = 'block';
                setTimeout(()=>document.getElementById('p-cash-input').focus(), 100);
            }
        }

        function calcChangeUnified() {
            const received = parseFloat(document.getElementById('p-cash-input').value) || 0;
            const change = received - pTotal;
            localStorage.setItem('cds_cash_received', received);
            if(received >= pTotal) {
                document.getElementById('p-change-display').innerText = "เงินทอน ฿" + change.toLocaleString();
                document.getElementById('p-change-display').style.display = 'block';
                document.getElementById('p-cash-submit').style.display = 'block';
            } else {
                document.getElementById('p-change-display').style.display = 'none';
                document.getElementById('p-cash-submit').style.display = 'none';
            }
        }

        async function finalPay(method) {
            if(confirm(`ยืนยันการชำระเงินโต๊ะ T${pTable}?`)) {
                localStorage.setItem('cds_cash_received', 0);
                await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:pTable, status:'idle'})});
                await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'markMultipleDone',rowNums:pRows, paymentMethod:method})});
                closePayModal(); refresh();
            }
        }

        function closePayModal() { document.getElementById('pay-modal').style.display = 'none'; localStorage.setItem('cds_cash_received', 0); }

        function drawChart() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            if(salesChartInst) salesChartInst.destroy();
            let labels = [], data = [], title = "";
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            
            if(currentChartMode === 'peak') {
                labels = Array.from({length: 24}, (_, i) => i + ":00");
                data = fullData.summary.peakHours;
                title = "Sales Hourly";
            } else {
                labels = fullData.summary.chartDaily.map(i => i.date);
                data = fullData.summary.chartDaily.map(i => i.total);
                title = "Sales Daily";
            }

            salesChartInst = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: title, data, backgroundColor: '#2563eb', borderRadius: 10 }] },
                options: { 
                    responsive: true, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { border: { display: false }, grid: { color: isDark ? 'rgba(255,255,255,0.03)' : '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function switchChart(mode) { 
            currentChartMode = mode; 
            document.getElementById('btn-peak').classList.toggle('active', mode==='peak');
            document.getElementById('btn-day').classList.toggle('active', mode==='day');
            drawChart();
        }

        function renderStock(menu) { 
            document.getElementById('stock-sec').innerHTML = menu.map(m=>`
                <div class="order-card" style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:16px;">${m[0]}</b><br><small style="color:var(--muted)">ต้นทุน ฿${m[6]||0}</small></div>
                    <button style="padding:10px 20px; border-radius:12px; border:none; background:${m[5]=='หมด'?'var(--bg)':'var(--p)'}; color:${m[5]=='หมด'?'var(--rose)':'#fff'}; cursor:pointer; font-weight:800; font-size:11px;" onclick="tgS('menu','${m[0]}','${m[5]=='หมด'?'ปกติ':'หมด'}')">${m[5]=='หมด'?'RESTOCK':'OUT'}</button>
                </div>`).join(''); 
        }

        function renderReport(report) { 
            document.getElementById('report-list').innerHTML = `<table style="width:100%; border-collapse: collapse; background:var(--card); border-radius:20px; overflow:hidden; border: 1px solid var(--border);"><thead><tr style="background:var(--bg);"><th style="padding:15px;text-align:left;font-size:11px;color:var(--muted);">รายการสินค้า</th><th style="padding:15px;text-align:center;font-size:11px;color:var(--muted);">จำนวน</th><th style="padding:15px;text-align:right;font-size:11px;color:var(--muted);">กำไรสุทธิ</th></tr></thead><tbody>${report.map(i => `<tr style="border-top:1px solid var(--border);"><td style="padding:15px; font-weight:700;">${i.name}</td><td style="padding:15px;text-align:center; font-weight:800; color:var(--blue);">${i.qty}</td><td style="padding:15px;text-align:right;font-weight:900;color:var(--emerald);">฿${i.profit.toLocaleString()}</td></tr>`).join('')}</tbody></table>`; 
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
            if(salesChartInst) drawChart();
        }

        function toggleLayout() {
            const current = document.documentElement.getAttribute('data-layout');
            document.documentElement.setAttribute('data-layout', current === 'compact' ? 'normal' : 'compact');
        }

        function getTimeDiff(timeStr) { const now = new Date(); const [d, t] = timeStr.split(' '); const [day, month, year] = d.split('/'); const [h, m, s] = t.split(':'); return Math.floor((now - new Date(year, month-1, day, h, m, s)) / 60000); }
        function showSec(n) { document.getElementById('container').style.display=(n==='orders'?'grid':'none'); document.getElementById('stock-sec').style.display=(n==='stock'?'grid':'none'); document.getElementById('report-sec').style.display=(n==='report'?'block':'none'); document.querySelectorAll('.nav-item').forEach(b => { if(b.id.startsWith('nav-')) b.classList.toggle('active', b.id==='nav-'+n); }); }
        async function voidIt(r) { if(confirm("ต้องการลบรายการนี้ใช่ไหม?")){ await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'voidItem',rowNum:r})}); refresh(); } }
        async function upS(r,s) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStatus',rowNums:r,nextStatus:s})}); refresh(); }
        async function tgS(type,name,status) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStock',type:type,name:name,status:status})}); refresh(); }

        refresh(); setInterval(refresh, 5000);
    </script>
</body>
</html>
