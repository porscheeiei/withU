<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; --accent: #16a34a; }
    body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
    .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn { width: 100%; border: none; padding: 12px; border-radius: 10px; font-family: 'Prompt'; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-qr { background: #000; color: #fff; }
    .btn-cash { background: #fff; border: 2px solid var(--accent); color: var(--accent); }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: #fff; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; }
  </style>
</head>
<body>
  <div class="header">
    <div><h1>WITHU Admin</h1><div id="update-time" style="font-size:12px;color:grey;">อัปเดตล่าสุด: -</div></div>
    <div style="text-align:right;">ยอดรวมวันนี้: <span id="revenue" style="font-weight:700;font-size:20px;">฿0</span></div>
  </div>
  <div id="container" class="tables-grid">กำลังดึงข้อมูล...</div>

  <div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3 id="m-title"></h3><img id="m-qr" style="width:100%;"><div id="m-total" style="font-size:28px;font-weight:700;"></div>
      <button class="btn" style="background:#eee;" onclick="document.getElementById('modal').style.display='none'">ปิด</button>
    </div>
  </div>

  <script>
    const API_URL = "ใส่_API_URL_ตรงนี้"; 
    async function refresh() {
      try {
        const res = await fetch(API_URL + "?action=getAdminData");
        const data = await res.json();
        document.getElementById('revenue').innerText = "฿"+data.summary.revenue.toLocaleString();
        document.getElementById('update-time').innerText = "อัปเดตล่าสุด: " + new Date().toLocaleTimeString();
        
        const container = document.getElementById('container');
        if(!data.orders.length) { container.innerHTML = "ไม่มีออเดอร์ค้าง"; return; }
        
        let groups = {};
        data.orders.forEach(o => {
          if(!groups[o.table]) groups[o.table] = { items:[], total:0, rows:[] };
          groups[o.table].items.push(o);
          groups[o.table].total += parseFloat(o.total.replace(/,/g,''));
          groups[o.table].rows.push(o.rowNum);
        });

        let html = "";
        for(let t in groups) {
          html += `<div class="card"><h2 style="margin:0;">โต๊ะ ${t}</h2><hr style="border:0;border-top:1px solid #eee;margin:15px 0;">
            ${groups[t].items.map(i => `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${i.qty}x ${i.menu}</span><span>฿${i.total}</span></div>`).join('')}
            <div style="font-size:22px;font-weight:700;text-align:right;margin:15px 0;">฿${groups[t].total.toLocaleString()}</div>
            <button class="btn btn-qr" onclick="showQR('${t}', ${groups[t].total})">เช็คบิล QR</button>
            <button class="btn btn-cash" onclick="pay('${t}', [${groups[t].rows}])">รับเงินสด</button></div>`;
        }
        container.innerHTML = html;
      } catch(e) {}
    }

    function showQR(t, a) {
      document.getElementById('m-title').innerText = "โต๊ะ "+t;
      document.getElementById('m-total').innerText = "฿"+a.toLocaleString();
      document.getElementById('m-qr').src = `https://promptpay.io/0931805507/${a}.png`;
      document.getElementById('modal').style.display = 'flex';
    }

    async function pay(t, rows) {
      if(!confirm(`รับเงินโต๊ะ ${t}?`)) return;
      await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'markMultipleDone', rowNums:rows}) });
      refresh();
    }

    setInterval(refresh, 5000); refresh();
  </script>
</body>
</html>
