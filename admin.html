<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { 
            --bg: #F9FAFB; --accent: #10B981; --red: #D63031; --blue: #3B82F6; 
            --yellow: #F59E0B; --text-main: #1F2937; --shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        /* การแจ้งเตือนเรียกพนักงาน */
        .alert-bar { background: var(--red); color: #fff; padding: 16px; border-radius: 16px; margin-bottom: 25px; text-align: center; cursor: pointer; font-weight: 600; animation: pulse 2s infinite; box-shadow: 0 10px 20px rgba(214,48,49,0.2); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .revenue-pill { background: #fff; padding: 10px 20px; border-radius: 15px; box-shadow: var(--shadow); border: 1px solid #F3F4F6; text-align: right; }
        
        .nav-btn { padding: 12px 24px; border: none; border-radius: 12px; font-family: 'Prompt'; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-orders { background: #1F2937; color: #fff; }
        .btn-stock { background: #fff; color: #1F2937; border: 1px solid #E5E7EB; margin-left: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .card { background: #fff; border-radius: 30px; padding: 30px; box-shadow: var(--shadow); border: 1px solid rgba(229,231,235,0.5); position: relative; }
        .card-time { position: absolute; top: 30px; right: 30px; color: #BBB; font-size: 14px; font-weight: 500; }
        
        .order-item { border-bottom: 1px dashed #F3F4F6; padding: 10px 0; font-size: 14px; }
        
        /* ปุ่มสถานะ 3 ขั้นตอน */
        .status-group { display: flex; gap: 6px; margin: 20px 0; }
        .status-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: 'Prompt'; font-size: 11px; transition: 0.2s; }
        .status-btn:active { transform: translateY(2px); }

        /* ปุ่มจ่ายเงินและการเงิน */
        .btn-qr { width: 100%; background: #000; color: #fff; padding: 16px; border-radius: 18px; font-weight: 700; margin-top: 15px; border: none; cursor: pointer; font-size: 15px; transition: 0.3s; }
        .btn-cash { width: 100%; background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 16px; border-radius: 18px; font-weight: 700; margin-top: 10px; cursor: pointer; font-size: 15px; font-family: 'Prompt'; transition: 0.3s; }
        .btn-cash:hover { background: var(--accent); color: #fff; }

        /* สต็อกสินค้า */
        .stock-card { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 18px 24px; border-radius: 18px; box-shadow: var(--shadow); margin-bottom: 10px; border: 1px solid #F3F4F6; }
        
        /* ระบบเสียง */
        #sound-unlock { position: fixed; bottom: 20px; right: 20px; z-index: 2000; background: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-size: 12px; font-family: 'Prompt'; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <button id="sound-unlock" onclick="this.style.display='none'">🔔 คลิกเพื่อเปิดเสียงแจ้งเตือน</button>

    <div id="staff-alert" class="alert-bar" onclick="clearCallAlert()" style="display:none;">⚠️ โต๊ะ <span id="alert-table"></span> เรียกพนักงาน (คลิกเพื่อปิด)</div>
    
    <div class="header">
        <h1>WITHU Admin</h1>
        <div class="revenue-pill">
            <small style="display:block; color:#6B7280; font-size:12px;">รายได้วันนี้</small>
            <b id="revenue" style="font-size:22px; color:var(--accent);">฿0</b>
        </div>
    </div>
    
    <div style="margin-bottom: 30px;">
        <button id="nav-orders" onclick="showSec('orders')" class="nav-btn btn-orders">ดูออเดอร์</button>
        <button id="nav-stock" onclick="showSec('stock')" class="nav-btn btn-stock">จัดการสต็อก</button>
    </div>

    <div id="container" class="grid"></div>
    <div id="stock-sec" style="display:none;" class="grid"></div>

    <div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;z-index:1000;align-items:center;justify-content:center;" onclick="this.style.display='none'">
        <div class="modal-box" style="background:#fff;padding:40px;border-radius:40px;text-align:center;max-width:400px;width:90%;" onclick="event.stopPropagation()">
            <h3 id="m-table" style="margin-top:0; font-size:22px;"></h3>
            <img id="m-qr" style="width:100%; margin: 20px 0; border: 1px solid #eee; border-radius: 20px;">
            <div id="m-total" style="font-size:36px;font-weight:800;"></div>
            <button class="btn-qr" style="background:var(--accent); border-radius:15px;" id="m-confirm">ยืนยันได้รับเงินแล้ว (ปิดโต๊ะ)</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec"; 
        
        // ลิงก์ไฟล์เสียง (เปลี่ยน URL ได้ตามชอบ)
        const orderSound = new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_7325997672.mp3');
        const callSound = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625624707.mp3');
        
        let lastOrderCount = 0, lastCallCount = 0, isFirstLoad = true, cAlertT = "";

        async function refresh() {
            try {
                const r = await fetch(API_URL + "?action=getAdminData"); const d = await r.json();
                document.getElementById('revenue').innerText = "฿" + d.summary.revenue.toLocaleString();

                // 🔔 ตรวจสอบการเรียกพนักงาน
                if(d.calls.length > 0) { 
                    cAlertT = d.calls[0][1]; document.getElementById('staff-alert').style.display = 'block'; document.getElementById('alert-table').innerText = cAlertT;
                    if (!isFirstLoad && d.calls.length > lastCallCount) callSound.play();
                } else { document.getElementById('staff-alert').style.display = 'none'; }
                lastCallCount = d.calls.length;

                // 🔔 ตรวจสอบออเดอร์
                const c = document.getElementById('container');
                if(!d.orders.length){ 
                    c.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:100px;color:#9ca3af;'>ไม่มีออเดอร์ค้าง</div>"; 
                    lastOrderCount = 0; 
                } else {
                    if (!isFirstLoad && d.orders.length > lastOrderCount) orderSound.play();
                    lastOrderCount = d.orders.length;
                    
                    let groups = {}; d.orders.forEach(o => { if(!groups[o.table]) groups[o.table] = { items:[], total:0, rows:[], time:o.time }; groups[o.table].items.push(o); groups[o.table].total += parseFloat(o.total.replace(/,/g,'')); groups[o.table].rows.push(o.rowNum); });
                    
                    c.innerHTML = Object.keys(groups).map(t => `
                        <div class="card">
                            <div class="card-time">${groups[t].time}</div>
                            <h2 style="margin:0 0 20px 0; font-size:22px; font-weight:800;">โต๊ะ ${t}</h2>
                            ${groups[t].items.map(i => `<div class="order-item"><b>${i.qty}x ${i.menu}</b><br><small style="color:var(--blue); font-weight:600;">${i.details} [${i.status}]</small></div>`).join('')}
                            <div class="status-group">
                                <button class="status-btn" style="background:#FEF3C7; color:#92400E;" onclick='upS(${JSON.stringify(groups[t].rows)},"กำลังทำ")'>กำลังทำ</button>
                                <button class="status-btn" style="background:#DCFCE9; color:#166534;" onclick='upS(${JSON.stringify(groups[t].rows)},"รอเสิร์ฟ")'>รอเสิร์ฟ</button>
                                <button class="status-btn" style="background:#E0F2FE; color:#0369A1;" onclick='upS(${JSON.stringify(groups[t].rows)},"สำเร็จ")'>เสิร์ฟแล้ว</button>
                            </div>
                            <div style="font-size:32px; font-weight:800; text-align:right; margin:15px 0;">฿${groups[t].total.toLocaleString()}</div>
                            <button class="btn-qr" onclick='shQR("${t}",${groups[t].total},${JSON.stringify(groups[t].rows)})'>เก็บเงิน (QR)</button>
                            <button class="btn-cash" onclick='pay("${t}",${JSON.stringify(groups[t].rows)})'>ปิดโต๊ะ (รับเงินสด)</button>
                        </div>`).join('');
                }

                // ส่วนจัดการสต็อก
                let sh = "<h3>เมนูอาหาร</h3>" + d.menu.map(m => `<div class="stock-card"><span>${m[0]}</span><button style="padding:8px 15px; border-radius:10px; border:none; background:${m[5]=='หมด'?'#f3f4f6':'#1f2937'}; color:${m[5]=='หมด'?'#1f2937':'#fff'}; cursor:pointer;" onclick="tgS('menu','${m[0]}','${m[5]=='หมด'?'ปกติ':'หมด'}')">${m[5]=='หมด'?'เปิดขาย':'ปิด (หมด)'}</button></div>`).join('');
                sh += "<h3>ท็อปปิ้ง</h3>" + d.toppings.map(t => `<div class="stock-card"><span>${t[0]}</span><button style="padding:8px 15px; border-radius:10px; border:none; background:${t[2]=='หมด'?'#f3f4f6':'#1f2937'}; color:${t[2]=='หมด'?'#1f2937':'#fff'}; cursor:pointer;" onclick="tgS('top','${t[0]}','${t[2]=='หมด'?'ปกติ':'หมด'}')">${t[2]=='หมด'?'เปิดขาย':'ปิด (หมด)'}</button></div>`).join('');
                document.getElementById('stock-sec').innerHTML = sh;

                isFirstLoad = false;
            } catch(e){}
        }

        function showSec(n) { 
            document.getElementById('container').style.display=(n==='orders'?'grid':'none'); 
            document.getElementById('stock-sec').style.display=(n==='orders'?'none':'grid'); 
            document.getElementById('nav-orders').className=`nav-btn ${n==='orders'?'btn-orders':'btn-stock'}`; 
            document.getElementById('nav-stock').className=`nav-btn ${n==='stock'?'btn-orders':'btn-stock'}`; 
        }

        async function upS(r, s) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStatus',rowNums:r,nextStatus:s})}); refresh(); }
        async function tgS(type, name, status) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStock',type:type,name:name,status:status})}); refresh(); }
        
        function shQR(t, a, r) { 
            document.getElementById('m-table').innerText = "โต๊ะ "+t; 
            document.getElementById('m-total').innerText = "฿"+a.toLocaleString(); 
            // ลิงก์ PromptPay QR (ใส่เบอร์ร้านของคุณแทน 0931805507)
            document.getElementById('m-qr').src = `https://promptpay.io/0931805507/${a}.png`; 
            document.getElementById('m-confirm').onclick = () => { document.getElementById('modal').style.display='none'; pay(t, r); }; 
            document.getElementById('modal').style.display = 'flex'; 
        }

        async function pay(t, r) { 
            if(confirm("ยืนยันได้รับเงินและปิดโต๊ะ "+t+"? ออเดอร์จะย้ายไปหน้าประวัติ")){ 
                await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'markMultipleDone',rowNums:r})}); 
                refresh(); 
            }
        }

        async function clearCallAlert() { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'clearCall',table:cAlertT})}); refresh(); }
        
        setInterval(refresh, 5000); 
        refresh();
    </script>
</body>
</html>
