<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg-color: #f4f7f6; --surface-color: #ffffff; --text-main: #2c3e50; 
      --text-muted: #7f8c8d; --primary-color: #000000; --border-color: #ecf0f1;
    }
    body { font-family: 'Prompt', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
    
    /* การ์ดสรุปยอด */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .summary-card { background: var(--surface-color); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--primary-color); }
    .card-title { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
    .card-value { font-size: 24px; font-weight: 700; margin: 0; }

    /* ตาราง */
    .table-container { background: var(--surface-color); border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
    th { background: #fafafa; color: var(--text-muted); font-weight: 600; }
    
    .btn-done { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-size: 13px; }
    .btn-done:disabled { background: #bdc3c7; }
    
    #refresh-btn { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div>
      <h1>WITHU Admin Dashboard</h1>
      <p>ระบบจัดการออเดอร์ (อัปเดตทุก 15 วินาที)</p>
    </div>
    <button id="refresh-btn" onclick="fetchAllData()">รีเฟรชข้อมูล</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card" style="border-left-color: #27ae60;">
      <div class="card-title">ยอดขายวันนี้</div>
      <p class="card-value" id="sum-revenue">฿0</p>
    </div>
    <div class="summary-card" style="border-left-color: #2980b9;">
      <div class="card-title">จำนวนที่ขายได้</div>
      <p class="card-value" id="sum-items">0 รายการ</p>
    </div>
    <div class="summary-card" style="border-left-color: #f39c12;">
      <div class="card-title">🏆 เมนูขายดี</div>
      <p class="card-value" id="sum-bestseller">-</p>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>เวลา</th><th>โต๊ะ</th><th>เมนู</th><th>ความหวาน</th><th>จำนวน</th><th>รวม</th><th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="order-body">
        <tr><td colspan="7" style="text-align:center;">กำลังโหลดข้อมูล...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec";

    function fetchAllData() {
      document.getElementById('refresh-btn').innerText = "กำลังโหลด...";
      fetch(API_URL + "?action=getAdminData")
        .then(res => res.json())
        .then(data => {
          renderSummary(data.summary);
          renderOrders(data.orders);
          document.getElementById('refresh-btn').innerText = "รีเฟรชข้อมูล";
        });
    }

    function renderSummary(s) {
      document.getElementById('sum-revenue').innerText = "฿" + s.revenue.toLocaleString();
      document.getElementById('sum-items').innerText = s.items + " รายการ";
      document.getElementById('sum-bestseller').innerText = s.bestSeller;
    }

    function renderOrders(orders) {
      let tbody = document.getElementById('order-body');
      if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">ยังไม่มีออเดอร์ค้างเสิร์ฟ</td></tr>';
        return;
      }
      let html = "";
      orders.forEach(o => {
        html += `<tr>
          <td>${o.time}</td>
          <td style="font-weight:700;">โต๊ะ ${o.table}</td>
          <td>${o.menu}</td>
          <td>${o.sweetness}</td>
          <td>${o.qty}</td>
          <td>฿${o.total}</td>
          <td><button class="btn-done" onclick="markDone(${o.rowNum}, this)">✓ เสิร์ฟแล้ว</button></td>
        </tr>`;
      });
      tbody.innerHTML = html;
    }

    function markDone(num, btn) {
      btn.innerText = "กำลังบันทึก...";
      btn.disabled = true;
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'markDone', rowNum: num })
      })
      .then(res => res.json())
      .then(data => {
        fetchAllData();
      });
    }

    window.onload = fetchAllData;
    setInterval(fetchAllData, 15000); // อัปเดตอัตโนมัติทุก 15 วินาที
  </script>
</body>
</html>
