<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU | EXECUTIVE CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #fcfcfc; --surface: #ffffff; --text-main: #000000; --text-muted: #737373;
            --accent: #000000; --border: #e5e5e5; --slate: #f5f5f5;
            --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg: #0a0a0a; --surface: #121212; --text-main: #ffffff; --text-muted: #a3a3a3;
            --border: #262626; --slate: #1c1c1e;
        }

        * { font-family: 'Inter', 'Prompt', sans-serif; box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 60px; overflow-x: hidden; }

        /* --- OPERATIONS BAR --- */
        .op-bar { background: #000; color: #fff; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; letter-spacing: 1px; position: sticky; top: 0; z-index: 1100; font-weight: 600; text-transform: uppercase; }
        .cleanup-alert { color: #fff; border: 1px solid #fff; padding: 2px 8px; border-radius: 4px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* --- NAVIGATION --- */
        .top-nav { background: var(--surface); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 41px; z-index: 1000; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; text-transform: uppercase; }

        .container { max-width: 1450px; margin: 25px auto; padding: 0 20px; }

        /* --- DASHBOARD STATS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .stat-card small { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .stat-card h3 { margin: 0; font-size: 24px; font-weight: 700; }

        /* --- TABS --- */
        .tab-bar { display: flex; gap: 4px; margin-bottom: 25px; background: var(--border); padding: 4px; border-radius: 8px; width: fit-content; }
        .tab-btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; background: transparent; color: var(--text-muted); font-weight: 600; font-size: 12px; transition: 0.2s; text-transform: uppercase; }
        .tab-btn.active { background: var(--surface); color: var(--text-main); }

        /* --- ORDER KANBAN --- */
        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); }
        .card-head { padding: 18px; background: rgba(0,0,0,0.01); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
        .card-body { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }

        .status-line { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #000; }

        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; align-items: center; }
        .item-row:last-child { border-bottom: none; }
        .item-info b { font-weight: 600; }
        .item-info small { display: block; color: var(--text-muted); font-size: 11px; margin-top: 1px; }

        .btn-void { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 10px; text-decoration: underline; padding: 0; margin-top: 2px; }
        .btn-void:hover { color: #000; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-outline { background: var(--surface); border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.2s; }
        .btn-outline:hover { background: #000; color: #fff; }
        .btn-black { background: #000; color: #fff; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 12px; font-size: 13px; text-transform: uppercase; }

        /* --- REPORT TABLE --- */
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .report-table th { text-align: left; padding: 12px; border-bottom: 2px solid #000; font-size: 11px; text-transform: uppercase; background: var(--slate); }
        .report-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 20px; }
        .modal-card { background: var(--surface); width: 100%; max-width: 450px; border-radius: 12px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid var(--border); }

        .pay-tile { padding: 15px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; text-align: center; font-weight: 700; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .pay-tile:hover { background: #000; color: #fff; }

        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 14px; background: var(--surface); color: var(--text-main); }
        
        .toast-notify { position: fixed; bottom: 20px; left: 20px; background: #000; color: #fff; padding: 15px 25px; border-radius: 4px; display: none; font-size: 12px; font-weight: 600; z-index: 10000; text-transform: uppercase; }

        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr 1fr; } .order-grid { grid-template-columns: 1fr; } }
        @media print { .op-bar, .top-nav, .tab-bar, .stats-grid, .order-grid, .action-btns, .btn-black { display: none !important; } #report-sec { display: block !important; } }
    </style>
</head>
<body>

    <div id="call-notify" class="toast-notify" onclick="clearCallNotify()">TABLE <span id="call-table-no">-</span> IS CALLING STAFF</div>

    <div class="op-bar">
        <div>CLOSING IN: <span id="close-timer">00:00:00</span></div>
        <div id="cleanup-reminder" class="cleanup-alert">CLEANUP OPERATIONS</div>
        <div id="date-now"></div>
    </div>

    <nav class="top-nav">
        <div class="logo">WITHU | CONTROL</div>
        <div class="action-btns" style="display: flex; gap: 8px;">
            <button class="tab-btn" onclick="openManualOrderModal()" style="border: 1px solid #000;">ADD ORDER</button>
            <button class="tab-btn" onclick="toggleAttendance()" style="background: #000; color: #fff;">STAFF</button>
            <button class="tab-btn" onclick="window.print()" style="background: #000; color: #fff;">EXPORT</button>
            <button class="tab-btn" onclick="toggleTheme()" style="background: var(--border);">MODE</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><small>Profit</small><h3 id="prof-val">0</h3></div>
            <div class="stat-card"><small>Revenue</small><h3 id="rev-val">0</h3></div>
            <div class="stat-card"><small>Avg Service</small><h3 id="avg-speed">0.0 MINS</h3></div>
            <div class="stat-card"><small>Orders</small><h3 id="order-count">0</h3></div>
        </div>

        <div class="tab-bar">
            <button onclick="showSec('orders')" class="tab-btn active" id="t-orders">Store</button>
            <button onclick="showSec('takeaway')" class="tab-btn" id="t-takeaway">Delivery</button>
            <button onclick="showSec('stock')" class="tab-btn" id="t-stock">Stock</button>
            <button onclick="showSec('report')" class="tab-btn" id="t-report">Performance</button>
        </div>

        <div id="order-sec" class="order-grid"></div>
        <div id="takeaway-sec" class="order-grid" style="display:none;"></div>

        <div id="stock-sec" style="display:none;">
            <div id="stock-list-body" style="background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;"></div>
        </div>

        <div id="report-sec" style="display:none;">
            <div id="printable-report">
                <h2 style="margin:0; letter-spacing:-1px;">DAILY PERFORMANCE SUMMARY</h2>
                <p id="report-date-text" style="color: var(--text-muted); font-size: 13px; text-transform: uppercase; margin-bottom: 25px;"></p>
                <div style="height: 250px; position: relative; margin-bottom:30px;"><canvas id="salesChart"></canvas></div>
                <div id="report-content"></div>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="p-table-title" style="margin:0; font-size:20px; text-transform:uppercase;">TABLE -</h2>
            <div id="p-bill-items" style="margin: 15px 0; border-top: 1px solid var(--border); padding-top: 12px; max-height: 150px; overflow-y: auto;"></div>
            <small style="text-transform: uppercase; font-weight: 700; color: var(--text-muted); font-size: 10px;">Total Due</small>
            <div id="p-total-price" style="font-size: 32px; font-weight: 800; margin: 5px 0 20px 0;">฿0</div>
            
            <div id="p-methods" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="pay-tile" onclick="selectPayMethod('qr')">PROMPTPAY</div>
                <div class="pay-tile" onclick="selectPayMethod('cash')">CASH</div>
            </div>

            <div id="p-qr-area" style="display:none; text-align:center;">
                <img id="p-qr-img" style="width:180px; height:180px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px;">
                <button class="btn-black" onclick="finalPay('PROMPTPAY')">CONFIRM PAYMENT</button>
            </div>

            <div id="p-cash-area" style="display:none;">
                <input type="number" id="p-cash-input" placeholder="Received" oninput="calcChange()">
                <div id="p-change-display" style="font-size: 18px; font-weight: 700; margin: 15px 0; display:none;"></div>
                <button id="p-cash-submit" class="btn-black" style="display:none;" onclick="finalPay('CASH')">CLOSE BILL</button>
            </div>
            
            <button onclick="closePayModal()" style="margin-top:20px; width:100%; border:none; background:none; color:var(--text-muted); cursor:pointer; font-weight:600; font-size:12px; text-decoration:underline;">CANCEL</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec";
        let fullData = null, salesChartInst = null;
        let pTable = "", pTotal = 0, pRows = [];

        function updateClock() {
            const now = new Date();
            const close = new Date(); close.setHours(23, 59, 59);
            let diff = close - now;
            if(diff < 0) { document.getElementById('close-timer').innerText = "CLOSED"; return; }
            let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById('close-timer').innerText = `${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            document.getElementById('cleanup-reminder').style.display = (h == 0 && m <= 30) ? 'block' : 'none';
            document.getElementById('date-now').innerText = now.toLocaleDateString('en-GB', {day:'2-digit', month:'short'}).toUpperCase();
        }

        async function refresh() {
            try {
                const response = await fetch(API_URL + "?action=getAdminData");
                const data = await response.json();
                fullData = data;
                
                document.getElementById('rev-val').innerText = "฿" + data.summary.revenue.toLocaleString();
                document.getElementById('prof-val').innerText = "฿" + (data.summary.grossProfit || 0).toLocaleString();
                document.getElementById('order-count').innerText = data.summary.report.reduce((s,i)=>s+i.qty,0);

                if (data.calls?.length > 0) {
                    document.getElementById('call-table-no').innerText = data.calls[data.calls.length - 1].table;
                    document.getElementById('call-notify').style.display = 'block';
                } else { document.getElementById('call-notify').style.display = 'none'; }

                renderOrders(data.orders);
                renderStock(data.menu);
                renderPerformance(data.summary.report);
                
                const avg = (data.orders.reduce((s,o) => s + getTimeDiff(o.time), 0) / (data.orders.length || 1)).toFixed(1);
                document.getElementById('avg-speed').innerText = avg + " MINS";
                
                if(!salesChartInst) drawChart(data.summary.peakHours);
            } catch(e) { console.error("Sync Error:", e); }
        }

        function renderOrders(orders) {
            const store = document.getElementById('order-sec');
            const takeaway = document.getElementById('takeaway-sec');
            let groups = {};
            orders.forEach(o => {
                if(!groups[o.table]) groups[o.table] = {items:[], total:0, rows:[], time:o.time, status: o.status};
                groups[o.table].items.push(o);
                groups[o.table].total += parseFloat(String(o.total).replace(/,/g,'')) || 0;
                groups[o.table].rows.push(o.rowNum);
            });

            const generateCards = (isStore) => {
                let html = "";
                Object.keys(groups).filter(t => isStore ? !isNaN(t) : isNaN(t)).forEach(t => {
                    const wait = getTimeDiff(groups[t].time);
                    html += `
                    <div class="order-card">
                        <div class="card-head">
                            <div><b style="font-size:20px;">${isNaN(t)?t:'TABLE '+t}</b><br>
                            <span class="status-line"><div class="status-dot"></div>${groups[t].items[0].status}</span></div>
                            <small style="color:var(--text-muted); font-weight:700;">${wait} MINS AGO</small>
                        </div>
                        <div class="card-body">
                            <div style="flex-grow:1;">
                                ${groups[t].items.map(i => `
                                    <div class="item-row">
                                        <div class="item-info"><b>${i.qty}x ${i.menu}</b><small>${i.details}</small>
                                        <button class="btn-void" onclick="actionCall('voidItem', {rowNum: ${i.rowNum}})">VOID</button></div>
                                        <b style="font-size:15px;">฿${i.total}</b>
                                    </div>`).join('')}
                            </div>
                            <hr style="border:none; border-top:1px dashed var(--border); margin:15px 0;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:22px; font-weight:800;">฿${groups[t].total.toLocaleString()}</span>
                                <div style="display:flex; gap:5px;">
                                    <button class="btn-outline" onclick="actionCall('updateStatus', {rowNums: ${JSON.stringify(groups[t].rows)}, nextStatus: 'กำลังทำ'})">COOK</button>
                                    <button class="btn-outline" onclick="actionCall('updateStatus', {rowNums: ${JSON.stringify(groups[t].rows)}, nextStatus: 'รอเสิร์ฟ'})">SERVE</button>
                                </div>
                            </div>
                            <button class="btn-black" onclick="openPayModal('${t}')">COLLECT PAYMENT</button>
                        </div>
                    </div>`;
                });
                return html || `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--text-muted); font-size:12px;">NO ORDERS</div>`;
            }
            store.innerHTML = generateCards(true);
            takeaway.innerHTML = generateCards(false);
        }

        // --- 💰 PAYMENT & CDS SYNC ---
        function openPayModal(tableId) {
            const orders = fullData.orders.filter(o => o.table.toString() === tableId.toString());
            if(!orders.length) return;
            pTable = tableId; pRows = orders.map(o => o.rowNum);
            pTotal = orders.reduce((s,o) => s + (parseFloat(String(o.total).replace(/,/g,'')) || 0), 0);

            document.getElementById('p-table-title').innerText = isNaN(tableId) ? tableId : "TABLE " + tableId;
            document.getElementById('p-total-price').innerText = "฿" + pTotal.toLocaleString();
            document.getElementById('p-bill-items').innerHTML = orders.map(i => `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px;">
                    <span>${i.qty}x ${i.menu}</span><b>฿${i.total}</b>
                </div>`).join('');
            
            // ยิงไปหน้า CDS (Display)
            actionCall('setPaymentStatus', {table: tableId, status: 'paying'});
            localStorage.setItem('cds_cash_received', '0');

            document.getElementById('p-qr-area').style.display = 'none';
            document.getElementById('p-cash-area').style.display = 'none';
            document.getElementById('p-methods').style.display = 'grid';
            document.getElementById('pay-modal').style.display = 'flex';
        }

        function selectPayMethod(m) {
            document.getElementById('p-methods').style.display = 'none';
            if(m === 'qr') {
                document.getElementById('p-qr-img').src = `https://promptpay.io/0931805507/${pTotal}.png`;
                document.getElementById('p-qr-area').style.display = 'block';
            } else {
                document.getElementById('p-cash-input').value = "";
                document.getElementById('p-cash-area').style.display = 'block';
                setTimeout(() => document.getElementById('p-cash-input').focus(), 100);
            }
        }

        function calcChange() {
            const rec = parseFloat(document.getElementById('p-cash-input').value) || 0;
            const diff = rec - pTotal;
            localStorage.setItem('cds_cash_received', rec.toString());
            const display = document.getElementById('p-change-display');
            const submit = document.getElementById('p-cash-submit');
            if(rec >= pTotal) {
                display.innerText = "CHANGE: ฿" + diff.toLocaleString();
                display.style.display = 'block'; submit.style.display = 'block';
            } else { display.style.display = 'none'; submit.style.display = 'none'; }
        }

        async function finalPay(method) {
            if(!confirm(`Confirm ${method} payment?`)) return;
            await actionCall('setPaymentStatus', {table: pTable, status: 'idle'});
            await actionCall('markMultipleDone', {rowNums: pRows, paymentMethod: method});
            localStorage.setItem('cds_cash_received', '0');
            document.getElementById('pay-modal').style.display = 'none';
            refresh();
        }

        function closePayModal() {
            actionCall('setPaymentStatus', {table: pTable, status: 'idle'});
            localStorage.setItem('cds_cash_received', '0');
            document.getElementById('pay-modal').style.display = 'none';
        }

        // --- 📊 REPORTING ---
        function renderPerformance(report) {
            document.getElementById('report-date-text').innerText = new Date().toLocaleDateString('en-GB', {dateStyle:'full'}).toUpperCase();
            document.getElementById('report-content').innerHTML = `
                <table class="report-table">
                    <thead><tr><th>Product</th><th style="text-align:center;">Sold</th><th style="text-align:right;">Profit</th></tr></thead>
                    <tbody>${report.map(i => `<tr><td><b>${i.name}</b></td><td style="text-align:center;">${i.qty}</td><td style="text-align:right; font-weight:700;">฿${(i.profit || 0).toLocaleString()}</td></tr>`).join('')}</tbody>
                </table>`;
        }

        // --- 📋 STOCK & ATTENDANCE ---
        function renderStock(menu) {
            document.getElementById('stock-list-body').innerHTML = menu.map(m => `
                <div style="display:flex; justify-content:space-between; padding:15px 20px; border-bottom:1px solid var(--border); align-items:center;">
                    <span><b>${m[0]}</b><br><small style="color:var(--text-muted);">Cost ฿${m[6]||0}</small></span>
                    <button class="btn-outline" onclick="actionCall('updateStock', {type:'menu', name:'${m[0]}', status:'${m[5]=='หมด'?'ปกติ':'หมด'}'})">${m[5]||'NORMAL'}</button>
                </div>`).join('');
        }

        // --- ⚡ SPEED BRIDGE ---
        async function actionCall(action, params) {
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, ...params }) });
                if(action !== 'setPaymentStatus') refresh();
            } catch(e) { console.error("Action Error:", e); }
        }

        function getTimeDiff(timeStr) {
            const now = new Date(); const dateObj = new Date(timeStr);
            return isNaN(dateObj.getTime()) ? 0 : Math.floor((now - dateObj) / 60000);
        }

        function showSec(n) {
            ['order-sec', 'takeaway-sec', 'stock-sec', 'report-sec'].forEach(s => document.getElementById(s).style.display = 'none');
            document.getElementById(n + '-sec').style.display = (n === 'report' ? 'block' : 'grid');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 't-' + n));
        }

        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        function drawChart(data) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            salesChartInst = new Chart(ctx, { type: 'bar', data: { labels: Array.from({length:24},(_,i)=>i+":00"), datasets:[{data: data, backgroundColor:'#000', borderRadius:2}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}}});
        }

        setInterval(updateClock, 1000); refresh(); setInterval(refresh, 8000);
    </script>
</body>
</html>
