<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --bg: #fcfcfd; --surface: #ffffff; --p: #111827; --muted: #6b7280;
            --blue: #111827; --indigo: #111827; --emerald: #111827; --rose: #ef4444; --slate: #f1f5f9;
            --border: #e5e7eb; --radius: 12px;
            --shadow-lux: 0 1px 3px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a; --surface: #121212; --p: #f9fafb; --muted: #a3a3a3;
            --border: #262626; --slate: #1c1c1e;
        }

        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; letter-spacing: -0.01em; }
        body { background: var(--bg); color: var(--p); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; transition: 0.3s; }

        .admin-wrapper { max-width: 1500px; margin: 0 auto; }

        .alert-toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; background: #000; color: #fff; padding: 15px 35px; border-radius: 8px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: pointer; font-size: 14px; text-transform: uppercase; }

        .header-box { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 30px; }
        .brand h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .brand span { color: var(--muted); font-weight: 300; }
        
        .stat-wrap { display: flex; gap: 12px; }
        .s-card { background: var(--surface); padding: 15px 25px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-lux); text-align: center; min-width: 150px; }
        .s-card small { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .s-card b { font-size: 22px; font-weight: 700; display: block; margin-top: 4px; }

        .nav-sc { background: var(--slate); padding: 4px; border-radius: 8px; display: inline-flex; margin-bottom: 25px; border: 1px solid var(--border); }
        .nav-sc button { padding: 8px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; background: transparent; color: var(--muted); font-size: 13px; transition: 0.2s; }
        .nav-sc button.active { background: var(--surface); color: var(--p); box-shadow: var(--shadow-lux); }

        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .order-card { background: var(--surface); border-radius: 16px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow-lux); display: flex; flex-direction: column; }
        
        .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .table-id { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; text-transform: uppercase; }
        .wait-time { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--slate); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
        .wait-time.urgent { background: #000; color: #fff; border-color: #000; }

        .status-badge { background: var(--slate); color: var(--p); padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; border: 1px solid var(--border); width: fit-content; text-transform: uppercase; }
        .status-dot { width: 6px; height: 6px; background: var(--p); border-radius: 50%; }

        .items-list { margin: 10px 0 20px 0; border-top: 1px solid var(--border); padding-top: 15px; flex-grow: 1; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .item-row:last-child { border-bottom: none; }
        .item-row b { font-size: 15px; font-weight: 600; color: var(--p); }
        .item-row small { color: var(--muted); font-size: 12px; display: block; margin-top: 2px; }
        
        .btn-void { background: none; border: none; color: var(--rose); cursor: pointer; font-size: 11px; font-weight: 500; text-decoration: underline; padding: 0; }

        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-s { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; background: var(--surface); color: var(--p); transition: 0.2s; text-transform: uppercase; }
        .btn-s:hover { background: #000; color: #fff; border-color: #000; }
        
        .flash-emerald, .flash-amber, .flash-blue { background: #000 !important; color: #fff !important; border-color: #000 !important; }

        .btn-checkout { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #000; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-checkout:hover { opacity: 0.8; }

        .report-card { background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-lux); margin-top: 30px; }
        .table-pro { width: 100%; border-collapse: collapse; }
        .table-pro th { text-align: left; padding: 12px; font-size: 11px; color: var(--muted); border-bottom: 2px solid var(--p); text-transform: uppercase; font-weight: 700; }
        .table-pro td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        #pay-modal { position:fixed; inset:0; background:rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); display:none; z-index:9999; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: var(--surface); width: 100%; max-width: 440px; padding: 35px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 25px 0; }
        .pay-tile { padding: 20px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
        .pay-tile:hover { background: #000; color: #fff; border-color: #000; }

        input[type="number"] { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 20px; text-align: center; font-weight: 700; background: var(--bg); color: var(--p); }

        .sound-fixed { display: none !important; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .header-box { flex-direction: column; align-items: flex-start; gap: 15px; }
            .stat-wrap { width: 100%; justify-content: space-between; }
            .order-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="call-toast" class="alert-toast" onclick="clearSpecificCall()">
        โต๊ะ <span id="call-table-no">-</span> เรียกพนักงาน (แตะเพื่อรับทราบ)
    </div>

    <div class="admin-wrapper">
        <div class="header-box">
            <div class="brand">
                <h1>WITHU <span>ADMIN</span></h1>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button class="wait-time" onclick="toggleTheme()" style="cursor:pointer; border:1px solid var(--border);">สลับธีม</button>
                    <button class="wait-time" onclick="toggleLayout()" style="cursor:pointer; border:1px solid var(--border);">ย่อ/ขยาย</button>
                </div>
            </div>
            <div class="stat-wrap">
                <div class="s-card"><small>กำไรสุทธิวันนี้</small><b id="gross-profit">฿0</b></div>
                <div class="s-card"><small>ยอดขายวันนี้</small><b id="revenue">฿0</b></div>
            </div>
        </div>

        <div class="nav-sc">
            <button id="nav-orders" onclick="showSec('orders')" class="active">ออเดอร์ค้าง</button>
            <button id="nav-stock" onclick="showSec('stock')">คลังสินค้า</button>
            <button id="nav-report" onclick="showSec('report')">รายงานสรุป</button>
        </div>

        <div id="container" class="order-grid"></div>
        <div id="stock-sec" style="display:none;" class="order-grid"></div>

        <div id="report-sec" style="display:none;">
            <div style="background:var(--surface); padding:30px; border-radius:16px; border:1px solid var(--border); margin-bottom:30px; box-shadow: var(--shadow-lux);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h3 style="margin:0; font-size:16px; font-weight:700; text-transform:uppercase;">วิเคราะห์ยอดขาย</h3>
                    <div style="display:flex; gap:8px;">
                        <button class="wait-time active" id="btn-peak" onclick="switchChart('peak')" style="cursor:pointer; border:1px solid var(--border);">รายชั่วโมง</button>
                        <button class="wait-time" id="btn-day" onclick="switchChart('day')" style="cursor:pointer; border:1px solid var(--border);">รายวัน</button>
                    </div>
                </div>
                <div style="height:220px; position:relative;"><canvas id="salesChart"></canvas></div>
            </div>
            
            <div class="report-card">
                <h3 style="margin:0 0 25px 0; font-size:16px; font-weight:700; text-transform:uppercase;">สรุปยอดแยกตามเมนู</h3>
                <div id="report-list"></div>
            </div>
        </div>
    </div>

    <div id="pay-modal">
        <div class="modal-content">
            <h2 id="p-table-title" style="margin:0; font-size:24px; font-weight:700; letter-spacing:-0.5px;">โต๊ะ -</h2>
            <div id="p-bill-items" style="background:var(--slate); padding:15px; border-radius:8px; margin:20px 0; text-align:left; max-height:180px; overflow-y:auto; border:1px solid var(--border);"></div>
            <small style="color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; font-size:11px;">ยอดรวมที่ต้องชำระ</small>
            <div id="p-total-price" style="font-size:48px; font-weight:800; color:var(--p); margin:5px 0 20px 0; letter-spacing:-1px;">฿0</div>

            <div id="p-methods" class="pay-grid">
                <div class="pay-tile" onclick="selectPayMethod('qr')">พร้อมเพย์</div>
                <div class="pay-tile" onclick="selectPayMethod('cash')">เงินสด</div>
            </div>

            <div id="p-qr-area" style="display:none; margin-top:15px;">
                <img id="p-qr-img" style="width:200px; height:200px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px; display:inline-block;">
                <button class="btn-checkout" onclick="finalPay('พร้อมเพย์')">ยืนยันได้รับเงินแล้ว</button>
            </div>

            <div id="p-cash-area" style="display:none; margin-top:15px;">
                <input type="number" id="p-cash-input" placeholder="จำนวนเงินที่รับ" oninput="calcChangeUnified()">
                <div id="p-change-display" style="font-size:24px; font-weight:700; color:var(--p); margin:15px 0; display:none;"></div>
                <button id="p-cash-submit" class="btn-checkout" style="background:#000; display:none;" onclick="finalPay('เงินสด')">ปิดบิล (เงินสด)</button>
            </div>

            <button onclick="closePayModal()" style="margin-top:25px; background:none; border:none; color:var(--muted); cursor:pointer; font-weight:600; font-size:13px; text-decoration:underline;">ยกเลิก / กลับหน้าหลัก</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 
        let salesChartInst = null, currentChartMode = 'peak', fullData = null, activeAlertTable = null;
        let pTable = "", pTotal = 0, pRows = [];
        let lastActionMap = {}; 

        async function refresh() {
            try {
                const r = await fetch(API_URL + "?action=getAdminData");
                const d = await r.json();
                if (!d) return;
                fullData = d;

                document.getElementById('revenue').innerText = "฿" + d.summary.revenue.toLocaleString();
                document.getElementById('gross-profit').innerText = "฿" + (d.summary.grossProfit || 0).toLocaleString();

                if (d.calls?.length > 0) {
                    activeAlertTable = d.calls[d.calls.length - 1].table;
                    document.getElementById('call-table-no').innerText = activeAlertTable;
                    document.getElementById('call-toast').style.display = 'block';
                } else {
                    document.getElementById('call-toast').style.display = 'none';
                }

                const container = document.getElementById('container'); 
                if(!d.orders?.length){ 
                    container.innerHTML="<div style='grid-column:1/-1;text-align:center;padding:100px;color:var(--muted);font-weight:600;font-size:14px;'>ไม่มีออเดอร์ค้างในขณะนี้</div>"; 
                } else {
                    let groups={}; d.orders.forEach(o=>{
                        if(!groups[o.table]) groups[o.table]={items:[], total:0, rows:[], time:o.time}; 
                        groups[o.table].items.push(o); 
                        groups[o.table].total += parseFloat(String(o.total).replace(/,/g,'')) || 0; 
                        groups[o.table].rows.push(o.rowNum);
                    });

                    container.innerHTML = Object.keys(groups).map(t => {
                        const wait = getTimeDiff(groups[t].time);
                        const lastAction = lastActionMap[t] || "รอรับงาน";
                        return `
                        <div class="order-card">
                            <div class="card-head">
                                <h2 class="table-id">${isNaN(t) ? t : 'โต๊ะ ' + t}</h2>
                                <span class="wait-time ${wait > 15 ? 'urgent' : ''}">${wait} นาทีที่แล้ว</span>
                            </div>
                            <div class="status-badge">
                                <div class="status-dot"></div> 
                                ล่าสุด: ${lastAction}
                            </div>
                            <div class="items-list">
                                ${groups[t].items.map(i=>`
                                    <div class="item-row">
                                        <div><b>${i.qty}x ${i.menu}</b><br><small>${i.details || '-'}</small></div>
                                        <div style="text-align:right;">
                                            <div style="font-weight:700; font-size:14px; margin-bottom:4px;">฿${i.total}</div>
                                            <button class="btn-void" onclick="voidIt(${i.rowNum})">ลบรายการ</button>
                                        </div>
                                    </div>`).join('')}
                            </div>
                            <div class="btn-group">
                                <button class="btn-s" onclick="applyEffect(this, 'amber', '${t}', 'กำลังทำ', () => upS('${t}', 'กำลังทำ'))">เตรียม</button>
                                <button class="btn-s" onclick="applyEffect(this, 'emerald', '${t}', 'รอเสิร์ฟ', () => upS('${t}', 'รอเสิร์ฟ'))">เสิร์ฟ</button>
                                <button class="btn-s" onclick="applyEffect(this, 'blue', '${t}', 'สำเร็จแล้ว', () => upS('${t}', 'สำเร็จ'))">จบงาน</button>
                            </div>
                            <div style="font-size:24px; font-weight:700; text-align:right; margin-bottom:15px; letter-spacing:-0.5px;">฿${groups[t].total.toLocaleString()}</div>
                            <button class="btn-checkout" onclick="openPayModal('${t}')">เช็คบิล / เก็บเงิน</button>
                        </div>`}).join('');
                }
                renderStock(d.menu);
                renderReport(d.summary.report);
                drawChart();
            } catch(e){ console.error("Refresh UI Error:", e); }
        }

        function applyEffect(el, color, table, actionName, callback) {
            lastActionMap[table] = actionName;
            el.classList.add('flash-' + color);
            setTimeout(() => { el.classList.remove('flash-' + color); callback(); }, 300);
        }

        async function clearSpecificCall() {
            if (!activeAlertTable) return;
            const targetTable = activeAlertTable;
            document.getElementById('call-toast').style.display = 'none';
            await fetch(API_URL + "?action=clearCall&table=" + targetTable);
            refresh();
        }

        function openPayModal(tableId) {
            const tableOrders = fullData.orders.filter(o => o.table.toString() === tableId.toString());
            if (tableOrders.length === 0) return;

            pTable = tableId;
            pRows = tableOrders.map(o => o.rowNum);
            pTotal = tableOrders.reduce((sum, o) => sum + (parseFloat(String(o.total).replace(/,/g,'')) || 0), 0);

            document.getElementById('p-table-title').innerText = isNaN(tableId) ? tableId : "โต๊ะ " + tableId;
            document.getElementById('p-total-price').innerText = "฿" + pTotal.toLocaleString();
            document.getElementById('p-bill-items').innerHTML = tableOrders.map(i => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px;">
                    <span>${i.qty}x ${i.menu}</span>
                    <b>฿${parseFloat(String(i.total).replace(/,/g,'')).toLocaleString()}</b>
                </div>`).join('');
            
            // ส่งสัญญาณเรียกเก็บเงินไปหน้าจอตัวแสดงผลฝั่งลูกค้า (display.html)
            fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:tableId, status:'paying'})});
            localStorage.setItem('cds_cash_received', '0');

            document.getElementById('p-qr-area').style.display = 'none';
            document.getElementById('p-cash-area').style.display = 'none';
            document.getElementById('p-methods').style.display = 'grid';
            document.getElementById('pay-modal').style.display = 'flex';
        }

        function selectPayMethod(m) {
            document.getElementById('p-methods').style.display = 'none';
            if(m === 'qr') {
                document.getElementById('p-qr-img').src = `https://promptpay.io/0931805507/${pTotal}.png`;
                document.getElementById('p-qr-area').style.display = 'block';
            } else {
                document.getElementById('p-cash-input').value = "";
                document.getElementById('p-change-display').style.display = 'none';
                document.getElementById('p-cash-submit').style.display = 'none';
                document.getElementById('p-cash-area').style.display = 'block';
                setTimeout(()=>document.getElementById('p-cash-input').focus(), 100);
            }
        }

        function calcChangeUnified() {
            const received = parseFloat(document.getElementById('p-cash-input').value) || 0;
            const change = received - pTotal;
            
            // ซิงค์จำนวนเงินสดที่ได้รับไปยังจอหน้าบ้านแบบ Real-time
            localStorage.setItem('cds_cash_received', received.toString());

            if(received >= pTotal) {
                document.getElementById('p-change-display').innerText = "เงินทอน: ฿" + change.toLocaleString();
                document.getElementById('p-change-display').style.display = 'block';
                document.getElementById('p-cash-submit').style.display = 'block';
            } else {
                document.getElementById('p-change-display').style.display = 'none';
                document.getElementById('p-cash-submit').style.display = 'none';
            }
        }

        async function finalPay(method) {
            if(confirm(`ยืนยันการรับชำระเงินด้วย ${method}?`)) {
                await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:pTable, status:'idle'})});
                await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'markMultipleDone', rowNums:pRows, paymentMethod:method})});
                localStorage.setItem('cds_cash_received', '0');
                closePayModal(); 
                refresh();
            }
        }

        function closePayModal() { 
            fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:pTable, status:'idle'})});
            localStorage.setItem('cds_cash_received', '0');
            document.getElementById('pay-modal').style.display = 'none'; 
        }

        function drawChart() {
            if(!fullData || !fullData.summary) return;
            const ctx = document.getElementById('salesChart').getContext('2d');
            if(salesChartInst) salesChartInst.destroy();
            let labels = [], data = [];
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if(currentChartMode === 'peak') {
                labels = Array.from({length: 24}, (_, i) => i + ":00");
                data = fullData.summary.peakHours;
            } else {
                labels = fullData.summary.chartDaily.map(i => i.date);
                data = fullData.summary.chartDaily.map(i => i.total);
            }
            salesChartInst = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ data, backgroundColor: isDark ? '#ffffff' : '#111827', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: isDark ? '#262626' : '#f3f4f6' } }, x: { grid: { display: false } } } }
            });
        }

        function switchChart(mode) { 
            currentChartMode = mode; 
            document.getElementById('btn-peak').classList.toggle('active', mode==='peak');
            document.getElementById('btn-day').classList.toggle('active', mode==='day');
            drawChart();
        }

        function renderStock(menu) { 
            if(!menu) return;
            document.getElementById('stock-sec').innerHTML = menu.map(m=>`
                <div class="order-card" style="padding:20px; flex-direction:row; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:15px;">${m[0]}</b><br><small style="color:var(--muted)">ต้นทุน ฿${m[6]||0}</small></div>
                    <button style="padding:8px 18px; border-radius:6px; border:1px solid var(--border); background:${m[5]=='หมด'?'#000':'var(--surface)'}; color:${m[5]=='หมด'?'#fff':'var(--p)'}; cursor:pointer; font-weight:600; font-size:12px;" onclick="tgS('menu','${m[0]}','${m[5]=='หมด'?'ปกติ':'หมด'}')">${m[5]=='หมด'?'เติมสินค้า':'ปกติ'}</button>
                </div>`).join(''); 
        }

        function renderReport(report) { 
            if(!report) return;
            document.getElementById('report-list').innerHTML = `
            <table class="table-pro">
                <thead><tr><th>สินค้า</th><th style="text-align:center;">จำนวน</th><th style="text-align:right;">กำไรสุทธิ</th></tr></thead>
                <tbody>${report.map(i => `
                    <tr>
                        <td style="font-weight:600;">${i.name}</td>
                        <td style="text-align:center; font-weight:600;">${i.qty} ชิ้น</td>
                        <td style="text-align:right; font-weight:700;">฿${(i.profit || 0).toLocaleString()}</td>
                    </tr>`).join('')}
                </tbody>
            </table>`; 
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
            if(salesChartInst) setTimeout(drawChart, 100);
        }

        function toggleLayout() {
            const current = document.body.getAttribute('data-layout');
            document.body.setAttribute('data-layout', current === 'compact' ? 'normal' : 'compact');
        }

        function getTimeDiff(timeStr) { 
            if (!timeStr) return 0;
            const now = new Date();
            const dateObj = new Date(timeStr);
            if (!isNaN(dateObj.getTime())) return Math.floor((now - dateObj) / 60000);
            try {
                const [d, t] = timeStr.split(' '); 
                const [day, month, year] = d.split('/'); 
                const [h, m, s] = t.split(':'); 
                return Math.floor((now - new Date(year, month-1, day, h, m, s)) / 60000); 
            } catch(e) { return 0; }
        }

        function showSec(n) { document.getElementById('container').style.display=(n==='orders'?'grid':'none'); document.getElementById('stock-sec').style.display=(n==='stock'?'grid':'none'); document.getElementById('report-sec').style.display=(n==='report'?'block':'none'); document.querySelectorAll('.nav-sc button').forEach(b => b.classList.toggle('active', b.id==='nav-'+n)); }
        async function voidIt(r) { if(confirm("ต้องการลบรายการอาหารนี้ออกจากออเดอร์ค้าง?")){ await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'voidItem',rowNum:r})}); refresh(); } }
        async function upS(tableId, status) { 
            const rows = fullData.orders.filter(o => o.table.toString() === tableId.toString()).map(o => o.rowNum);
            if (rows.length === 0) return;
            await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStatus',rowNums:rows,nextStatus:status})}); 
            refresh(); 
        }
        async function tgS(type,name,status) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStock',type:type,name:name,status:status})}); refresh(); }

        refresh(); setInterval(refresh, 5000);
    </script>
</body>
