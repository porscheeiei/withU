<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU Admin | Master Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --bg: #fcfcfd; --card: #ffffff; --p: #111827; --muted: #6b7280;
            --blue: #2563eb; --indigo: #4f46e5; --emerald: #10b981; --rose: #ef4444; --slate: #f1f5f9;
            --border: #e5e7eb; --radius-xl: 30px;
            --shadow-lux: 0 10px 15px -3px rgba(0, 0, 0, 0.02), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
            --shadow-float: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg: #030712; --card: #111827; --p: #f9fafb; --muted: #9ca3af;
            --border: #1f2937; --slate: #1f2937;
        }

        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; letter-spacing: -0.01em; }
        body { background: var(--bg); color: var(--p); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; transition: 0.3s; }

        .admin-wrapper { max-width: 1500px; margin: 0 auto; }

        .alert-toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; background: var(--rose); color: #fff; padding: 18px 40px; border-radius: 50px; font-weight: 800; box-shadow: 0 15px 40px rgba(239, 68, 68, 0.4); animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }

        .header-box { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 30px; }
        .brand h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1.5px; }
        .brand span { color: var(--blue); }
        
        .stat-wrap { display: flex; gap: 12px; }
        .s-card { background: var(--card); padding: 15px 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-lux); text-align: center; min-width: 140px; }
        .s-card small { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .s-card b { font-size: 24px; font-weight: 900; display: block; }

        .nav-sc { background: var(--slate); padding: 5px; border-radius: 15px; display: inline-flex; margin-bottom: 25px; }
        .nav-sc button { padding: 10px 24px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--muted); font-size: 13px; transition: 0.2s; }
        .nav-sc button.active { background: #fff; color: var(--p); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .order-card { background: var(--card); border-radius: 35px; padding: 30px; border: 1px solid var(--border); box-shadow: var(--shadow-lux); transition: 0.3s; display: flex; flex-direction: column; }
        .order-card:hover { transform: translateY(-5px); border-color: var(--blue); box-shadow: var(--shadow-float); }
        
        .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .table-id { font-size: 36px; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .wait-time { font-size: 11px; font-weight: 800; color: var(--muted); background: var(--slate); padding: 5px 12px; border-radius: 50px; }
        .wait-time.urgent { background: var(--rose); color: #fff; }

        .status-badge { background: #f0f7ff; color: var(--blue); padding: 10px 18px; border-radius: 15px; font-size: 13px; font-weight: 800; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; border: 1px solid rgba(37, 99, 235, 0.1); width: fit-content; }
        .status-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; }

        .items-list { margin: 10px 0 20px 0; border-top: 1px solid var(--slate); padding-top: 15px; flex-grow: 1; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.02); }
        .item-row b { font-size: 16px; font-weight: 700; color: var(--p); }

        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-s { padding: 12px; border: none; border-radius: 15px; font-weight: 800; font-size: 11px; cursor: pointer; background: var(--slate); color: var(--muted); transition: 0.2s; }
        
        .flash-emerald { background: var(--emerald) !important; color: #fff !important; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        .flash-amber { background: #f59e0b !important; color: #fff !important; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3); }
        .flash-blue { background: var(--blue) !important; color: #fff !important; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }

        .btn-checkout { width: 100%; padding: 20px; border-radius: 22px; border: none; background: var(--p); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .report-card { background: var(--card); padding: 30px; border-radius: 35px; border: 1px solid var(--border); box-shadow: var(--shadow-lux); margin-top: 30px; }
        .table-pro { width: 100%; border-collapse: collapse; }
        .table-pro th { text-align: left; padding: 15px; font-size: 12px; color: var(--muted); border-bottom: 2px solid var(--slate); }
        .table-pro td { padding: 18px 15px; border-bottom: 1px solid var(--slate); font-size: 15px; }

        #pay-modal { position:fixed; inset:0; background:rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); display:none; z-index:9999; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 480px; padding: 40px; border-radius: 45px; box-shadow: 0 40px 100px rgba(0,0,0,0.25); text-align: center; position: relative; }
        
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .pay-tile { padding: 30px 15px; border: 3px solid var(--border); border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .pay-tile:hover { border-color: var(--blue); background: var(--slate); }
        .pay-tile b { display: block; margin-top: 15px; font-size: 14px; font-weight: 800; }
        .pay-tile img { width: 45px; }

        .sound-fixed { position: fixed; bottom: 30px; right: 30px; background: var(--p); color: #fff; padding: 15px 30px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        @media (max-width: 480px) {
            .order-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 30px 20px; }
            .table-id { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div id="call-toast" class="alert-toast" onclick="clearSpecificCall()">
        🚨 โต๊ะ <span id="call-table-no">-</span> เรียกพนักงาน! (แตะเพื่อรับทราบ)
    </div>

    <div class="admin-wrapper">
        <div class="header-box">
            <div class="brand">
                <h1>WITHU <span>Admin</span></h1>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="wait-time" onclick="toggleTheme()" style="cursor:pointer; border:none;">สลับธีม</button>
                    <button class="wait-time" onclick="toggleLayout()" style="cursor:pointer; border:none;">ย่อ/ขยาย</button>
                </div>
            </div>
            <div class="stat-wrap">
                <div class="s-card"><small>กำไรสุทธิวันนี้</small><b id="gross-profit" style="color:var(--emerald);">฿0</b></div>
                <div class="s-card"><small>ยอดขายวันนี้</small><b id="revenue" style="color:var(--blue);">฿0</b></div>
            </div>
        </div>

        <div class="nav-sc">
            <button id="nav-orders" onclick="showSec('orders')" class="active">ออเดอร์ค้าง</button>
            <button id="nav-stock" onclick="showSec('stock')">คลังสินค้า</button>
            <button id="nav-report" onclick="showSec('report')">รายงานสรุป</button>
        </div>

        <div id="container" class="order-grid"></div>
        <div id="stock-sec" style="display:none;" class="order-grid"></div>

        <div id="report-sec" style="display:none;">
            <div style="background:#fff; padding:35px; border-radius:40px; box-shadow:var(--shadow-lux); border:1px solid var(--border); margin-bottom:30px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h3 style="margin:0; font-size:20px; font-weight:800;">วิเคราะห์ยอดขาย</h3>
                    <div style="display:flex; gap:10px;">
                        <button class="wait-time active" id="btn-peak" onclick="switchChart('peak')" style="cursor:pointer; border:none;">รายชั่วโมง</button>
                        <button class="wait-time" id="btn-day" onclick="switchChart('day')" style="cursor:pointer; border:none;">รายวัน</button>
                    </div>
                </div>
                <canvas id="salesChart" height="110"></canvas>
            </div>
            
            <div class="report-card">
                <h3 style="margin:0 0 25px 0; font-size:20px; font-weight:800;">สรุปยอดแยกตามเมนู</h3>
                <div id="report-list"></div>
            </div>
        </div>
    </div>

    <div id="pay-modal">
        <div class="modal-content">
            <h2 id="p-table-title" style="margin:0; font-size:38px; font-weight:900; letter-spacing:-2px;">โต๊ะ -</h2>
            <div id="p-bill-items" style="background:var(--slate); padding:20px; border-radius:20px; margin:25px 0; text-align:left; max-height:200px; overflow-y:auto;"></div>
            <small style="color:var(--muted); font-weight:800; text-transform:uppercase;">ยอดรวมที่ต้องชำระ</small>
            <div id="p-total-price" style="font-size:64px; font-weight:900; color:var(--p); margin-bottom:15px; letter-spacing:-3px;">฿0</div>

            <div id="p-methods" class="pay-grid">
                <div class="pay-tile" onclick="selectPayMethod('qr')">
                    <img src="https://img.icons8.com/fluency/96/qr-code.png"><br><b>พร้อมเพย์</b>
                </div>
                <div class="pay-tile" onclick="selectPayMethod('cash')">
                    <img src="https://img.icons8.com/fluency/96/money-bag.png"><br><b>เงินสด</b>
                </div>
            </div>

            <div id="p-qr-area" style="display:none; margin-top:20px; animation: fadeIn 0.3s;">
                <img id="p-qr-img" style="width:240px; border-radius:25px; border:1px solid #eee; margin-bottom:20px;">
                <button class="btn-checkout" style="background:var(--emerald);" onclick="finalPay('พร้อมเพย์')">ยืนยันได้รับเงินแล้ว</button>
            </div>

            <div id="p-cash-area" style="display:none; margin-top:20px; animation: fadeIn 0.3s;">
                <input type="number" id="p-cash-input" style="width:100%; padding:18px; border-radius:15px; border:2.5px solid var(--blue); font-size:36px; text-align:center; font-weight:900; outline:none;" placeholder="0" oninput="calcChangeUnified()">
                <div id="p-change-display" style="font-size:38px; font-weight:900; color:var(--emerald); margin:15px 0; display:none;">ทอน: ฿0</div>
                <button id="p-cash-submit" class="btn-checkout" style="background:var(--rose); display:none;" onclick="finalPay('เงินสด')">ปิดบิล (เงินสด)</button>
            </div>

            <button onclick="closePayModal()" style="margin-top:30px; background:none; border:none; color:var(--muted); cursor:pointer; font-weight:700; font-size:14px;">← กลับหน้าหลัก / ยกเลิก</button>
        </div>
    </div>

    <button class="sound-fixed" onclick="unlockSound(); this.remove();">🔔 เปิดระบบเสียง</button>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby44H45TkcHfdV46WEcR_vdB7hlKdHx4cbGAD6aXZsZqRJY21e8lsb_GNhqWwA8MFy5Cw/exec"; 
        let salesChartInst = null, currentChartMode = 'peak', fullData = null, activeAlertTable = null;
        let pTable = "", pTotal = 0, pRows = [];
        let lastActionMap = {}; 
        let orderSound = new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_7325997672.mp3');
        let isSoundUnlocked = false;

        function unlockSound() { isSoundUnlocked = true; orderSound.play().then(()=>orderSound.pause()); }

        async function refresh() {
            try {
                const r = await fetch(API_URL + "?action=getAdminData");
                const d = await r.json();
                if (!d) return;
                fullData = d;

                document.getElementById('revenue').innerText = "฿" + (d.summary?.revenue || 0).toLocaleString();
                document.getElementById('gross-profit').innerText = "฿" + (d.summary?.grossProfit || 0).toLocaleString();

                if (d.calls?.length > 0) {
                    activeAlertTable = d.calls[d.calls.length - 1].table;
                    document.getElementById('call-table-no').innerText = activeAlertTable;
                    document.getElementById('call-toast').style.display = 'block';
                    if (isSoundUnlocked) orderSound.play();
                } else {
                    document.getElementById('call-toast').style.display = 'none';
                }

                const container = document.getElementById('container'); 
                if(!d.orders?.length){ 
                    container.innerHTML="<div style='grid-column:1/-1;text-align:center;padding:120px;color:var(--muted);font-weight:700;'>ไม่มีออเดอร์ค้างในขณะนี้ ☕️</div>"; 
                } else {
                    let groups={}; d.orders.forEach(o=>{
                        if(!groups[o.table]) groups[o.table]={items:[], total:0, rows:[], time:o.time}; 
                        groups[o.table].items.push(o); 
                        groups[o.table].total += parseFloat(String(o.total).replace(/,/g,'')) || 0; 
                        groups[o.table].rows.push(o.rowNum);
                    });

                    container.innerHTML = Object.keys(groups).map(t => {
                        const wait = getTimeDiff(groups[t].time);
                        const lastAction = lastActionMap[t] || "รอรับงาน";
                        return `
                        <div class="order-card">
                            <div class="card-head">
                                <h2 class="table-id">โต๊ะ ${t}</h2>
                                <span class="wait-time ${wait > 15 ? 'urgent' : ''}">${wait} นาทีที่แล้ว</span>
                            </div>
                            <div class="status-badge">
                                <div class="status-dot"></div> 
                                ล่าสุด: ${lastAction}
                            </div>
                            <div class="items-list">
                                ${groups[t].items.map(i=>`
                                    <div class="item-row">
                                        <div><b>${i.qty}x ${i.menu}</b><br><small style="color:var(--muted)">${i.details}</small></div>
                                        <button style="color:var(--rose); background:none; border:none; font-weight:800; cursor:pointer; font-size:12px;" onclick="voidIt(${i.rowNum})">ลบ</button>
                                    </div>`).join('')}
                            </div>
                            <div class="btn-group">
                                <button class="btn-s" onclick='applyEffect(this, "amber", "${t}", "กำลังทำ", () => upS(${JSON.stringify(groups[t].rows)},"กำลังทำ"))'>เตรียม</button>
                                <button class="btn-s" onclick='applyEffect(this, "emerald", "${t}", "รอเสิร์ฟ", () => upS(${JSON.stringify(groups[t].rows)},"รอเสิร์ฟ"))'>เสิร์ฟ</button>
                                <button class="btn-s" onclick='applyEffect(this, "blue", "${t}", "สำเร็จแล้ว", () => upS(${JSON.stringify(groups[t].rows)},"สำเร็จ"))'>จบงาน</button>
                            </div>
                            <div style="font-size:28px; font-weight:900; text-align:right; margin-bottom:20px; letter-spacing:-1.5px;">฿${groups[t].total.toLocaleString()}</div>
                            <button class="btn-checkout" onclick='openPayModal("${t}", ${groups[t].total}, ${JSON.stringify(groups[t].rows)}, ${JSON.stringify(groups[t].items)})'>เช็คบิล / ปิดโต๊ะ</button>
                        </div>`}).join('');
                }
                renderStock(d.menu);
                renderReport(d.summary.report);
                drawChart();
            } catch(e){ console.error("Refresh Error:", e); }
        }

        function applyEffect(el, color, table, actionName, callback) {
            lastActionMap[table] = actionName;
            el.classList.add('flash-' + color);
            setTimeout(() => { el.classList.remove('flash-' + color); callback(); }, 400);
        }

        async function clearSpecificCall() {
            if (!activeAlertTable) return;
            const targetTable = activeAlertTable;
            document.getElementById('call-toast').style.display = 'none';
            await fetch(API_URL + "?action=clearCall&table=" + targetTable);
            refresh();
        }

        async function openPayModal(table, total, rows, items) {
            pTable = table; pTotal = total; pRows = rows;
            document.getElementById('p-table-title').innerText = "โต๊ะ " + table;
            document.getElementById('p-total-price').innerText = "฿" + total.toLocaleString();
            document.getElementById('p-bill-items').innerHTML = items.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px;"><span>${i.qty}x ${i.menu}</span><b>฿${parseFloat(String(i.total).replace(/,/g,'')).toLocaleString()}</b></div>`).join('');
            fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:table, status:'paying'})});
            document.getElementById('p-qr-area').style.display = 'none';
            document.getElementById('p-cash-area').style.display = 'none';
            document.getElementById('p-methods').style.display = 'grid';
            document.getElementById('pay-modal').style.display = 'flex';
        }

        function selectPayMethod(m) {
            document.getElementById('p-methods').style.display = 'none';
            if(m === 'qr') {
                document.getElementById('p-qr-img').src = `https://promptpay.io/0931805507/${pTotal}.png`;
                document.getElementById('p-qr-area').style.display = 'block';
            } else {
                document.getElementById('p-cash-input').value = "";
                document.getElementById('p-change-display').style.display = 'none';
                document.getElementById('p-cash-submit').style.display = 'none';
                document.getElementById('p-cash-area').style.display = 'block';
                setTimeout(()=>document.getElementById('p-cash-input').focus(), 100);
            }
        }

        function calcChangeUnified() {
            const received = parseFloat(document.getElementById('p-cash-input').value) || 0;
            const change = received - pTotal;
            if(received >= pTotal) {
                document.getElementById('p-change-display').innerText = "เงินทอน: ฿" + change.toLocaleString();
                document.getElementById('p-change-display').style.display = 'block';
                document.getElementById('p-cash-submit').style.display = 'block';
            } else {
                document.getElementById('p-change-display').style.display = 'none';
                document.getElementById('p-cash-submit').style.display = 'none';
            }
        }

        async function finalPay(method) {
            if(confirm(`ยืนยันการรับชำระ ${method} และปิดโต๊ะ ${pTable}?`)) {
                await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:pTable, status:'idle'})});
                await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'markMultipleDone',rowNums:pRows, paymentMethod:method})});
                closePayModal(); refresh();
            }
        }

        function closePayModal() { 
            fetch(API_URL, {method:'POST', body:JSON.stringify({action:'setPaymentStatus', table:pTable, status:'idle'})});
            document.getElementById('pay-modal').style.display = 'none'; 
        }

        function drawChart() {
            if(!fullData) return;
            const ctx = document.getElementById('salesChart').getContext('2d');
            if(salesChartInst) salesChartInst.destroy();
            let labels = [], data = [];
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if(currentChartMode === 'peak') {
                labels = Array.from({length: 24}, (_, i) => i + ":00");
                data = fullData.summary.peakHours;
            } else {
                labels = fullData.summary.chartDaily.map(i => i.date);
                data = fullData.summary.chartDaily.map(i => i.total);
            }
            salesChartInst = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ data, backgroundColor: '#4f46e5', borderRadius: 10 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: isDark ? '#1f2937' : '#f3f4f6' } }, x: { grid: { display: false } } } }
            });
        }

        function switchChart(mode) { 
            currentChartMode = mode; 
            document.getElementById('btn-peak').classList.toggle('active', mode==='peak');
            document.getElementById('btn-day').classList.toggle('active', mode==='day');
            drawChart();
        }

        function renderStock(menu) { 
            if(!menu) return;
            document.getElementById('stock-sec').innerHTML = menu.map(m=>`
                <div class="order-card" style="padding:20px; flex-direction:row; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:16px;">${m[0]}</b><br><small style="color:var(--muted)">ต้นทุน ฿${m[6]||0}</small></div>
                    <button style="padding:8px 18px; border-radius:12px; border:none; background:${m[5]=='หมด'?'var(--rose)':'var(--p)'}; color:#fff; cursor:pointer; font-weight:800; font-size:12px;" onclick="tgS('menu','${m[0]}','${m[5]=='หมด'?'ปกติ':'หมด'}')">${m[5]=='หมด'?'เติมของ':'ปกติ'}</button>
                </div>`).join(''); 
        }

        function renderReport(report) { 
            if(!report) return;
            document.getElementById('report-list').innerHTML = `
            <table class="table-pro">
                <thead><tr><th>สินค้า</th><th style="text-align:center;">จำนวน</th><th style="text-align:right;">กำไรสุทธิ</th></tr></thead>
                <tbody>${report.map(i => `
                    <tr>
                        <td style="font-weight:700;">${i.name}</td>
                        <td style="text-align:center; font-weight:800; color:var(--indigo);">${i.qty} ชิ้น</td>
                        <td style="text-align:right; font-weight:900; color:var(--emerald);">฿${(i.profit || 0).toLocaleString()}</td>
                    </tr>`).join('')}
                </tbody>
            </table>`; 
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
            if(salesChartInst) setTimeout(drawChart, 100);
        }

        function toggleLayout() {
            const current = document.body.getAttribute('data-layout');
            document.body.setAttribute('data-layout', current === 'compact' ? 'normal' : 'compact');
        }

        function getTimeDiff(timeStr) { 
            if (!timeStr) return 0;
            const now = new Date();
            const dateObj = new Date(timeStr);
            if (!isNaN(dateObj.getTime())) return Math.floor((now - dateObj) / 60000);
            try {
                const [d, t] = timeStr.split(' '); 
                const [day, month, year] = d.split('/'); 
                const [h, m, s] = t.split(':'); 
                return Math.floor((now - new Date(year, month-1, day, h, m, s)) / 60000); 
            } catch(e) { return 0; }
        }
        
        function showSec(n) { document.getElementById('container').style.display=(n==='orders'?'grid':'none'); document.getElementById('stock-sec').style.display=(n==='stock'?'grid':'none'); document.getElementById('report-sec').style.display=(n==='report'?'block':'none'); document.querySelectorAll('.nav-sc button').forEach(b => b.classList.toggle('active', b.id==='nav-'+n)); }
        async function voidIt(r) { if(confirm("ลบออเดอร์นี้?")){ await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'voidItem',rowNum:r})}); refresh(); } }
        async function upS(r,s) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStatus',rowNums:r,nextStatus:s})}); refresh(); }
        async function tgS(type,name,status) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStock',type:type,name:name,status:status})}); refresh(); }

        refresh(); setInterval(refresh, 5000);
    </script>
