<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --bg: #f9f9f9; --accent: #16a34a; --red: #8b0000; --blue: #007AFF; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .alert-bar { background: var(--red); color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 25px; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .status-btn { flex:1; padding: 8px; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; margin: 2px; font-family: 'Prompt'; }
        .btn-action { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; font-family: 'Prompt'; }
    </style>
</head>
<body>
    <div id="staff-alert" class="alert-bar" onclick="clearCallAlert()" style="display:none;">โต๊ะ <span id="alert-table"></span> เรียกพนักงาน (คลิกเพื่อปิด)</div>
    <div class="header">
        <h1>WITHU Admin</h1>
        <div>ยอดวันนี้: <b id="revenue" style="color:var(--accent); font-size:22px;">฿0</b></div>
    </div>
    
    <div style="margin-bottom: 20px; display:flex; gap:10px;">
        <button onclick="showSec('orders')" style="padding:10px 20px; border:none; background:#000; color:#fff; border-radius:4px; cursor:pointer; font-family:'Prompt';">ดูออเดอร์</button>
        <button onclick="showSec('stock')" style="padding:10px 20px; border:none; background:#8b0000; color:#fff; border-radius:4px; cursor:pointer; font-family:'Prompt';">จัดการสต็อก</button>
    </div>

    <div id="container" class="grid"></div>
    <div id="stock-sec" style="display:none;" class="grid"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec";
        let cAlertT = "";

        async function refresh() {
            try {
                const r = await fetch(API_URL + "?action=getAdminData"); const d = await r.json();
                document.getElementById('revenue').innerText = "฿" + d.summary.revenue.toLocaleString();
                if(d.calls.length > 0) { cAlertT = d.calls[0][1]; document.getElementById('staff-alert').style.display = 'block'; document.getElementById('alert-table').innerText = cAlertT; }
                else { document.getElementById('staff-alert').style.display = 'none'; }

                const c = document.getElementById('container'); if(!d.orders.length){ c.innerHTML = "ไม่มีออเดอร์"; return; }
                let groups = {}; d.orders.forEach(o => { if(!groups[o.table]) groups[o.table] = { items:[], total:0, rows:[], time:o.time }; groups[o.table].items.push(o); groups[o.table].total += parseFloat(o.total.replace(/,/g,'')); groups[o.table].rows.push(o.rowNum); });
                c.innerHTML = Object.keys(groups).map(t => `
                    <div class="card">
                        <div style="display:flex;justify-content:space-between"><b>โต๊ะ ${t}</b><small>${groups[t].time}</small></div><hr style="border:0;border-top:1px solid #eee;margin:10px 0;">
                        ${groups[t].items.map(i => `<div style="font-size:13px;margin-bottom:5px;">${i.qty}x ${i.menu}<br><small style="color:var(--blue)">${i.details} [${i.status}]</small></div>`).join('')}
                        <div style="display:flex;margin-top:10px;"><button class="status-btn" onclick='upS(${JSON.stringify(groups[t].rows)},"กำลังทำ")'>กำลังทำ</button><button class="status-btn" onclick='upS(${JSON.stringify(groups[t].rows)},"รอเสิร์ฟ")'>รอเสิร์ฟ</button></div>
                        <div style="font-size:22px;font-weight:600;text-align:right;margin:15px 0;">฿${groups[t].total.toLocaleString()}</div>
                        <button class="btn-action" style="background:#16a34a; color:#fff;" onclick='pay("${t}",${JSON.stringify(groups[t].rows)})'>เสิร์ฟแล้ว / ปิดโต๊ะ</button>
                    </div>`).join('');
                
                let sh = "<h3>เมนู</h3>" + d.menu.map(m => `<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:15px;"><span>${m[0]}</span><button class="status-btn" style="background:${m[5]=='หมด'?'#eee':'#000'};color:${m[5]=='หมด'?'#000':'#fff'}" onclick="tgS('menu','${m[0]}','${m[5]=='หมด'?'ปกติ':'หมด'}')">${m[5]=='หมด'?'เปิด':'ปิด'}</button></div>`).join('');
                sh += "<h3>ท็อปปิ้ง</h3>" + d.toppings.map(t => `<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:15px;"><span>${t[0]}</span><button class="status-btn" style="background:${t[2]=='หมด'?'#eee':'#000'};color:${t[2]=='หมด'?'#000':'#fff'}" onclick="tgS('top','${t[0]}','${t[2]=='หมด'?'ปกติ':'หมด'}')">${t[2]=='หมด'?'เปิด':'ปิด'}</button></div>`).join('');
                document.getElementById('stock-sec').innerHTML = sh;
            } catch(e){}
        }

        function showSec(n) { document.getElementById('container').style.display=(n=='orders'?'grid':'none'); document.getElementById('stock-sec').style.display=(n=='stock'?'grid':'none'); }
        async function upS(r, s) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStatus',rowNums:r,nextStatus:s})}); refresh(); }
        async function tgS(type, name, status) { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateStock',type:type,name:name,status:status})}); refresh(); }
        async function pay(t, r) { if(confirm("ปิดโต๊ะ "+t+"?")){ await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'markMultipleDone',rowNums:r})}); refresh(); }}
        async function clearCallAlert() { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'clearCall',table:cAlertT})}); refresh(); }
        setInterval(refresh, 5000); refresh();
    </script>
</body>
</html>
