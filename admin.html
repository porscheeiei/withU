<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg: #f8fafc; --text: #1e293b; --accent: #16a34a; --blue: #2563eb; }
    body { font-family: 'Prompt', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
    .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    .btn { width: 100%; border: none; padding: 12px; border-radius: 10px; font-family: 'Prompt'; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-qr { background: #000; color: #fff; }
    .btn-cash { background: #fff; border: 2px solid var(--accent); color: var(--accent); }
    .status-btn-group { display: flex; gap: 5px; margin-top: 10px; }
    .s-btn { flex:1; padding: 8px; font-size: 11px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-weight: 600; }
    .s-cooking { background: #fef9c3; color: #a16207; }
    .s-waiting { background: #dcfce7; color: #166534; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: #fff; padding: 30px; border-radius: 24px; text-align: center; max-width: 360px; width: 90%; }
    #m-qr { width: 100%; max-width: 250px; border-radius: 12px; margin: 15px 0; border: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="header"><div><h1>WITHU Admin</h1><div id="update-time" style="font-size:12px;color:grey;">กำลังโหลด...</div></div><div style="text-align:right;">ยอดวันนี้: <b id="revenue" style="font-size:20px;">฿0</b></div></div>
  <div id="container" class="tables-grid">กำลังดึงข้อมูล...</div>
  
  <div id="modal" class="modal" onclick="this.style.display='none'"><div class="modal-box" onclick="event.stopPropagation()">
    <h3 id="m-table"></h3><img id="m-qr" src=""><div id="m-total" style="font-size:32px;font-weight:700;"></div>
    <button class="btn" style="background:var(--accent);color:#fff" id="m-confirm">ยืนยันได้รับเงินแล้ว</button>
    <button class="btn" style="background:#eee" onclick="document.getElementById('modal').style.display='none'">ปิด</button>
  </div></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec"; 
    
    async function refresh() {
      try {
        const r = await fetch(API_URL + "?action=getAdminData"); const d = await r.json();
        document.getElementById('revenue').innerText = "฿" + (d.summary.revenue || 0).toLocaleString();
        document.getElementById('update-time').innerText = "อัปเดต: " + new Date().toLocaleTimeString();
        const c = document.getElementById('container'); if(!d.orders.length) { c.innerHTML = "ไม่มีออเดอร์"; return; }
        
        let groups = {}; d.orders.forEach(o => { 
          if(!groups[o.table]) groups[o.table] = { items:[], total:0, rows:[], time:o.time }; 
          groups[o.table].items.push(o); 
          groups[o.table].total += parseFloat(o.total.replace(/,/g,'')); 
          groups[o.table].rows.push(o.rowNum); 
        });

        let h = ""; for(let t in groups) {
          h += `<div class="card"><div style="display:flex;justify-content:space-between"><b>โต๊ะ ${t}</b><small>${groups[t].time}</small></div><hr style="border:0;border-top:1px solid #f1f5f9;margin:12px 0;">
            ${groups[t].items.map(i => `<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px;"><span>${i.qty}x ${i.menu}<br><small style="color:var(--blue)">${i.details} [${i.status}]</small></span><span>฿${i.total}</span></div>`).join('')}
            <div class="status-btn-group">
                <button class="s-btn s-cooking" onclick='changeS(${JSON.stringify(groups[t].rows)}, "กำลังทำ")'>เริ่มทำ</button>
                <button class="s-btn s-waiting" onclick='changeS(${JSON.stringify(groups[t].rows)}, "รอเสิร์ฟ")'>พร้อมเสิร์ฟ</button>
            </div>
            <div style="font-size:24px;font-weight:700;text-align:right;margin:15px 0;">฿${groups[t].total.toLocaleString()}</div>
            <button class="btn btn-qr" onclick='showQR("${t}",${groups[t].total},${JSON.stringify(groups[t].rows)})'>เก็บเงิน (QR)</button>
            <button class="btn btn-cash" onclick='pay("${t}",${JSON.stringify(groups[t].rows)})'>ปิดโต๊ะ (รับเงินสด)</button></div>`;
        } c.innerHTML = h;
      } catch(e) {}
    }

    async function changeS(r, s) { await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'updateStatus', rowNums:r, nextStatus:s}) }); refresh(); }
    function showQR(t, a, r) { 
      document.getElementById('m-table').innerText = "โต๊ะ "+t; 
      document.getElementById('m-total').innerText = "฿"+a.toLocaleString(); 
      document.getElementById('m-qr').src = `https://promptpay.io/0931805507/${a}.png`; 
      document.getElementById('m-confirm').onclick = () => { document.getElementById('modal').style.display='none'; pay(t, r); }; 
      document.getElementById('modal').style.display = 'flex'; 
    }
    async function pay(t, r) { if(!confirm(`ยืนยันการปิดโต๊ะ ${t}?`)) return; await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'markMultipleDone', rowNums:r}) }); refresh(); }
    
    setInterval(refresh, 5000); refresh();
  </script>
</body>
</html>
