<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg-color: #f0f2f5; --surface-color: #ffffff; --text-main: #1c1e21; 
      --primary-color: #000; --accent-blue: #0078ff; --accent-green: #28a745;
      --accent-red: #dc3545; --border-color: #dddfe2;
    }
    body { font-family: 'Prompt', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
    
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .summary-card { background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--primary-color); }
    
    /* ระบบการ์ดโต๊ะ */
    .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .table-card { background: var(--surface-color); border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: relative; }
    .table-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
    .table-num { font-size: 22px; font-weight: 700; color: var(--accent-red); }
    
    .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #f0f0f0; font-size: 14px; }
    .total-box { margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 12px; text-align: right; }
    
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    .btn { flex: 1; border: none; padding: 12px; border-radius: 10px; font-family: 'Prompt'; font-weight: 600; cursor: pointer; color: white; transition: 0.2s; }
    .btn-qr { background: var(--accent-blue); }
    .btn-cash { background: var(--accent-green); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Modal QR */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-content { background: #fff; padding: 25px; border-radius: 20px; text-align: center; max-width: 350px; width: 100%; }
    #qr-img { width: 100%; border-radius: 10px; margin: 15px 0; }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div>
      <h1 style="margin:0;">WITHU Admin Dashboard</h1>
      <p style="margin:5px 0; color:grey;">ระบบรวมบิลและเช็คบิลรายโต๊ะ</p>
    </div>
    <button onclick="fetchAllData()" id="refresh-btn" style="padding:10px 20px; border-radius:10px; cursor:pointer; background:#000; color:#fff; border:none; font-family:'Prompt';">🔄 รีเฟรชข้อมูล</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div style="font-size:12px; color:grey;">ยอดขายวันนี้</div>
      <div style="font-size:24px; font-weight:700; color:#27ae60;" id="sum-revenue">฿0</div>
    </div>
    <div class="summary-card">
      <div style="font-size:12px; color:grey;">รายการทั้งหมด</div>
      <div style="font-size:24px; font-weight:700;" id="sum-items">0</div>
    </div>
  </div>

  <div id="loading-text" style="text-align:center; padding:50px; color:grey;">กำลังเชื่อมต่อกับ Google Sheets...</div>
  <div id="tables-container" class="tables-grid"></div>

  <div id="qr-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 id="qr-title" style="margin-top:0;"></h3>
      <img id="qr-img" src="">
      <div id="qr-amount" style="font-size:28px; font-weight:700; margin-bottom:15px;"></div>
      <button onclick="document.getElementById('qr-modal').style.display='none'" style="width:100%; padding:12px; border-radius:10px; background:#000; color:#fff; border:none; font-family:'Prompt';">ปิดหน้าจอ</button>
    </div>
  </div>

  <script>
    // ⚠️ สำคัญ: ใส่ URL Web App ของคุณที่นี่ (ต้องลงท้ายด้วย /exec)
    const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec"; 

    function fetchAllData() {
      const btn = document.getElementById('refresh-btn');
      btn.innerText = "⏳ กำลังโหลด...";
      
      fetch(API_URL + "?action=getAdminData")
        .then(res => res.json())
        .then(data => {
          renderSummary(data.summary);
          renderTableCards(data.orders);
          btn.innerText = "🔄 รีเฟรชข้อมูล";
          document.getElementById('loading-text').style.display = 'none';
        })
        .catch(err => {
          console.error(err);
          document.getElementById('loading-text').innerHTML = "<b style='color:red;'>เชื่อมต่อไม่ได้!</b><br>เช็คว่าตั้งค่า Deploy เป็น Anyone หรือยัง?";
        });
    }

    function renderSummary(s) {
      document.getElementById('sum-revenue').innerText = "฿" + parseFloat(s.revenue).toLocaleString();
      document.getElementById('sum-items').innerText = s.items + " รายการ";
    }

    function renderTableCards(orders) {
      const container = document.getElementById('tables-container');
      container.innerHTML = "";

      if (!orders || orders.length === 0) {
        container.innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:50px; color:grey;'>ยังไม่มีออเดอร์ค้างในขณะนี้</div>";
        return;
      }

      // รวมออเดอร์ตามโต๊ะ
      const tableMap = {};
      orders.forEach(o => {
        if (!tableMap[o.table]) {
          tableMap[o.table] = { items: [], total: 0, rowNums: [], time: o.time };
        }
        tableMap[o.table].items.push(o);
        // แปลงราคาจาก String เป็น Number (ตัดลูกน้ำออกถ้ามี)
        const price = parseFloat(o.total.toString().replace(/,/g, '')) || 0;
        tableMap[o.table].total += price;
        tableMap[o.table].rowNums.push(o.rowNum);
      });

      // สร้างการ์ดแต่ละโต๊ะ
      for (let t in tableMap) {
        const table = tableMap[t];
        const card = document.createElement('div');
        card.className = 'table-card';
        card.innerHTML = `
          <div class="table-header">
            <span class="table-num">โต๊ะ ${t}</span>
            <span style="font-size:11px; color:grey;">${table.time}</span>
          </div>
          <div>
            ${table.items.map(i => `
              <div class="item-row">
                <div><b>${i.qty}x</b> ${i.menu} <br><small style="color:grey;">${i.details}</small></div>
                <div>฿${i.total}</div>
              </div>
            `).join('')}
          </div>
          <div class="total-box">
            <div style="font-size:12px; color:grey;">ยอดรวมค้างชำระ</div>
            <div style="font-size:24px; font-weight:700;">฿${table.total.toLocaleString()}</div>
          </div>
          <div class="btn-group">
            <button class="btn btn-qr" onclick="openQR('${t}', ${table.total})">📱 QR บิล</button>
            <button class="btn btn-cash" onclick="payCash('${t}', [${table.rowNums}])">💰 รับเงินสด</button>
          </div>
        `;
        container.appendChild(card);
      }
    }

    function openQR(table, amount) {
      document.getElementById('qr-title').innerText = "เช็คบิล โต๊ะ " + table;
      document.getElementById('qr-amount').innerText = "฿" + amount.toLocaleString();
      document.getElementById('qr-img').src = `https://promptpay.io/0931805507/${amount}.png`;
      document.getElementById('qr-modal').style.display = 'flex';
    }

    function payCash(table, rows) {
      if (!confirm(`ยืนยันการรับเงินสด โต๊ะ ${table} ใช่หรือไม่?`)) return;
      
      const btn = event.target;
      btn.innerText = "⏳ บันทึก...";
      btn.disabled = true;

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'markMultipleDone', rowNums: rows })
      })
      .then(res => res.json())
      .then(res => {
        fetchAllData(); // โหลดข้อมูลใหม่
      })
      .catch(err => alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้ง"));
    }

    // โหลดข้อมูลทุก 15 วินาที
    window.onload = () => {
      fetchAllData();
      setInterval(fetchAllData, 15000);
    };
  </script>
</body>
</html>
