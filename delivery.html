<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU | DELIVERY ORDER</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: #fcfcfd; margin: 0; padding: 20px; }
        .app-container { max-width: 500px; margin: auto; }
        .card { background: #fff; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin: 8px 0; box-sizing: border-box; }
        #map { height: 250px; width: 100%; border-radius: 20px; margin-top: 10px; border: 2px solid #000; }
        .btn-black { background: #000; color: #fff; padding: 18px; border-radius: 50px; border: none; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center;">🛵 WITHU Delivery</h1>
    
    <div id="menu-list"></div>

    <div class="card" id="delivery-form">
        <h2 style="margin-top:0;">ข้อมูลการจัดส่ง</h2>
        <input type="text" id="cust-name" placeholder="ชื่อ-นามสกุล">
        <input type="tel" id="cust-phone" placeholder="เบอร์โทรศัพท์">
        <textarea id="cust-address" placeholder="ชื่อหอพัก / บ้านเลขที่"></textarea>
        <textarea id="cust-note" placeholder="หมายเหตุ (ไม่จำเป็นต้องกรอก)"></textarea>
        
        <p style="font-weight:700;">📍 ปักหมุดที่อยู่จัดส่ง:</p>
        <div id="map"></div>
        <input type="hidden" id="lat-lng" value="7.556,99.607">
        
        <button class="btn-black" onclick="finalizeDelivery()">ยืนยันสั่งซื้อ (฿<span id="total-price">0</span>)</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    let cart = []; // สมมติว่ามีระบบเพิ่มลงตะกร้าแบบเดิมของคุณอ้วน

    // เริ่มต้นแผนที่
    window.onload = function() {
        const center = { lat: 7.556, lng: 99.607 }; // พิกัดร้าน
        const map = new google.maps.Map(document.getElementById("map"), { zoom: 16, center: center });
        const marker = new google.maps.Marker({ position: center, map: map, draggable: true });
        
        google.maps.event.addListener(marker, 'dragend', function() {
            document.getElementById('lat-lng').value = marker.getPosition().lat() + "," + marker.getPosition().lng();
        });
    };

    async function finalizeDelivery() {
        // ตรวจสอบข้อมูลก่อนส่ง
        if(!document.getElementById('cust-name').value) return alert("กรุณากรอกชื่อ");

        const payload = {
            action: 'submitOrder',
            table: 'DELIVERY-' + document.getElementById('cust-name').value, 
            cart: cart, // ส่งรายการอาหารไป
            customer: {
                name: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                dorm: document.getElementById('cust-dorm').value,
                note: document.getElementById('cust-note').value,
                coords: document.getElementById('lat-lng').value
            }
        };

        // ส่งเข้า Backend.gs
        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(payload) 
        });
        
        alert("สั่งอาหารสำเร็จ! ร้านกำลังดำเนินการค่ะ");
        location.reload();
    }
</script>
</body>
</html>
