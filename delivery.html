<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WITHU | Premium Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4F_BpCkjvd4-ariSVZTRLfE9ce_lAwLE&libraries=places"></script>
    <style>
        :root { --p: #1a1a1a; --bg: #fcfcfd; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .app-container { max-width: 500px; margin: auto; }
        .card { background: #fff; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        input, textarea { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid #e2e8f0; margin: 8px 0; box-sizing: border-box; }
        #map { height: 250px; width: 100%; border-radius: 20px; margin-top: 10px; border: 2px solid #000; }
        .btn-add { background: #000; color: #fff; border: none; padding: 8px 20px; border-radius: 15px; cursor: pointer; font-weight: 700; }
        .btn-black { background: #000; color: #fff; padding: 18px; border-radius: 50px; border: none; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center;">🛵 WITHU Delivery</h1>

    <div id="step-1">
        <div class="card" id="menu-list">
            <h3>รายการอาหาร</h3>
            <div id="items-container">กำลังโหลดเมนู...</div>
        </div>
        <button class="btn-black" onclick="goToStep(2)">ไปหน้ากรอกที่อยู่ (฿<span id="total-price">0</span>)</button>
    </div>

    <div id="step-2" style="display:none;" class="card">
        <h2 style="margin-top:0;">ข้อมูลการจัดส่ง</h2>
        <input type="text" id="cust-name" placeholder="ชื่อ-นามสกุล">
        <input type="tel" id="cust-phone" placeholder="เบอร์โทรศัพท์">
        <textarea id="cust-dorm" placeholder="ชื่อหอพัก / บ้านเลขที่"></textarea>
        <textarea id="cust-note" placeholder="หมายเหตุ (ไม่จำเป็น)"></textarea>
        
        <p style="font-weight:700;">📍 ปักหมุดที่อยู่:</p>
        <div id="map"></div>
        <input type="hidden" id="lat-lng" value="7.556,99.607">
        
        <button class="btn-black" onclick="finalizeDelivery()">ยืนยันสั่งซื้อ</button>
        <button style="background:none; border:none; width:100%; margin-top:15px; color:#64748b; font-weight:700;" onclick="goToStep(1)">ย้อนกลับ</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    let cart = []; 

    // ดึงเมนู
    fetch(API_URL + "?action=getMenu").then(r => r.json()).then(d => {
        const container = document.getElementById('items-container');
        container.innerHTML = d.menu.map((m, idx) => `
            <div class="menu-item">${m[0]} <br> ฿${m[1]} <button class="btn-add" onclick="addToCart('${m[0]}', ${m[1]})">+</button></div>
        `).join('');
    });

    function addToCart(name, price) {
        cart.push({ name: name, total: price, qty: 1, sweetness: "-" });
        document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.total, 0);
        alert("เพิ่ม " + name + " แล้วค่ะ");
    }

    function goToStep(step) {
        if(step === 2 && cart.length === 0) return alert("เลือกเมนูก่อนนะคะอ้วน");
        document.getElementById('step-1').style.display = (step === 1) ? 'block' : 'none';
        document.getElementById('step-2').style.display = (step === 2) ? 'block' : 'none';
    }

    // แผนที่
    window.onload = function() {
        const map = new google.maps.Map(document.getElementById("map"), { zoom: 16, center: { lat: 7.556, lng: 99.607 } });
        const marker = new google.maps.Marker({ position: { lat: 7.556, lng: 99.607 }, map: map, draggable: true });
        google.maps.event.addListener(marker, 'dragend', function() {
            document.getElementById('lat-lng').value = marker.getPosition().lat() + "," + marker.getPosition().lng();
        });
    };

    async function finalizeDelivery() {
        if(!document.getElementById('cust-name').value) return alert("กรุณากรอกชื่อค่ะ");

        const payload = {
            action: 'submitOrder',
            table: 'DELIVERY-' + document.getElementById('cust-name').value, 
            cart: cart,
            customer: {
                name: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                dorm: document.getElementById('cust-dorm').value,
                note: document.getElementById('cust-note').value,
                coords: document.getElementById('lat-lng').value
            }
        };

        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("สั่งอาหารสำเร็จ! ร้านกำลังดำเนินการค่ะ");
        location.reload();
    }
</script>
</body>
</html>
