<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WITHU | Premium Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4F_BpCkjvd4-ariSVZTRLfE9ce_lAwLE&libraries=places"></script>
    <style>
        :root { 
            --p: #1a1a1a; --bg: #fcfcfd; --card: #ffffff; --border: #f1f5f9; 
            --muted: #94a3b8; --glass: rgba(255, 255, 255, 0.9);
            --blue: #2563eb; --gray: #64748b; --bright-red: #ff0000;
        }

        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; letter-spacing: -0.01em; line-height: 1.6; }
        body { background: var(--bg); margin: 0; color: var(--p); -webkit-font-smoothing: antialiased; }
        
        .app-container { width: 100%; max-width: 550px; margin: 0 auto; padding: 0 20px 160px 20px; }

        /* --- Header --- */
        .top-bar { background: var(--glass); backdrop-filter: blur(15px); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 900; font-size: 26px; letter-spacing: -0.5px; text-transform: uppercase; }
        .badge { background: #000; color: #fff; padding: 6px 18px; border-radius: 50px; font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px;}

        /* --- Menu Card --- */
        .menu-item { background: #fff; border-radius: 40px; padding: 30px; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 12px 40px -10px rgba(0,0,0,0.05); margin-bottom: 20px; animation: fadeIn 0.5s ease; position: relative; }
        .menu-top { display: flex; align-items: center; margin-bottom: 20px; }
        .menu-icon { width: 70px; height: 70px; background: #f8fafc; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 20px; border: 1px solid var(--border); }
        .menu-info { flex: 1; }
        .menu-item h3 { margin: 0; font-size: 20px; font-weight: 800; color: #000; line-height: 1.3; }
        .price { font-weight: 900; font-size: 22px; margin-top: 5px; color: var(--blue); }

        .qty-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .qty-box { display: flex; align-items: center; gap: 15px; background: #f8fafc; padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border); }
        .qty-btn { width: 30px; height: 30px; background: #fff; border: none; border-radius: 50%; font-size: 18px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }

        .btn-add { background: #000; color: #fff; border: none; padding: 18px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-add:active { transform: scale(0.98); }

        /* --- Cart Bar --- */
        .cart-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px; background: #000; padding: 18px 30px; border-radius: 50px; display: none; justify-content: space-between; align-items: center; z-index: 1100; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: slideUpCart 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-checkout-pill { background: #fff; color: #000; border: none; padding: 12px 22px; border-radius: 50px; font-weight: 900; font-size: 15px; cursor: pointer; }

        /* --- Form & Delivery (Step 2) --- */
        .section-title { font-weight: 900; font-size: 24px; margin: 30px 0 20px 0; letter-spacing: -0.5px; }
        .premium-input { width: 100%; padding: 18px 25px; border-radius: 20px; border: 2px solid var(--border); background: #f8fafc; font-size: 15px; margin-bottom: 15px; outline: none; transition: 0.3s; font-weight: 500; }
        .premium-input:focus { border-color: #000; background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .premium-input::placeholder { color: #cbd5e1; font-weight: 400; }
        textarea.premium-input { resize: none; height: 100px; }
        
        #map { height: 280px; width: 100%; border-radius: 25px; margin-bottom: 25px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* --- Modal & States --- */
        .custom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); display: none; z-index: 5000; align-items: flex-end; justify-content: center; }
        .custom-modal { background: #fff; width: 100%; max-width: 500px; padding: 45px 35px; border-radius: 45px 45px 0 0; text-align: center; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pulse-loader { width: 80px; height: 80px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px auto; position: relative; color: #fff; font-size: 35px; }
        .pulse-loader::after { content: ''; position: absolute; inset: -10px; border: 3px solid #000; border-radius: 50%; animation: pulse-ring 1.5s infinite; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideUpCart { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
    </style>
</head>
<body>

<div id="app-header" class="top-bar">
    <div class="brand">WITHU</div>
    <div class="badge">🛵 Delivery</div>
</div>

<div class="app-container">
    
    <div id="step-1">
        <h2 class="section-title" style="text-align: center; margin-bottom: 25px;">เลือกเมนูที่ต้องการ</h2>
        <div id="items-container" style="text-align: center; padding: 40px 0; color: var(--gray); font-weight: 600;">
            กำลังโหลดเมนู...
        </div>
    </div>

    <div id="step-2" style="display:none; animation: fadeIn 0.4s ease;">
        <h2 class="section-title">ข้อมูลการจัดส่ง</h2>
        
        <input type="text" id="cust-name" class="premium-input" placeholder="ชื่อ - นามสกุล">
        <input type="tel" id="cust-phone" class="premium-input" placeholder="เบอร์โทรศัพท์ติดต่อ">
        <textarea id="cust-dorm" class="premium-input" placeholder="ชื่อหอพัก / คอนโด / หมู่บ้าน / ชั้น / ห้อง"></textarea>
        <textarea id="cust-note" class="premium-input" placeholder="หมายเหตุถึงไรเดอร์ (ไม่จำเป็น)"></textarea>
        
        <h2 class="section-title" style="font-size: 20px; margin-top: 10px;">📍 ปักหมุดที่อยู่จัดส่ง</h2>
        <div id="map"></div>
        <input type="hidden" id="lat-lng" value="7.556,99.607">
        
        <div style="background: #fff; padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 22px; margin-bottom: 20px;">
                <span>ยอดชำระสุทธิ</span>
                <span style="color: var(--blue);">฿<span id="final-price">0</span></span>
            </div>
            <button class="btn-add" onclick="finalizeDelivery()">ยืนยันการสั่งซื้อ</button>
            <button style="background:none; border:none; width:100%; margin-top:15px; color:var(--gray); font-weight:700; cursor: pointer; text-decoration: underline; text-underline-offset: 4px;" onclick="goToStep(1)">กลับไปแก้ไขตะกร้า</button>
        </div>
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div style="color:#fff;">
        <div style="font-size:11px; opacity:0.6; font-weight:700;">ตะกร้าของคุณ</div>
        <div style="font-size:20px; font-weight:900;"><span id="cart-count">0</span> รายการ</div>
    </div>
    <button class="btn-checkout-pill" onclick="goToStep(2)">ชำระเงิน ฿<span id="cart-sum-val">0</span></button>
</div>

<div id="modal" class="custom-overlay">
    <div id="modal-body" class="custom-modal"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    let cart = []; 
    let itemQty = {}; 

    // โหลดแผนที่
    window.onload = function() {
        const map = new google.maps.Map(document.getElementById("map"), { 
            zoom: 16, 
            center: { lat: 7.556, lng: 99.607 },
            disableDefaultUI: true,
            zoomControl: true
        });
        const marker = new google.maps.Marker({ 
            position: { lat: 7.556, lng: 99.607 }, 
            map: map, 
            draggable: true,
            animation: google.maps.Animation.DROP
        });
        google.maps.event.addListener(marker, 'dragend', function() {
            document.getElementById('lat-lng').value = marker.getPosition().lat() + "," + marker.getPosition().lng();
        });
    };

    // ดึงเมนู
    fetch(API_URL + "?action=getMenu").then(r => r.json()).then(d => {
        const container = document.getElementById('items-container');
        if(!d.menu || d.menu.length === 0) {
            container.innerHTML = "ไม่พบรายการอาหารในขณะนี้";
            return;
        }

        container.style.padding = "0";
        container.style.textAlign = "left";

        container.innerHTML = d.menu.map((m, idx) => {
            if(!itemQty[idx]) itemQty[idx] = 1;
            return `
            <div class="menu-item">
                <div class="menu-top">
                    <div class="menu-icon">🍽️</div>
                    <div class="menu-info">
                        <h3>${m[0]}</h3>
                        <div class="price">฿${m[1]}</div>
                    </div>
                </div>
                <div class="qty-row">
                    <span style="font-size: 14px; font-weight: 700; color: var(--gray);">จำนวนที่ต้องการ</span>
                    <div class="qty-box">
                        <button class="qty-btn" onclick="updateQty(${idx}, -1)">-</button>
                        <b id="qty-val-${idx}" style="font-size:18px; width: 20px; text-align: center;">${itemQty[idx]}</b>
                        <button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button>
                    </div>
                </div>
                <button class="btn-add" onclick="addToCart('${m[0]}', ${m[1]}, ${idx})">เพิ่มลงตะกร้า</button>
            </div>
        `}).join('');
    });

    function updateQty(idx, val) { 
        itemQty[idx] = Math.max(1, itemQty[idx] + val); 
        document.getElementById(`qty-val-${idx}`).innerText = itemQty[idx];
    }

    function addToCart(name, price, idx) {
        let qty = itemQty[idx];
        let total = price * qty;
        
        // เช็คว่ามีเมนูนี้ในตะกร้าหรือยัง
        let existingItem = cart.find(i => i.name === name);
        if(existingItem) {
            existingItem.qty += qty;
            existingItem.total += total;
        } else {
            cart.push({ name: name, total: total, qty: qty, sweetness: "-" });
        }
        
        itemQty[idx] = 1; // Reset Qty
        document.getElementById(`qty-val-${idx}`).innerText = 1;
        
        showToast(`เพิ่ม ${name} (${qty}) ลงตะกร้าแล้ว!`);
        updateUI();
    }

    function updateUI() {
        let sum = cart.reduce((s, i) => s + i.total, 0);
        let totalItems = cart.reduce((s, i) => s + i.qty, 0);
        
        document.getElementById('cart-bar').style.display = cart.length > 0 ? 'flex' : 'none';
        document.getElementById('cart-count').innerText = totalItems;
        document.getElementById('cart-sum-val').innerText = sum.toLocaleString();
        document.getElementById('final-price').innerText = sum.toLocaleString();
    }

    function goToStep(step) {
        if(step === 2 && cart.length === 0) return showToast("กรุณาเลือกเมนูก่อนนะคะ", true);
        
        document.getElementById('step-1').style.display = (step === 1) ? 'block' : 'none';
        document.getElementById('cart-bar').style.display = (step === 1 && cart.length > 0) ? 'flex' : 'none';
        
        document.getElementById('step-2').style.display = (step === 2) ? 'block' : 'none';
        
        // เลื่อนหน้าจอกลับไปด้านบนเมื่อเปลี่ยน step
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function finalizeDelivery() {
        if(!document.getElementById('cust-name').value) return showToast("กรุณากรอกชื่อ-นามสกุลค่ะ", true);
        if(!document.getElementById('cust-phone').value) return showToast("กรุณากรอกเบอร์โทรศัพท์ค่ะ", true);
        if(!document.getElementById('cust-dorm').value) return showToast("กรุณากรอกรายละเอียดที่อยู่ค่ะ", true);

        // แสดง Modal Loading
        const body = document.getElementById('modal-body');
        document.getElementById('modal').style.display = 'flex';
        body.innerHTML = `
            <div class="pulse-loader">🛵</div>
            <h2 style="font-weight:900; margin-bottom: 10px;">กำลังส่งคำสั่งซื้อ...</h2>
            <p style="color:var(--gray); font-size:14px;">กรุณารอสักครู่นะคะ</p>
        `;

        const payload = {
            action: 'submitOrder',
            table: 'DELIVERY-' + document.getElementById('cust-name').value, 
            cart: cart,
            customer: {
                name: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                dorm: document.getElementById('cust-dorm').value,
                note: document.getElementById('cust-note').value,
                coords: document.getElementById('lat-lng').value
            }
        };

        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            
            // แสดง Modal Success
            body.innerHTML = `
                <div style="font-size:70px; margin-bottom:20px;">✅</div>
                <h2 style="font-weight:900; margin-bottom: 10px;">สั่งอาหารสำเร็จ!</h2>
                <p style="color:var(--gray); font-size:14px; margin-bottom: 30px;">ร้านกำลังจัดเตรียมออเดอร์และจะจัดส่งให้เร็วที่สุดค่ะ</p>
                <button class="btn-add" onclick="location.reload()">กลับไปหน้าหลัก</button>
            `;
        } catch (error) {
            body.innerHTML = `
                <div style="font-size:70px; margin-bottom:20px;">❌</div>
                <h2 style="font-weight:900; margin-bottom: 10px;">เกิดข้อผิดพลาด</h2>
                <p style="color:var(--gray); font-size:14px; margin-bottom: 30px;">ไม่สามารถส่งคำสั่งซื้อได้ กรุณาลองใหม่อีกครั้ง</p>
                <button class="btn-add" style="background:var(--bright-red);" onclick="document.getElementById('modal').style.display='none'">ปิด</button>
            `;
        }
    }

    // ฟังก์ชันช่วยแสดง Alert แบบแนบเนียน (แทน alert ธรรมดา)
    function showToast(msg, isError = false) {
        const body = document.getElementById('modal-body');
        document.getElementById('modal').style.display = 'flex';
        body.innerHTML = `
            <div style="font-size:60px; margin-bottom:20px;">${isError ? '⚠️' : '✨'}</div>
            <h3 style="font-weight:800; margin-bottom: 25px; line-height: 1.5;">${msg}</h3>
            <button class="btn-add" style="${isError ? 'background: #000;' : ''}" onclick="document.getElementById('modal').style.display='none'">ตกลง</button>
        `;
    }
</script>
</body>
</html>
