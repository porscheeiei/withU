<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>WITHU | Delivery Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* (CSS เหมือนเดิมทุกอย่าง ผมข้ามมาจุดที่ต้องแก้คือส่วน Landing Page) */
        :root { --bg: #FAFAFA; --surface: #FFFFFF; --primary: #111111; --secondary: #666666; --border: #ECECEC; --gold: #C9A86A; --gray-light: #F9F9F9; --radius-md: 18px; }
        * { box-sizing: border-box; }
        body { background: var(--bg); margin: 0; font-family: 'Inter', 'Prompt', sans-serif; }
        
        /* สไตล์ใหม่สำหรับ Landing Delivery */
        #table-overlay { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: rgba(250,250,250,0.9); backdrop-filter: blur(20px); }
        .landing-card { background: var(--surface); padding: 40px; border-radius: 32px; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .delivery-input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; }
        .add-cart-btn { width: 100%; height: 56px; border-radius: 28px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="table-overlay">
        <div class="landing-card">
            <h2 style="font-family:var(--font-head); font-weight:800; font-size:24px; margin-bottom:8px;">WITHU <span>DELIVERY</span></h2>
            <p style="color:var(--secondary); font-size:14px; margin-bottom:24px;">กรุณากรอกข้อมูลสำหรับจัดส่งครับ</p>
            
            <input type="text" id="cust-name" class="delivery-input" placeholder="ชื่อ-นามสกุล">
            <input type="tel" id="cust-phone" class="delivery-input" placeholder="เบอร์โทรศัพท์">
            <textarea id="cust-addr" class="delivery-input" placeholder="ที่อยู่จัดส่งโดยละเอียด" rows="3"></textarea>
            
            <button class="add-cart-btn" onclick="startDelivery()">เริ่มสั่งอาหาร</button>
        </div>
    </div>

    <script>
    // ปรับแก้ฟังก์ชัน startApp และ lockTable
    function startDelivery() {
        const name = document.getElementById("cust-name").value;
        const phone = document.getElementById("cust-phone").value;
        const addr = document.getElementById("cust-addr").value;
        
        if(!name || !phone || !addr) return alert("กรุณากรอกข้อมูลให้ครบครับ");
        
        // บันทึกข้อมูลลูกค้าลง LocalStorage เพื่อให้ระบบจำได้ว่านี่คือออเดอร์เดลิเวอรี่
        currentTable = "DELIVERY: " + name; 
        localStorage.setItem('withu_table', currentTable);
        localStorage.setItem('withu_delivery_info', `${name} | ${phone} | ${addr}`);
        
        startApp();
    }

    function startApp() {
        // ส่วนนี้คงเดิม แต่เปลี่ยนการแสดงผลที่หัวบาร์
        document.getElementById("display-table").innerText = "DELIVERY"; 
        document.getElementById("table-overlay").style.display = "none"; 
        document.getElementById("menu-view").style.display = "block"; 
        document.getElementById("app-header").style.display = "flex"; 
        loadMenu(); 
    }

    // ... (ส่วนที่เหลือของ Script เหมือนเดิม) ...
</script>
</body>
</html>
