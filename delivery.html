<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>WITHU | Delivery Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* [คง CSS เดิมของอ้วนไว้ทั้งหมด + เพิ่มสไตล์หน้า Delivery Landing] */
        :root { --bg: #FAFAFA; --surface: #FFFFFF; --primary: #111111; --secondary: #666666; --border: #ECECEC; --gold: #C9A86A; --gold-light: #FDFBF7; --success: #16A34A; --danger: #DC2626; --gray-light: #F9F9F9; --radius-md: 18px; --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.03); --font-head: 'Plus Jakarta Sans', 'Prompt', sans-serif; --font-body: 'Inter', 'Prompt', sans-serif; --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        body { background: var(--bg); margin: 0; color: var(--primary); font-family: var(--font-body); padding-bottom: 120px; }
        .app-container { width: 100%; max-width: 600px; margin: 0 auto; padding: 0 20px; }
        
        /* สไตล์หน้า Delivery Landing */
        #table-overlay { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: rgba(250,250,250,0.95); backdrop-filter: blur(20px); }
        .landing-card { background: var(--surface); padding: 40px; border-radius: 32px; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); border: 1px solid var(--border); }
        .delivery-input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; outline: none; background: var(--gray-light); }
        .add-cart-btn { width: 100%; height: 56px; border-radius: 28px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; margin-top: 20px; }

        /* [ก๊อปปี้ CSS เดิมจาก index.html มาวางต่อจากตรงนี้] */
        .top-bar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(30px); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 1000; }
        .menu-item { background: var(--surface); border-radius: 28px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-soft); margin-bottom: 24px; }
        .cart-bar { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); background: #111; color: #fff; padding: 12px 24px; border-radius: 100px; display: none; justify-content: space-between; align-items: center; z-index: 1100; }
        .custom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 5000; }
        .custom-modal { background: var(--surface); width: 100%; max-width: 600px; padding: 40px 24px; border-radius: 32px 32px 0 0; }
    </style>
</head>
<body>

    <div id="table-overlay">
        <div class="landing-card">
            <h2 style="font-family:var(--font-head); font-weight:800; font-size:24px; margin-bottom:8px;">WITHU <span>DELIVERY</span></h2>
            <p style="color:var(--secondary); font-size:14px; margin-bottom:24px;">กรุณากรอกข้อมูลสำหรับจัดส่งครับ</p>
            <input type="text" id="cust-name" class="delivery-input" placeholder="ชื่อ-นามสกุล">
            <input type="tel" id="cust-phone" class="delivery-input" placeholder="เบอร์โทรศัพท์">
            <textarea id="cust-addr" class="delivery-input" placeholder="ที่อยู่จัดส่งโดยละเอียด" rows="3"></textarea>
            <button class="add-cart-btn" onclick="startDelivery()">เริ่มสั่งอาหาร</button>
        </div>
    </div>

    <div id="app-header" class="top-bar" style="display:none;">
        <div class="brand">WITHU <span>DELIVERY</span></div>
        <span id="display-table" style="font-weight:700; color:var(--gold);">DELIVERY</span>
    </div>

    <div id="menu-view" style="display:none;" class="app-container"><div id="main-content"></div></div>
    <div id="status-view" style="display:none;" class="app-container"></div>
    <div id="cart-bar" class="cart-bar">
        <div>รายการ <b id="cart-count">0</b></div>
        <button onclick="openReceipt()" style="background:#fff; border:none; padding:8px 16px; border-radius:20px; font-weight:700;">ยอดรวม ฿<span id="cart-sum-val">0</span></button>
    </div>
    <div id="modal" class="custom-overlay" onclick="if(event.target==this)this.style.display='none'"><div id="modal-body" class="custom-modal"></div></div>

<script>
    // ดึง Logic เดิมมาทั้งหมด
    const API_URL = "https://script.google.com/macros/s/AKfycbzo3GGk0RBYAX_q4kYmYcONV2a639J-4TXoggQHGtRjtTaK7DdPz5KcrMwXK6wtSinPnA/exec";
    const API_KEY = "WITHU_SECRET_2026";
    let currentTable = "", cart = [], fullMenu = [], toppingsData = [], currentS = {}, itemOpt = {}, itemExpanded = {}, itemQty = {}, currentF = "ทั้งหมด", currentSubF = "ทั้งหมด", currentSearch = "", sInterval, autoCloseTimer;

    function startDelivery() {
        const name = document.getElementById("cust-name").value;
        const phone = document.getElementById("cust-phone").value;
        const addr = document.getElementById("cust-addr").value;
        if(!name || !phone || !addr) return alert("กรุณากรอกข้อมูลให้ครบครับ");
        
        currentTable = "DELIVERY: " + name; 
        localStorage.setItem('withu_table', currentTable);
        
        document.getElementById("table-overlay").style.display = "none";
        document.getElementById("menu-view").style.display = "block";
        document.getElementById("app-header").style.display = "flex";
        
        loadMenu(); 
    }

    // [ก๊อปปี้ฟังก์ชัน loadMenu, renderMenu, addC, sub, chk, ... จาก index.html มาวางต่อตรงนี้ได้เลย!]
</script>
</body>
</html>
