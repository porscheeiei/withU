<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU | DELIVERY ORDER</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4F_BpCkjvd4-ariSVZTRLfE9ce_lAwLE&libraries=places"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: #fcfcfd; margin: 0; padding: 20px; }
        .app-container { max-width: 500px; margin: auto; }
        .card { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin: 5px 0; box-sizing: border-box; }
        #map { height: 200px; width: 100%; border-radius: 15px; margin-top: 10px; border: 2px solid #000; }
        .btn-add { background: #000; color: #fff; border: none; padding: 5px 15px; border-radius: 10px; cursor: pointer; }
        .btn-black { background: #000; color: #fff; padding: 18px; border-radius: 50px; border: none; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center;">🛵 WITHU Delivery</h1>
    
    <div id="menu-list" class="card">
        <h3>เมนูอาหาร</h3>
        <div id="items-container">กำลังโหลดเมนู...</div>
    </div>

    <div class="card" id="delivery-form">
        <h2 style="margin-top:0;">ข้อมูลการจัดส่ง</h2>
        <input type="text" id="cust-name" placeholder="ชื่อ-นามสกุล">
        <input type="tel" id="cust-phone" placeholder="เบอร์โทรศัพท์">
        <textarea id="cust-dorm" placeholder="ชื่อหอพัก / บ้านเลขที่"></textarea>
        <textarea id="cust-note" placeholder="หมายเหตุ"></textarea>
        
        <p style="font-weight:700;">📍 ปักหมุดที่อยู่จัดส่ง:</p>
        <div id="map"></div>
        <input type="hidden" id="lat-lng" value="7.556,99.607">
        
        <button class="btn-black" onclick="finalizeDelivery()">ยืนยันสั่งซื้อ (฿<span id="total-price">0</span>)</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    let cart = []; 

    // 1. ดึงเมนูจาก API
    fetch(API_URL + "?action=getMenu").then(r => r.json()).then(d => {
        const container = document.getElementById('items-container');
        container.innerHTML = "";
        d.menu.forEach((m, idx) => {
            container.innerHTML += `<div class="menu-item">${m[0]} (฿${m[1]}) <button class="btn-add" onclick="addToCart('${m[0]}', ${m[1]})">+</button></div>`;
        });
    });

    function addToCart(name, price) {
        cart.push({ name: name, total: price, qty: 1, sweetness: "-" });
        document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.total, 0);
        alert("เพิ่ม " + name + " ลงตะกร้าแล้วค่ะ");
    }

    // 2. แผนที่
    window.onload = function() {
        const center = { lat: 7.556, lng: 99.607 }; 
        const map = new google.maps.Map(document.getElementById("map"), { zoom: 16, center: center });
        const marker = new google.maps.Marker({ position: center, map: map, draggable: true });
        google.maps.event.addListener(marker, 'dragend', function() {
            document.getElementById('lat-lng').value = marker.getPosition().lat() + "," + marker.getPosition().lng();
        });
    };

    // 3. ส่งออเดอร์
    async function finalizeDelivery() {
        if(cart.length === 0) return alert("เลือกเมนูอาหารก่อนนะคะ");
        if(!document.getElementById('cust-name').value) return alert("กรุณากรอกชื่อ");

        const payload = {
            action: 'submitOrder',
            table: 'DELIVERY-' + document.getElementById('cust-name').value, 
            cart: cart,
            customer: {
                name: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                dorm: document.getElementById('cust-dorm').value,
                note: document.getElementById('cust-note').value,
                coords: document.getElementById('lat-lng').value
            }
        };

        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(payload) 
        });
        
        alert("สั่งอาหารสำเร็จ! ร้านกำลังดำเนินการค่ะ");
        location.reload();
    }
</script>
</body>
</html>
