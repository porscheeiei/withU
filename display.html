<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHU Customer Display System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a1a1a; --accent: #10b981; --bg: #f8f9fa; --shadow: 0 25px 60px rgba(0,0,0,0.06); }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--p); -webkit-font-smoothing: antialiased; }
        
        /* Rounded Corners (35px) สำหรับ main containers */
        .card, .setup-box, .order-side, #qr-overlay { border-radius: 35px; }

        /* --- หน้าตั้งค่าครั้งแรก (Visual Setup) --- */
        #setup-screen { position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .setup-box { background: #fff; padding: 60px 50px; text-align: center; width: 85%; max-width: 450px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); }
        .setup-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 25px; border: 5px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* ตารางเลือกโต๊ะแบบ Visual */
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 40px; }
        .btn-table { aspect-ratio: 1; padding: 10px; border: 2px solid #eee; border-radius: 20px; font-size: 22px; font-weight: 800; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: #fff; display: flex; align-items: center; justify-content: center; color: var(--p); }
        .btn-table:hover { border-color: var(--p); transform: scale(1.05); }
        .btn-table:active { transform: scale(0.97); }
        .btn-table.active { background: var(--p); color: #fff; border-color: var(--p); }

        /* --- จอแสดงผลหลัก (Main Display) --- */
        .main-display { display: none; width: 100%; height: 100%; }

        /* ฝั่งซ้าย: รายการ (ขาวสะอาด) */
        .order-side { flex: 1.2; padding: 60px; background: #fff; display: flex; flex-direction: column; box-shadow: 20px 0 50px rgba(0,0,0,0.02); z-index: 2; margin-right: 1px;}
        .order-list { flex: 1; overflow-y: auto; margin-top: 30px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 2px dashed #f3f3f3; animation: slideIn 0.4s ease-out; }
        .item b { font-size: 30px; font-weight: 600; color: #000; }
        .item small { font-size: 20px; color: #888; display: block; margin-top: 5px; }
        .item .item-price { font-size: 30px; font-weight: 800; color: var(--p); }
        
        /* ฝั่งขวา: ยอดรวมและจ่ายเงิน (ธีมมินิมอลดำ) */
        .payment-side { flex: 0.8; padding: 60px; background: var(--p); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .payment-logo { width: 170px; height: 170px; border-radius: 50%; border: 6px solid #fff; margin-bottom: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); object-fit: cover; }
        .total-label { font-size: 35px; opacity: 0.7; font-weight: 300; }
        .total-amount { font-size: 110px; font-weight: 800; color: var(--accent); margin: 10px 0; }
        .currency { font-size: 45px; margin-left: 10px; }

        /* QR Overlay */
        #qr-overlay { display: none; background: #fff; padding: 40px; border-radius: 40px; margin-top: 30px; animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        #qr-overlay img { width: 320px; height: 320px; border-radius: 20px; }
        .qr-label { color: #000; font-weight: 800; margin-top: 20px; font-size: 26px; }

        /* หน้า Idle (ตอนไม่มีออเดอร์) */
        #idle-screen { position: fixed; inset: 0; background: var(--p); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; }
        .idle-logo { width: 220px; height: 220px; border-radius: 50%; border: 8px solid #fff; margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); object-fit: cover; }
        .welcome-title { font-size: 65px; font-weight: 800; margin-top: 20px; letter-spacing: 2px; }
        .welcome-sub { font-size: 30px; opacity: 0.5; font-weight: 300; }
        .table-pill { margin-top: 60px; font-size: 32px; background: rgba(255,255,255,0.1); padding: 15px 50px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.2); }
        
        /* ปุ่ม Reset บนหน้า Idle */
        .btn-reset-idle { position: fixed; bottom: 30px; right: 30px; opacity: 0.2; background: #fff; border: none; color: #000; padding: 12px 25px; border-radius: 50px; font-family: 'Prompt'; font-weight: 600; cursor: pointer; font-size: 14px; z-index: 2000; transition: 0.3s; }
        .btn-reset-idle:hover { opacity: 0.8; background: #ff4757; color: #fff; }

        /* Animations */
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes popUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="setup-screen" style="display: none;">
        <div class="setup-box card">
            <img src="https://img1.pic.in.th/images/-------2.png" class="setup-logo" alt="Setup Logo">
            <h2 style="font-weight: 800; font-size: 32px; margin: 0 0 10px 0;">ตั้งค่าจอ CDS</h2>
            <p style="font-size: 20px; color: #888; font-weight: 300;">กรุณาเลือกหมายเลขโต๊ะสำหรับเครื่องนี้</p>
            <div class="btn-grid">
                <script>
                    for(let i=1; i<=12; i++) {
                        document.write(`<button class="btn-table" onclick="setTable(${i})">${i}</button>`);
                    }
                </script>
            </div>
            <p style="font-size: 14px; color: #ccc; margin-top: 40px;">WITHU Customer Display System</p>
        </div>
    </div>

    <div id="idle-screen" style="display: none;">
        <img src="https://img1.pic.in.th/images/-------2.png" class="idle-logo" alt="Idle Logo">
        <div class="welcome-title">WITHU</div>
        <div class="welcome-sub">ยินดีต้อนรับค่ะ | Your Moments, Your Coffee</div>
        <div id="table-display-pill" class="table-pill">โต๊ะ -</div>
        
        <button class="btn-reset-idle" onclick="resetCDS()">เปลี่ยนโต๊ะ (Reset)</button>
    </div>

    <div id="main-display" class="main-display card">
        <div class="order-side card">
            <h1 style="font-size: 50px; margin: 0; font-weight: 800; border-left: 12px solid var(--p); padding-left: 20px;">รายการสั่งซื้อ</h1>
            <div id="order-items-list" class="order-list">
                </div>
        </div>

        <div class="payment-side card">
            <img src="https://img1.pic.in.th/images/-------2.png" class="payment-logo" alt="Payment Logo">
            <div class="total-label">ยอดชำระทั้งหมด</div>
            <div class="total-amount"><span id="total-price-display">0</span><span class="currency">฿</span></div>
            
            <div id="qr-overlay card">
                <img id="qr-img-cds" src="" alt="PromptPay QR">
                <div class="qr-label">สแกนจ่ายที่นี่</div>
            </div>

            <p style="position: absolute; bottom: 30px; opacity: 0.3; font-weight: 300;">WITHU CDS</p>
        </div>
    </div>

<script>
    // ⚠️ สำคัญ: ใส่ Web App URL ของน้องตรงนี้ (URL ที่ลงท้ายด้วย /exec)
    const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec"; 
    
    let currentTable = localStorage.getItem('withu_cds_table');

    // 🚩 ระบบจัดการหน้าจอ (Initialization)
    function init() {
        if (!currentTable) {
            document.getElementById('setup-screen').style.display = 'flex';
        } else {
            startSystem();
        }
    }

    // 🚩 ฟังก์ชันตั้งค่าโต๊ะครั้งแรก
    function setTable(tableId) {
        localStorage.setItem('withu_cds_table', tableId);
        currentTable = tableId;
        document.getElementById('setup-screen').style.display = 'none';
        startSystem();
    }

    // 🚩 ฟังก์ชันล้างค่าโต๊ะ (Reset)
    function resetCDS() {
        if(confirm("ต้องการเปลี่ยนหมายเลขโต๊ะสำหรับเครื่องนี้ใช่ไหมคะ?")) {
            localStorage.removeItem('withu_cds_table');
            location.reload();
        }
    }

    // 🚩 เริ่มต้นระบบซิงค์
    function startSystem() {
        document.getElementById('table-display-pill').innerText = "โต๊ะ " + currentTable;
        // เริ่มต้น Polling
        setInterval(updateCDS, 2000); // เช็กข้อมูลทุกๆ 2 วินาที
        updateCDS(); // เช็กทันที 1 ครั้ง
    }

    // 🚩 ฟังก์ชันดึงข้อมูลมาแสดงผล (Core Logic)
    async function updateCDS() {
        if(!currentTable) return;
        
        try {
            const response = await fetch(API_URL + "?action=getDisplayData&table=" + currentTable);
            const data = await response.json();

            // 1. จัดการการสลับหน้าจอ (Idle/Active)
            if (data.orders && data.orders.length > 0) {
                // มีออเดอร์ค้างอยู่: โชว์หน้า Active
                document.getElementById('idle-screen').style.display = 'none';
                document.getElementById('main-display').style.display = 'flex';
                
                // 2. เรนเดอร์รายการออเดอร์
                let totalAmount = 0;
                let html = data.orders.map(o => {
                    let priceRaw = o.total.toString();
                    let priceClean = parseFloat(priceRaw.replace(/[^0-9.]/g, "")) || 0;
                    totalAmount += priceClean;
                    return `
                        <div class="item card">
                            <span>
                                <b>${o.qty}x ${o.menu}</b>
                                <small>${o.details}</small>
                            </span>
                            <span class="item-price">฿${priceClean.toLocaleString()}</span>
                        </div>`;
                }).join('');
                
                document.getElementById('order-items-list').innerHTML = html;
                document.getElementById('total-price-display').innerText = totalAmount.toLocaleString();

                // 3. จัดการการแสดงผล QR Code
                if (data.payStatus === 'paying') {
                    // แอดมินกดเปิด QR: เจนและโชว์
                    // 🚩 อย่าลืมเปลี่ยนเบอร์พร้อมเพย์ตรงนี้!
                    document.getElementById('qr-img-cds').src = `https://promptpay.io/0931805507/${totalAmount}.png`;
                    document.getElementById('qr-overlay').style.display = 'block';
                } else {
                    // ไม่ได้อยู่ในสถานะจ่ายเงิน: ซ่อน
                    document.getElementById('qr-overlay').style.display = 'none';
                }
            } else {
                // ไม่มีออเดอร์: โชว์หน้า Idle
                document.getElementById('main-display').style.display = 'none';
                document.getElementById('idle-screen').style.display = 'flex';
                // ล้างข้อมูลเพื่อความสะอาด
                document.getElementById('order-items-list').innerHTML = '';
                document.getElementById('total-price-display').innerText = '0';
            }
        } catch(e) {
            console.error("CDS Sync Error:", e);
        }
    }

    // 🚩 รันระบบเมื่อโหลดเสร็จ
    init();
</script>
</body>
</html>
