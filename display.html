<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>WITHU | Premium POS Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        body { background: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Layout Grid */
        #active-container { display: none; width: 100vw; height: 100vh; grid-template-columns: 1fr 450px; }

        /* Left Side: Order List */
        .order-side { background: #fff; padding: 40px; overflow-y: auto; border-right: 1px solid #eee; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .brand-info { display: flex; align-items: center; gap: 15px; }
        .brand-info img { width: 50px; border-radius: 50%; }
        .table-tag { background: #0f172a; color: #fff; padding: 8px 25px; border-radius: 50px; font-weight: 800; }
        .item-row { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #f1f5f9; }
        .item-info b { font-size: 20px; display: block; }
        .item-info small { font-size: 14px; color: #3b82f6; font-weight: 600; }
        .item-price { font-size: 22px; font-weight: 800; }

        /* Right Side: Payment */
        .payment-side { background: #0f172a; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .total-label { font-size: 18px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .total-amount { font-size: 90px; font-weight: 900; margin: 10px 0; display: flex; align-items: flex-start; }
        .currency { font-size: 35px; color: #60a5fa; margin-top: 15px; margin-left: 5px; }
        .qr-box { background: #fff; padding: 20px; border-radius: 20px; text-align: center; }
        .qr-hint { margin-top: 15px; font-size: 20px; font-weight: 700; color: #000; }
    </style>
</head>
<body>

    <div id="idle-screen" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center;">
        <video id="promo-video" autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover;">
            <source src="WITHU.mp4" type="video/mp4">
        </video>
    </div>

    <div id="active-container">
        <div class="order-side">
            <div class="header-row">
                <div class="brand-info">
                    <img src="https://img1.pic.in.th/images/-------2.png">
                    <h1 style="font-size:24px; margin:0;">WITHU CAFE</h1>
                </div>
                <div id="display-table-id" class="table-tag">โต๊ะ -</div>
            </div>
            <div id="order-items-list"></div>
        </div>

        <div class="payment-side">
            <div class="total-label">ยอดชำระสุทธิ (TOTAL DUE)</div>
            <div class="total-amount"><span id="total-val">0</span><span class="currency">฿</span></div>
            <div class="qr-box">
                <img id="qr-img-cds" src="" style="width:220px; height:220px; display:block;">
                <div class="qr-hint">สแกนเพื่อชำระเงิน</div>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    
    async function updateCDS() {
        try {
            const r = await fetch(API_URL + "?action=getCDSActive");
            const d = await r.json();
            const idle = document.getElementById('idle-screen');
            const active = document.getElementById('active-container');

            if (d.status === 'active') {
                idle.style.display = 'none';
                active.style.display = 'grid';
                document.getElementById('display-table-id').innerText = "โต๊ะ " + d.table;
                
                let total = 0;
                document.getElementById('order-items-list').innerHTML = d.orders.map(o => {
                    let price = parseFloat(String(o.total).replace(/,/g, '')) || 0;
                    total += price;
                    return `<div class="item-row"><div class="item-info"><b>${o.qty}x ${o.menu}</b><small>${o.details || '-'}</small></div><div class="item-price">฿${price.toLocaleString()}</div></div>`;
                }).join('');
                
                document.getElementById('total-val').innerText = total.toLocaleString();
                document.getElementById('qr-img-cds').src = `https://promptpay.io/0931805507/${total}.png`;
            } else {
                idle.style.display = 'flex';
                active.style.display = 'none';
            }
        } catch(e) { console.error("Sync Error:", e); }
    }

    setInterval(updateCDS, 2000);
</script>
</body>
</html>
