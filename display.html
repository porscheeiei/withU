<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU | Premium POS Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --bg-light: #f8fafc; --text-dark: #0f172a; --red: #ef4444; --accent: #10b981; }
        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        body { background: #000; margin: 0; height: 100vh; overflow: hidden; color: #fff; }
        
        /* Video Idle */
        #idle-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; transition: opacity 0.8s; }
        #promo-video { width: 100%; height: 100%; object-fit: cover; }

        /* Layout */
        #active-container { display: none; width: 100vw; height: 100vh; grid-template-columns: 1fr 0.8fr; background: #fff; color: var(--text-dark); }
        .order-side { padding: 50px; overflow-y: auto; border-right: 1px solid #eee; }
        .payment-side { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        
        /* Components */
        .item-row { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px dashed #ccc; }
        .total-amount { font-size: 80px; font-weight: 900; color: #fff; margin: 20px 0; }
        .cash-box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; }
        .cash-row { display: flex; justify-content: space-between; font-size: 24px; margin-bottom: 10px; }
        .change-row { font-size: 40px; font-weight: 800; color: var(--accent); margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
    </style>
</head>
<body>

    <div id="idle-screen">
        <video id="promo-video" autoplay muted loop playsinline><source src="WITHU.mp4" type="video/mp4"></video>
    </div>

    <div id="active-container">
        <div class="order-side">
            <h2 id="display-table">โต๊ะ -</h2>
            <div id="order-items-list"></div>
        </div>
        <div class="payment-side">
            <div class="total-label">ยอดชำระสุทธิ</div>
            <div class="total-amount">฿<span id="total-val">0</span></div>
            <div id="qr-section">
                <img id="qr-img" src="" style="width:250px; background:white; padding:10px; border-radius:20px;">
            </div>
            <div id="cash-section" class="cash-box" style="display:none;">
                <div class="cash-row"><span>รับเงินสด</span><span id="cds-received">฿0</span></div>
                <div class="cash-row change-row"><span>เงินทอน</span><span id="cds-change">฿0</span></div>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    
    async function updateCDS() {
        try {
            const r = await fetch(API_URL + "?action=getCDSActive");
            const d = await r.json();
            const idle = document.getElementById('idle-screen');
            const active = document.getElementById('active-container');

            if (d.status === 'active') {
                idle.style.display = 'none';
                active.style.display = 'grid';
                document.getElementById('display-table').innerText = "โต๊ะ " + d.table;
                let total = d.orders.reduce((s, o) => s + (parseFloat(String(o.total).replace(/,/g,'')) || 0), 0);
                document.getElementById('total-val').innerText = total.toLocaleString();
                document.getElementById('order-items-list').innerHTML = d.orders.map(o => `
                    <div class="item-row">
                        <div><b>${o.qty}x ${o.menu}</b><br><small>${o.details || '-'}</small></div>
                        <div>฿${o.total}</div>
                    </div>`).join('');
                document.getElementById('qr-img').src = `https://promptpay.io/0931805507/${total}.png`;
                
                // Sync Cash (ดึงจาก LocalStorage ถ้าหน้า Admin คีย์)
                const rec = parseFloat(localStorage.getItem('cds_cash_received')) || 0;
                if(rec > 0) {
                    document.getElementById('qr-section').style.display = 'none';
                    document.getElementById('cash-section').style.display = 'block';
                    document.getElementById('cds-received').innerText = '฿' + rec.toLocaleString();
                    document.getElementById('cds-change').innerText = '฿' + Math.max(0, rec - total).toLocaleString();
                } else {
                    document.getElementById('qr-section').style.display = 'block';
                    document.getElementById('cash-section').style.display = 'none';
                }
            } else {
                idle.style.display = 'flex';
                active.style.display = 'none';
                localStorage.setItem('cds_cash_received', 0);
            }
        } catch(e) { console.error(e); }
    }

    // ฟังเหตุการณ์ถ้าหน้า Admin อัปเดตเงินสด
    window.addEventListener('storage', (e) => { if(e.key === 'cds_cash_received') updateCDS(); });
    setInterval(updateCDS, 2000);
</script>
</body>
</html>
