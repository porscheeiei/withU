<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU | Premium CDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0f172a; 
            --blue: #2563eb; 
            --bg: #f1f5f9; 
            --white: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --accent: #10b981;
        }
        
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        
        /* --- 📹 Video Idle (Full Screen) --- */
        #idle-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        #promo-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .video-overlay { position: absolute; bottom: 80px; left: 80px; color: #fff; }
        .video-overlay h1 { font-size: 80px; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .video-overlay p { font-size: 32px; font-weight: 300; opacity: 0.9; margin-top: 10px; }

        /* --- 🏢 Layout หลัก (60/40 Split) --- */
        #active-container { display: none; width: 100%; height: 100%; grid-template-columns: 1.2fr 0.8fr; background: var(--bg); }

        /* --- 📝 Left: Order List --- */
        .order-side { background: var(--bg); padding: 60px 80px; display: flex; flex-direction: column; overflow: hidden; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; }
        .header-row h1 { font-size: 48px; font-weight: 800; margin: 0; letter-spacing: -1.5px; color: var(--navy); }
        .table-tag { background: var(--white); color: var(--navy); padding: 12px 30px; border-radius: 20px; font-size: 24px; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        .order-list { flex: 1; overflow-y: auto; padding-right: 20px; }
        .item-card { background: var(--white); padding: 30px; border-radius: 30px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid rgba(255,255,255,0.5); animation: fadeInUp 0.5s ease; }
        .item-info b { font-size: 32px; font-weight: 700; color: var(--navy); display: block; line-height: 1.2; }
        .item-info small { font-size: 20px; color: var(--text-sub); margin-top: 8px; display: block; }
        .item-price { font-size: 34px; font-weight: 800; color: var(--navy); }

        /* --- 💳 Right: Payment Area --- */
        .payment-side { background: var(--navy); color: #fff; padding: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-radius: 60px 0 0 60px; box-shadow: -20px 0 60px rgba(0,0,0,0.1); }
        
        .brand-logo { width: 140px; margin-bottom: 40px; opacity: 0.9; }
        .total-container { text-align: center; margin-bottom: 40px; }
        .total-label { font-size: 28px; font-weight: 400; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }
        .total-amount { font-size: 140px; font-weight: 800; color: #fff; line-height: 1; margin: 10px 0; letter-spacing: -5px; }
        .total-amount span { color: var(--blue); }

        /* QR Payment Card */
        .qr-section { background: var(--white); padding: 40px; border-radius: 45px; width: 100%; max-width: 380px; box-shadow: 0 40px 80px rgba(0,0,0,0.4); text-align: center; transform: translateY(0); animation: float 6s ease-in-out infinite; }
        .qr-section img { width: 100%; aspect-ratio: 1/1; border-radius: 15px; }
        .qr-text { color: var(--navy); font-weight: 800; font-size: 24px; margin-top: 25px; letter-spacing: 0.5px; }

        .footer-note { position: absolute; bottom: 40px; font-size: 14px; opacity: 0.3; letter-spacing: 3px; }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="idle-screen">
        <video id="promo-video" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-coffee-beans-falling-into-a-grinder-41484-large.mp4" type="video/mp4">
        </video>
        <div class="video-overlay">
            <h1 style="font-family: 'Prompt';">WITHU CAFE</h1>
            <p>Better Coffee, Better Moments.</p>
        </div>
    </div>

    <div id="active-container">
        <div class="order-side">
            <div class="header-row">
                <h1>Current Order</h1>
                <div id="display-table-id" class="table-tag">Table -</div>
            </div>
            <div id="order-items-list" class="order-list">
                </div>
        </div>

        <div class="payment-side">
            <img src="https://img1.pic.in.th/images/-------2.png" class="brand-logo" alt="Logo">
            
            <div class="total-container">
                <div class="total-label">Total Amount</div>
                <div class="total-amount"><span id="total-val">0</span>฿</div>
            </div>
            
            <div class="qr-section">
                <img id="qr-img-cds" src="" alt="Payment QR">
                <div class="qr-text">Scan to Pay</div>
            </div>

            <div class="footer-note">POWERED BY WITHU POS</div>
        </div>
    </div>

<script>
    // ⚠️ อย่าลืมใส่ API URL ของน้องนะครับ
    const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 

    async function updateCDS() {
        try {
            const response = await fetch(API_URL + "?action=getCDSActive");
            const data = await response.json();

            const idle = document.getElementById('idle-screen');
            const active = document.getElementById('active-container');

            if (data.status === 'active' && data.orders.length > 0) {
                idle.style.opacity = '0';
                setTimeout(() => { idle.style.display = 'none'; }, 800);
                active.style.display = 'grid';
                
                document.getElementById('display-table-id').innerText = "Table " + data.table;
                
                let total = 0;
                let html = data.orders.map(o => {
                    let price = parseFloat(o.total.toString().replace(/,/g, '')) || 0;
                    total += price;
                    return `
                        <div class="item-card">
                            <div class="item-info">
                                <b>${o.qty}x ${o.menu}</b>
                                <small>${o.details || 'Standard'}</small>
                            </div>
                            <div class="item-price">฿${price.toLocaleString()}</div>
                        </div>`;
                }).join('');
                
                document.getElementById('order-items-list').innerHTML = html;
                document.getElementById('total-val').innerText = total.toLocaleString();
                document.getElementById('qr-img-cds').src = `https://promptpay.io/0931805507/${total}.png`;
            } else {
                idle.style.display = 'flex';
                setTimeout(() => { idle.style.opacity = '1'; }, 10);
                active.style.display = 'none';
                const video = document.getElementById('promo-video');
                if (video.paused) video.play().catch(e => {});
            }
        } catch(e) { console.error("Sync Error:", e); }
    }

    // เช็คข้อมูลทุก 2.5 วินาที
    setInterval(updateCDS, 2500);
</script>
</body>
</html>
