<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU Customer Display System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0f172a; 
            --blue: #1d4ed8; 
            --accent: #10b981; 
            --bg: #f8fafc; 
            --white: #ffffff;
        }
        
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--navy); }
        
        /* --- 📹 ส่วน Video Idle (โชว์ตอนไม่มีลูกค้า) --- */
        #idle-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        #promo-video { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay { position: absolute; bottom: 50px; left: 50px; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* --- 💳 ส่วน Display ออเดอร์ (ขาว-ฟ้าน้ำเงิน) --- */
        .order-side { flex: 1.2; padding: 60px; background: var(--white); display: flex; flex-direction: column; border-radius: 0 40px 40px 0; box-shadow: 15px 0 50px rgba(0,0,0,0.05); z-index: 2; }
        .order-list { flex: 1; overflow-y: auto; margin-top: 30px; padding-right: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 2px dashed #e2e8f0; animation: slideIn 0.4s ease-out; }
        .item b { font-size: 32px; font-weight: 600; color: var(--navy); }
        .item small { font-size: 20px; color: #64748b; display: block; margin-top: 5px; }
        .item .item-price { font-size: 32px; font-weight: 800; color: var(--blue); }
        
        .payment-side { flex: 0.8; padding: 60px; background: var(--navy); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .logo-box { width: 180px; height: 180px; border-radius: 50%; border: 6px solid rgba(255,255,255,0.1); margin-bottom: 30px; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .total-label { font-size: 35px; opacity: 0.8; font-weight: 300; }
        .total-amount { font-size: 110px; font-weight: 800; color: #60a5fa; margin: 10px 0; line-height: 1; }
        .currency { font-size: 45px; margin-left: 10px; }

        /* QR Code */
        #qr-container { background: #fff; padding: 35px; border-radius: 40px; margin-top: 30px; animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        #qr-container img { width: 300px; height: 300px; }
        .qr-label { color: #000; font-weight: 800; margin-top: 15px; font-size: 24px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes popUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="idle-screen">
        <video id="promo-video" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-coffee-beans-falling-into-a-grinder-41484-large.mp4" type="video/mp4">
        </video>
        <div class="video-overlay">
            <h1 style="font-size: 65px; margin: 0; font-weight: 800;">WITHU CAFE</h1>
            <p style="font-size: 28px; font-weight: 300;">Moments in every cup.</p>
        </div>
    </div>

    <div class="order-side">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="font-size: 48px; margin: 0; font-weight: 800; color: var(--navy);">สรุปรายการสั่งซื้อ</h1>
            <span id="display-table-id" style="background: var(--blue); color: #fff; padding: 10px 30px; border-radius: 100px; font-size: 26px; font-weight: 700;">โต๊ะ -</span>
        </div>
        <div id="order-items" class="order-list"></div>
    </div>

    <div class="payment-side">
        <div class="logo-box">
            <img src="https://img1.pic.in.th/images/-------2.png" alt="Logo">
        </div>
        <div class="total-label">ยอดชำระทั้งหมด</div>
        <div class="total-amount"><span id="total-price">0</span><span class="currency">฿</span></div>
        
        <div id="qr-container">
            <img id="qr-img" src="" alt="PromptPay QR">
            <div class="qr-label">สแกนเพื่อชำระเงิน</div>
        </div>

        <div style="position: absolute; bottom: 40px; opacity: 0.3; font-weight: 300; font-size: 16px;">WITHU CUSTOMER DISPLAY SYSTEM</div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec"; 

    async function updateCDS() {
        try {
            // ดึงข้อมูลสถานะ "โต๊ะที่กำลังจ่ายเงิน" จากระบบจอกลาง
            const response = await fetch(API_URL + "?action=getCDSActive");
            const data = await response.json();

            if (data.status === 'active' && data.orders.length > 0) {
                // สลับมาโชว์หน้าชำระเงิน
                document.getElementById('idle-screen').style.display = 'none';
                document.getElementById('display-table-id').innerText = "โต๊ะ " + data.table;
                
                let total = 0;
                let html = data.orders.map(o => {
                    let price = parseFloat(o.total.toString().replace(/,/g, '')) || 0;
                    total += price;
                    return `
                        <div class="item">
                            <span>
                                <b>${o.qty}x ${o.menu}</b>
                                <small>${o.details}</small>
                            </span>
                            <span class="item-price">฿${price.toLocaleString()}</span>
                        </div>`;
                }).join('');
                
                document.getElementById('order-items').innerHTML = html;
                document.getElementById('total-price').innerText = total.toLocaleString();

                // เจน QR Code ทันที
                document.getElementById('qr-img').src = `https://promptpay.io/0931805507/${total}.png`;
            } else {
                // ไม่มีใครจ่ายเงิน ให้เล่นวิดีโอโฆษณา
                document.getElementById('idle-screen').style.display = 'flex';
                // พยายามสั่งให้วิดีโอเล่น (กรณีโดน Browser บล็อค)
                const video = document.getElementById('promo-video');
                if (video.paused) video.play().catch(e => {});
            }
        } catch(e) {
            console.error("CDS Sync Error:", e);
        }
    }

    // ตรวจสอบข้อมูลทุก 2.5 วินาทีเพื่อให้จอสลับได้เร็ว
    setInterval(updateCDS, 2500);
</script>
</body>
</html>
