<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>WITHU | Premium POS Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --text-dark: #0f172a; }
        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        body { background: #000; margin: 0; height: 100vh; overflow: hidden; }

        /* Idle Video */
        #idle-screen { position: fixed; inset: 0; z-index: 1000; display: flex; }
        #promo-video { width: 100%; height: 100%; object-fit: cover; }

        /* Active Display */
        #active-container { display: none; width: 100vw; height: 100vh; grid-template-columns: 1fr 480px; background: #fff; }

        /* Left: Order */
        .order-side { padding: 50px 70px; display: flex; flex-direction: column; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .brand-info { display: flex; align-items: center; gap: 15px; font-size: 28px; font-weight: 800; }
        .table-badge { background: #0f172a; color: #fff; padding: 10px 30px; border-radius: 20px; font-size: 24px; font-weight: 800; }
        .item-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 25px 0; border-bottom: 1px solid #f1f5f9; }
        .item-info b { font-size: 28px; font-weight: 700; display: block; }
        .item-info small { font-size: 18px; color: #2563eb; font-weight: 600; display: block; margin-top: 5px; }
        .item-price { font-size: 28px; font-weight: 800; }

        /* Right: Payment */
        .payment-side { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .due-label { font-size: 18px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .total-amount { font-size: 100px; font-weight: 900; margin: 10px 0 40px 0; letter-spacing: -3px; display: flex; align-items: flex-start; }
        .qr-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; color: #000; }
        .qr-hint { margin-top: 15px; font-size: 22px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="idle-screen"><video id="promo-video" autoplay muted loop playsinline><source src="WITHU.mp4" type="video/mp4"></video></div>

    <div id="active-container">
        <div class="order-side">
            <div class="header-row">
                <div class="brand-info"><img src="https://img1.pic.in.th/images/-------2.png" style="width:50px;"> WITHU CAFE</div>
                <div id="table-display" class="table-badge">โต๊ะ -</div>
            </div>
            <div id="order-items-list"></div>
        </div>

        <div class="payment-side">
            <div class="due-label">ยอดชำระสุทธิ (TOTAL DUE)</div>
            <div class="total-amount"><span id="total-val">0</span><span style="font-size:30px; margin-top:15px; color:#60a5fa;">฿</span></div>
            <div class="qr-card">
                <img id="qr-img" src="" style="width:250px; height:250px; display:block;">
                <div class="qr-hint">สแกนเพื่อชำระเงิน</div>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    
    async function updateCDS() {
        try {
            const r = await fetch(API_URL + "?action=getCDSActive");
            const d = await r.json();
            const idle = document.getElementById('idle-screen');
            const active = document.getElementById('active-container');

            if (d.status === 'active') {
                idle.style.opacity = '0';
                setTimeout(() => { idle.style.display = 'none'; active.style.display = 'grid'; }, 800);
                
                document.getElementById('table-display').innerText = "โต๊ะ " + d.table;
                
                let total = 0;
                document.getElementById('order-items-list').innerHTML = d.orders.map(o => {
                    let p = parseFloat(String(o.total).replace(/,/g, '')) || 0;
                    total += p;
                    // แสดง detail ถ้ามี (เช่น หวาน 0%)
                    return `
                        <div class="item-row">
                            <div class="item-info">
                                <b>${o.qty}x ${o.menu}</b>
                                ${o.details && o.details !== '-' ? `<small>${o.details}</small>` : ''}
                            </div>
                            <div class="item-price">฿${p.toLocaleString()}</div>
                        </div>`;
                }).join('');
                
                document.getElementById('total-val').innerText = total.toLocaleString();
                document.getElementById('qr-img').src = `https://promptpay.io/0931805507/${total}.png`;
            } else {
                idle.style.display = 'flex';
                idle.style.opacity = '1';
                active.style.display = 'none';
            }
        } catch(e) { console.error("Sync Error:", e); }
    }
    
    setInterval(updateCDS, 2000);
</script>
</body>
</html>
