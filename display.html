ฃ<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHU | Premium POS Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue: #2563eb; 
            --bg-light: #f8fafc; 
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --border: #f1f5f9;
        }
        
        body { font-family: 'Prompt', sans-serif; background: var(--bg-light); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-dark); }
        
        /* --- 📹 Video Idle --- */
        #idle-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        #promo-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        .video-overlay { position: absolute; bottom: 80px; left: 80px; color: #fff; }
        .video-overlay h1 { font-size: 70px; font-weight: 800; margin: 0; }

        /* --- 🏢 Layout 2-Column --- */
        #active-container { display: none; width: 100%; height: 100%; grid-template-columns: 1.1fr 0.9fr; gap: 0; }

        /* --- 📝 ฝั่งซ้าย: รายการอาหาร --- */
        .order-side { padding: 60px 80px; display: flex; flex-direction: column; background: var(--white); border-right: 1px solid var(--border); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .header-row h1 { font-size: 42px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .table-tag { background: var(--blue); color: #fff; padding: 8px 24px; border-radius: 50px; font-size: 20px; font-weight: 700; }
        
        .order-list { flex: 1; overflow-y: auto; padding-right: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid var(--border); animation: fadeIn 0.4s ease; }
        .item-info b { font-size: 28px; font-weight: 700; display: block; }
        .item-info small { font-size: 18px; color: var(--text-gray); margin-top: 5px; display: block; }
        .item-price { font-size: 30px; font-weight: 800; color: var(--blue); }

        /* --- 💳 ฝั่งขวา: สรุปยอดเงินและสมาชิก --- */
        .payment-side { background: var(--bg-light); padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .payment-card {
            background: var(--white);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .brand-logo { width: 100px; height: 100px; margin: 0 auto 20px auto; display: block; border-radius: 50%; object-fit: cover; }
        .total-label { font-size: 20px; font-weight: 500; color: var(--text-gray); text-transform: uppercase; }
        .total-amount { font-size: 90px; font-weight: 800; color: var(--text-dark); margin: 5px 0; line-height: 1; letter-spacing: -2px; }
        .currency { font-size: 30px; color: var(--blue); margin-left: 5px; }

        /* Member Section */
        .member-box { 
            background: #f8fafc; 
            padding: 25px; 
            border-radius: 30px; 
            margin-top: 25px; 
            border: 1px solid #f1f5f9;
        }
        .member-input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 15px; 
            font-family: 'Prompt'; 
            font-size: 22px; 
            text-align: center; 
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }
        .member-btn { 
            width: 100%; 
            background: var(--blue); 
            color: #fff; 
            border: none; 
            padding: 12px; 
            border-radius: 15px; 
            font-family: 'Prompt'; 
            font-weight: 700; 
            font-size: 18px; 
            cursor: pointer;
        }
        .point-display { text-align: left; animation: fadeIn 0.5s ease; }
        .point-display b { font-size: 24px; color: var(--text-dark); }
        .point-display p { font-size: 18px; color: var(--blue); margin: 5px 0 0 0; font-weight: 600; }

        /* QR Code */
        .qr-box { margin-top: 25px; }
        .qr-box img { width: 180px; height: 180px; mix-blend-mode: multiply; }

        .footer-text { margin-top: 20px; font-size: 11px; opacity: 0.3; letter-spacing: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="idle-screen">
        <video id="promo-video" autoplay muted loop playsinline>
            <source src="WITHU.mp4" type="video/mp4">
        </video>
        <div class="video-overlay">
            <h1>WITHU CAFE</h1>
        </div>
    </div>

    <div id="active-container">
        <div class="order-side">
            <div class="header-row">
                <h1>สรุปรายการสั่งซื้อ</h1>
                <div id="display-table-id" class="table-tag">โต๊ะ -</div>
            </div>
            <div id="order-items-list" class="order-list"></div>
        </div>

        <div class="payment-side">
            <div class="payment-card">
                <img src="https://img1.pic.in.th/images/-------2.png" class="brand-logo" alt="Logo">
                <div class="total-label">ยอดชำระสุทธิ</div>
                <div class="total-amount"><span id="total-val">0</span><span class="currency">฿</span></div>
                
                <div class="member-box">
                    <div id="member-input-area">
                        <div style="font-size: 14px; margin-bottom: 8px; color: var(--text-gray);">สะสมแต้มเบอร์โทรศัพท์</div>
                        <input type="tel" id="member-phone" placeholder="08XXXXXXXX" class="member-input">
                        <button onclick="submitMember()" class="member-btn">ยืนยันสะสมแต้ม</button>
                    </div>
                    <div id="member-status-area" class="point-display" style="display:none;">
                        <div style="font-size: 13px; color: var(--text-gray);">WITHU Member</div>
                        <b id="active-phone">08x-xxx-xxxx</b>
                        <p>แต้มสะสม: <span id="active-pts">0</span> <span style="color:#10b981;">(+<span id="earned-pts">0</span>)</span></p>
                    </div>
                </div>

                <div class="qr-box">
                    <img id="qr-img-cds" src="" alt="QR">
                    <div style="font-size: 16px; font-weight: 700; margin-top: 10px;">สแกนเพื่อชำระเงิน</div>
                </div>
                
                <div class="footer-text">WITHU CUSTOMER DISPLAY SYSTEM</div>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 

    // ฟังก์ชันส่งเบอร์สมาชิกจากจอ CDS
    async function submitMember() {
        const phone = document.getElementById('member-phone').value;
        const tableTxt = document.getElementById('display-table-id').innerText;
        const tableId = tableTxt.replace("โต๊ะ ", "");

        if (!phone || phone.length < 9) {
            alert("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง");
            return;
        }

        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'linkMemberToOrder', table: tableId, phone: phone })
            });
            updateCDS(); // รีเฟรชหน้าจอเพื่อโชว์แต้ม
        } catch(e) { console.error("Member Sync Error:", e); }
    }

    async function updateCDS() {
        try {
            const response = await fetch(API_URL + "?action=getCDSActive");
            const data = await response.json();

            const idle = document.getElementById('idle-screen');
            const active = document.getElementById('active-container');

            if (data.status === 'active' && data.orders.length > 0) {
                idle.style.opacity = '0';
                setTimeout(() => { idle.style.display = 'none'; }, 800);
                active.style.display = 'grid';
                
                document.getElementById('display-table-id').innerText = "โต๊ะ " + data.table;
                
                let total = 0;
                let html = data.orders.map(o => {
                    let price = parseFloat(o.total.toString().replace(/,/g, '')) || 0;
                    total += price;
                    return `
                        <div class="item-row">
                            <div class="item-info">
                                <b>${o.qty}x ${o.menu}</b>
                                <small>${o.details || '-'}</small>
                            </div>
                            <div class="item-price">฿${price.toLocaleString()}</div>
                        </div>`;
                }).join('');
                
                document.getElementById('order-items-list').innerHTML = html;
                document.getElementById('total-val').innerText = total.toLocaleString();
                document.getElementById('qr-img-cds').src = `https://promptpay.io/0931805507/${total}.png`;

                // 🚩 จัดการส่วนแสดงผลสมาชิก
                if (data.member && data.member.phone) {
                    document.getElementById('member-input-area').style.display = 'none';
                    document.getElementById('member-status-area').style.display = 'block';
                    document.getElementById('active-phone').innerText = data.member.phone;
                    document.getElementById('active-pts').innerText = data.member.points.toLocaleString();
                    document.getElementById('earned-pts').innerText = Math.floor(total / 10);
                } else {
                    document.getElementById('member-input-area').style.display = 'block';
                    document.getElementById('member-status-area').style.display = 'none';
                }

            } else {
                idle.style.display = 'flex';
                setTimeout(() => { idle.style.opacity = '1'; }, 10);
                active.style.display = 'none';
                const video = document.getElementById('promo-video');
                if (video.paused) video.play().catch(e => {});
            }
        } catch(e) { console.error("Sync Error:", e); }
    }

    setInterval(updateCDS, 2500);
</script>
</body>
</html>
