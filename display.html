<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>WITHU | Premium POS Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.95); --accent: #38bdf8; }
        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        body { background: #000; margin: 0; height: 100vh; overflow: hidden; }

        /* 1. Idle Screen */
        #idle-screen { position: fixed; inset: 0; z-index: 1000; display: flex; transition: opacity 1s ease; }
        #promo-video { width: 100%; height: 100%; object-fit: cover; }

        /* 2. Active Screen (Modern Grid) */
        #active-container { display: none; width: 100vw; height: 100vh; grid-template-columns: 1fr 480px; background: #0f172a; }

        /* Left: Order List (Modern Receipt) */
        .order-side { background: #fff; padding: 50px; overflow-y: auto; display: flex; flex-direction: column; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .brand-info { display: flex; align-items: center; gap: 15px; font-size: 28px; font-weight: 800; color: #000; }
        .table-badge { background: #f1f5f9; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: 800; }
        
        .item-row { background: #f8fafc; padding: 25px; border-radius: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.6s ease-out; }
        .item-info b { font-size: 24px; display: block; }
        .item-info small { color: #64748b; font-size: 16px; }
        .item-price { font-size: 26px; font-weight: 800; }

        /* Right: Luxury Payment */
        .payment-side { padding: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #fff; }
        .due-label { font-size: 16px; color: #94a3b8; text-transform: uppercase; letter-spacing: 4px; }
        .total-amount { font-size: 120px; font-weight: 900; margin: 0 0 40px 0; letter-spacing: -5px; }
        
        #qr-block { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .qr-card { background: #fff; padding: 20px; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .hint-text { margin-top: 20px; font-size: 20px; font-weight: 600; color: #fff; }

        #success-stamp { display: none; font-size: 26px; font-weight: 800; color: #10b981; margin-top: 20px; text-align: center; background: #fff; padding: 15px 40px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: bounceIn 0.5s ease; }

        /* ป๊อปอัปเงินทอน (แสดงแทน QR) */
        #cash-receipt { display: none; width: 100%; text-align: center; background: #fff; color: #000; padding: 40px 30px; border-radius: 30px; margin-top: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); animation: slideIn 0.5s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounceIn { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="idle-screen"><video id="promo-video" autoplay muted loop playsinline><source src="WITHU.mp4" type="video/mp4"></video></div>

    <div id="active-container">
        <div class="order-side">
            <div class="header-row">
                <div class="brand-info"><img src="https://img1.pic.in.th/images/-------2.png" style="width:50px; border-radius: 10px;"> WITHU CAFE</div>
                <div id="table-display" class="table-badge">โต๊ะ -</div>
            </div>
            <div id="order-items-list"></div>
        </div>

        <div class="payment-side">
            <div class="due-label">ยอดชำระสุทธิ (TOTAL)</div>
            <div class="total-amount"><span id="total-val">0</span><span style="font-size:30px; margin-left:10px; color:var(--accent);">฿</span></div>
            
            <div id="qr-block">
                <div class="qr-card">
                    <img id="qr-img" src="" style="width:250px; height:250px; display:block;">
                </div>
                <div class="hint-text" id="hint-text">สแกน QR เพื่อชำระเงิน</div>
                <div id="success-stamp">ชำระเงินสำเร็จ ✅</div>
            </div>

            <div id="cash-receipt">
                <div style="font-size: 18px; color: #64748b; font-weight: 700; text-transform: uppercase;">รับเงินมา</div>
                <div style="font-size: 45px; font-weight: 900; color: #000; margin-bottom: 20px;" id="received-val">0 ฿</div>
                
                <div style="font-size: 18px; color: #64748b; font-weight: 700; text-transform: uppercase;">เงินทอน</div>
                <div style="font-size: 65px; font-weight: 900; color: var(--accent); margin-bottom: 20px; line-height: 1;" id="change-display-val">0 ฿</div>
                
                <div style="font-size: 22px; font-weight: 800; color: #10b981; background: #ecfdf5; padding: 10px; border-radius: 20px; display: inline-block;">ชำระเงินสำเร็จ ✅</div>
            </div>
        </div>
    </div>

<script>
    // ⭐️ ใส่ API_URL ตัวล่าสุดตรงนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbzo3GGk0RBYAX_q4kYmYcONV2a639J-4TXoggQHGtRjtTaK7DdPz5KcrMwXK6wtSinPnA/exec";
    
    // ดึงเลขโต๊ะจาก URL หรือเด้งถามถ้าลืมใส่
    const urlParams = new URLSearchParams(window.location.search);
    let tableId = (urlParams.get('table') || "").trim();
    if (!tableId) {
        tableId = prompt("จอ Display นี้ตั้งอยู่ที่โต๊ะเบอร์อะไรครับ? (เช่น 1)", "1");
        if(tableId) window.history.replaceState(null, null, "?table=" + tableId);
    }

    let changeTimer = null;
    let lastOrderHash = ""; 
    let lastPaymentStatus = ""; 

    async function updateCDS() {
        if (!tableId) return;

        try {
            const r = await fetch(API_URL + "?action=getDisplayData&table=" + tableId);
            const d = await r.json();
            
            const idle = document.getElementById('idle-screen');
            const active = document.getElementById('active-container');

            // ⭐️ 1. ถ้าแอดมินกดปิดบิลแล้ว
            if (d.paymentStatus === 'completed') {
                if (lastPaymentStatus !== 'completed') {
                    lastPaymentStatus = 'completed';
                    
                    let changeAmount = parseFloat(d.change) || 0;
                    // ดึงค่ายอดรวมปัจจุบันจากหน้าจอมาคำนวณ
                    let currentTotal = parseFloat(document.getElementById('total-val').innerText.replace(/,/g, '')) || 0;
                    
                    // บังคับให้หน้าจอ Active (เมนูอาหาร) ยังคงแสดงอยู่ ไม่ให้หายไป!
                    active.style.display = 'grid';
                    idle.style.display = 'none';

                    if (changeAmount > 0) {
                        // 🟢 กรณีจ่ายเงินสด (มีเงินทอน)
                        let receivedAmount = currentTotal + changeAmount;
                        
                        document.getElementById('qr-block').style.display = 'none'; // ซ่อน QR
                        document.getElementById('cash-receipt').style.display = 'block'; // โชว์ใบเสร็จเงินสด
                        
                        document.getElementById('received-val').innerText = receivedAmount.toLocaleString() + " ฿";
                        document.getElementById('change-display-val').innerText = changeAmount.toLocaleString() + " ฿";
                    } else {
                        // 🔵 กรณีจ่ายพร้อมเพย์ หรือ เงินสดแบบพอดี
                        document.getElementById('hint-text').style.display = 'none'; // ซ่อนคำว่าให้สแกน
                        document.getElementById('success-stamp').style.display = 'block'; // โชว์ป้ายสำเร็จทับ
                    }
                    
                    // หน่วงเวลา 7 วินาที แล้วรีเซ็ตกลับหน้าวิดีโอ
                    if (changeTimer) clearTimeout(changeTimer);
                    changeTimer = setTimeout(() => {
                        active.style.display = 'none';
                        idle.style.display = 'flex';
                        idle.style.opacity = '1';
                        
                        // รีเซ็ต UI ให้กลับเป็นสภาพเดิมเพื่อรอรับลูกค้าคนต่อไป
                        document.getElementById('qr-block').style.display = 'flex';
                        document.getElementById('cash-receipt').style.display = 'none';
                        document.getElementById('hint-text').style.display = 'block';
                        document.getElementById('success-stamp').style.display = 'none';
                        
                        changeTimer = null;
                        lastOrderHash = ""; // ล้างแคชเมนู
                    }, 7000);
                }
                return; // หยุดการดึงเมนูอาหาร เพราะจ่ายเงินจบแล้ว
            }

            // ถ้าสถานะยังไม่ใช่ completed ให้อัปเดตตัวแปรไว้
            lastPaymentStatus = d.paymentStatus;

            // ⭐️ 2. โชว์รายการออเดอร์ (เมื่อกำลังสั่งอาหาร)
            if (d.orders && d.orders.length > 0) {
                if (changeTimer) { clearTimeout(changeTimer); changeTimer = null; }
                
                if (idle.style.display !== 'none') {
                    idle.style.opacity = '0';
                    setTimeout(() => { idle.style.display = 'none'; active.style.display = 'grid'; }, 800);
                }

                document.getElementById('table-display').innerText = 'โต๊ะ ' + (tableId || d.orders[0].table);

                const currentOrderHash = JSON.stringify(d.orders);
                if (currentOrderHash !== lastOrderHash) {
                    let total = 0;
                    document.getElementById('order-items-list').innerHTML = d.orders.map((o, index) => {
                        let p = parseFloat(String(o.total).replace(/,/g, '')) || 0;
                        total += p;
                        let delay = index * 0.05;
                        return `
                        <div class="item-row" style="animation-delay: ${delay}s">
                            <div class="item-info">
                                <b>${o.qty}x ${o.menu}</b>
                                <small>${o.details || '-'}</small>
                            </div>
                            <div class="item-price">฿${p.toLocaleString()}</div>
                        </div>`;
                    }).join('');

                    document.getElementById('total-val').innerText = total.toLocaleString();
                    document.getElementById('qr-img').src = `https://promptpay.io/0931805507/${total}.png`;
                    
                    lastOrderHash = currentOrderHash;
                }
            } else {
                // ⭐️ 3. โต๊ะว่าง (ไม่มีออเดอร์) ตัดเข้าวิดีโอทันที
                if (changeTimer) { clearTimeout(changeTimer); changeTimer = null; }
                active.style.display = 'none';
                idle.style.display = 'flex';
                idle.style.opacity = '1';
                lastOrderHash = ""; 
            }
        } catch (e) {
            console.error("Display Update Error", e);
        }
    }
    
    setInterval(updateCDS, 2000);
</script>
</body>
</html>
