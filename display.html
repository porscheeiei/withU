<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>WITHU | Premium POS Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.95); --accent: #38bdf8; }
        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        body { background: #000; margin: 0; height: 100vh; overflow: hidden; }

        /* 1. Idle Screen */
        #idle-screen { position: fixed; inset: 0; z-index: 1000; display: flex; transition: opacity 1s ease; }
        #promo-video { width: 100%; height: 100%; object-fit: cover; }

        /* 2. Active Screen (Modern Grid) */
        #active-container { display: none; width: 100vw; height: 100vh; grid-template-columns: 1fr 480px; background: #0f172a; }

        /* Left: Order List (Modern Receipt) */
        .order-side { background: #fff; padding: 50px; overflow-y: auto; display: flex; flex-direction: column; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .brand-info { display: flex; align-items: center; gap: 15px; font-size: 28px; font-weight: 800; color: #000; }
        .table-badge { background: #f1f5f9; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: 800; }
        
        .item-row { background: #f8fafc; padding: 25px; border-radius: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.6s ease-out; }
        .item-info b { font-size: 24px; display: block; }
        .item-info small { color: #64748b; font-size: 16px; }
        .item-price { font-size: 26px; font-weight: 800; }

        /* Right: Luxury Payment */
        .payment-side { padding: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #fff; }
        .due-label { font-size: 16px; color: #94a3b8; text-transform: uppercase; letter-spacing: 4px; }
        .total-amount { font-size: 120px; font-weight: 900; margin: 0 0 40px 0; letter-spacing: -5px; }
        .qr-card { background: #fff; padding: 20px; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .hint-text { margin-top: 20px; font-size: 20px; font-weight: 600; color: #fff; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="idle-screen"><video id="promo-video" autoplay muted loop playsinline><source src="WITHU.mp4" type="video/mp4"></video></div>

    <div id="active-container">
        <div class="order-side">
            <div class="header-row">
                <div class="brand-info"><img src="https://img1.pic.in.th/images/-------2.png" style="width:50px;"> WITHU CAFE</div>
                <div id="table-display" class="table-badge">โต๊ะ -</div>
            </div>
            <div id="order-items-list"></div>
        </div>

        <div class="payment-side">
            <div class="due-label">ยอดชำระสุทธิ (TOTAL)</div>
            <div class="total-amount"><span id="total-val">0</span><span style="font-size:30px; margin-left:10px; color:var(--accent);">฿</span></div>
            <div class="qr-card">
                <img id="qr-img" src="" style="width:250px; height:250px; display:block;">
            </div>
            <div class="hint-text">สแกน QR เพื่อชำระเงิน</div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCZ-y3QwWAiC5zfitjolUt9GolhtzVFoZV11_V0GWIxq-aBps-bWg67yt23df_rq4UiQ/exec";
    
    async function updateCDS() {
        try {
            const r = await fetch(API_URL + "?action=getCDSActive");
            const d = await r.json();
            const idle = document.getElementById('idle-screen');
            const active = document.getElementById('active-container');

            if (d.status === 'active') {
                idle.style.opacity = '0';
                setTimeout(() => { idle.style.display = 'none'; active.style.display = 'grid'; }, 800);
                
                document.getElementById('table-display').innerText = "โต๊ะ " + d.table;
                
                let total = 0;
                document.getElementById('order-items-list').innerHTML = d.orders.map(o => {
                    let p = parseFloat(String(o.total).replace(/,/g, '')) || 0;
                    total += p;
                    return `<div class="item-row"><div class="item-info"><b>${o.qty}x ${o.menu}</b><small>${o.details || '-'}</small></div><div class="item-price">฿${p.toLocaleString()}</div></div>`;
                }).join('');
                
                document.getElementById('total-val').innerText = total.toLocaleString();
                document.getElementById('qr-img').src = `https://promptpay.io/0931805507/${total}.png`;
            } else {
                idle.style.display = 'flex';
                idle.style.opacity = '1';
                active.style.display = 'none';
            }
        } catch(e) {}
    }
    
    setInterval(updateCDS, 2000);
</script>
</body>
</html>
