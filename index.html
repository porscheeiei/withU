<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
      :root {
        --bg-color: #F5F5F7; --surface-color: #FFFFFF; --text-main: #1D1D1F;
        --text-muted: #86868B; --primary-color: #000000; --border-color: #E5E5EA;
        --success-color: #27ae60; --danger-color: #e74c3c;
      }
      body { font-family: 'Prompt', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
      .app-container { max-width: 500px; margin: 0 auto; padding: 20px 15px 120px 15px; }
      
      #table-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
      .table-box { background: var(--surface-color); padding: 40px 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; width: 85%; max-width: 320px; }
      .table-box img.logo { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 15px; }
      .table-box select { width: 100%; padding: 14px 15px; font-size: 16px; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 25px; font-family: 'Prompt'; outline: none; }
      
      .btn-lock, .btn-submit-order, .btn-confirm { width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; font-family: 'Prompt'; }

      .top-bar { background: var(--surface-color); padding: 12px 15px; text-align: center; font-weight: 600; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
      .category-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .category-nav::-webkit-scrollbar { display: none; }
      .nav-pill { background: var(--surface-color); border: 1px solid var(--border-color); padding: 8px 18px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-family: 'Prompt'; font-size: 14px; }
      .nav-pill.active { background: var(--primary-color); color: #fff; }

      .menu-item { background: var(--surface-color); border-radius: 16px; padding: 16px; margin-bottom: 14px; display: flex; justify-content: space-between; border: 1px solid var(--border-color); align-items: center; }
      .menu-img { width: 75px; height: 75px; object-fit: cover; border-radius: 12px; margin-right: 14px; background: #eee; }
      .price { font-weight: 700; font-size: 16px; margin-bottom: 8px; }
      .qty-control { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; justify-content: flex-end; }
      .qty-btn { background: #f0f0f0; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
      .btn-add { background: transparent; border: 1px solid var(--primary-color); padding: 6px 16px; border-radius: 20px; cursor: pointer; font-family: 'Prompt'; font-size: 13px; transition: 0.2s; }

      .bottom-cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface-color); padding: 15px 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); display: none; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 900; border-radius: 20px 20px 0 0; }
      .btn-view-cart { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 25px; font-family: 'Prompt'; font-weight: 600; }

      #receipt-modal, #success-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
      .receipt-box { background: var(--bg-color); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 25px; box-sizing: border-box; }
      #success-modal { align-items: center; padding: 20px; }
      .success-box { background: #fff; border-radius: 24px; text-align: center; width: 100%; max-width: 350px; padding: 30px 20px; box-sizing: border-box; }
    </style>
  </head>
  <body>

    <div id="table-overlay">
      <div class="table-box">
        <img src="https://img1.pic.in.th/images/-------2.png" alt="Logo" class="logo">
        <h2 style="margin-bottom: 5px;">WITHU</h2>
        <p style="color: grey; font-size: 14px; margin-bottom: 25px;">ยินดีต้อนรับค่ะ เลือกโต๊ะเพื่อสั่งอาหาร</p>
        <select id="table-select">
          <option value="" disabled selected>-- เลือกโต๊ะ --</option>
          <option value="1">โต๊ะ 1</option><option value="2">โต๊ะ 2</option>
          <option value="3">โต๊ะ 3</option><option value="4">โต๊ะ 4</option>
          <option value="5">โต๊ะ 5</option><option value="6">โต๊ะ 6</option>
          <option value="7">โต๊ะ 7</option><option value="8">โต๊ะ 8</option>
          <option value="9">โต๊ะ 9</option><option value="10">โต๊ะ 10</option>
        </select>
        <button class="btn-lock" onclick="lockTable()">เข้าสู่หน้าเมนู</button>
      </div>
    </div>

    <div id="app-content" style="display:none;">
      <div class="top-bar">WITHU <span id="display-table" style="background:#000; color:#fff; padding:2px 10px; border-radius:10px; font-size:12px; margin-left: 5px;"></span></div>
      <div class="app-container">
        <div id="category-nav-container" class="category-nav"></div>
        <div id="loading" style="text-align:center; padding:40px; color: grey;">กำลังโหลดเมนูอร่อยๆ...</div>
        <div id="main-content"></div> 
      </div>
    </div>

    <div id="bottom-cart" class="bottom-cart-bar">
      <div class="cart-info" style="font-weight: 600;">ตะกร้า <span id="cart-count" style="font-weight: 400; color: grey;"></span></div>
      <button class="btn-view-cart" onclick="openReceipt()">ดูบิล ฿<span id="cart-sum">0</span></button>
    </div>

    <div id="receipt-modal" onclick="if(event.target==this)closeReceipt()">
      <div class="receipt-box">
        <h3 style="text-align:center; margin-top: 0;">สรุปรายการ</h3>
        <div id="receipt-items" style="max-height:40vh; overflow-y:auto; margin-bottom:15px; padding-right: 5px;"></div>
        <div style="display:flex; justify-content:space-between; font-weight:700; font-size:20px; margin-bottom:20px; border-top: 1px dashed #ccc; padding-top: 15px;">
          <span>รวมทั้งสิ้น</span><span>฿<span id="receipt-total-sum">0</span></span>
        </div>
        <div style="display:flex; gap:10px;">
          <button onclick="closeReceipt()" style="flex:1; padding:14px; border-radius:12px; border:1px solid #ccc; background:#fff; font-family:'Prompt'; font-weight: 500;">เลือกเพิ่ม</button>
          <button id="btn-submit-order" onclick="submitOrder()" style="flex:2; padding:14px; border-radius:12px; border:none; background:#000; color:#fff; font-family:'Prompt'; font-weight: 600;">ยืนยันออเดอร์</button>
        </div>
      </div>
    </div>

    <div id="success-modal">
      <div id="success-content" style="width: 100%; display: flex; justify-content: center;"></div>
    </div>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec"; 

      let currentTableNumber = "";
      let cart = []; 

      function lockTable() {
        let sel = document.getElementById("table-select");
        if(!sel.value) { alert("กรุณาเลือกโต๊ะก่อนนะคะ"); return; }
        currentTableNumber = sel.value;
        document.getElementById("display-table").innerText = "โต๊ะ " + currentTableNumber;
        document.getElementById("table-overlay").style.display = "none";
        document.getElementById("app-content").style.display = "block";
      }
