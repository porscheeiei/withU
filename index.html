<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #000; --bg: #F2F2F7; --card: #FFF; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 15px 15px 100px 15px; }
        
        /* UI เลือกโต๊ะ */
        #table-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .table-box { background: var(--card); padding: 40px 25px; border-radius: 30px; text-align: center; width: 80%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        select { width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; border: 2px solid #EEE; margin-bottom: 20px; font-family: 'Prompt'; }
        
        /* ปุ่มหลัก */
        .btn-main { width: 100%; background: var(--p); color: #fff; border: none; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; font-family: 'Prompt'; }
        
        /* รายการเมนู */
        .menu-item { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .menu-img { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; margin-right: 15px; background: #EEE; }
        .menu-info { flex: 1; }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; background: #EEE; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        
        /* ตะกร้า & Modal */
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #FFF; padding: 20px; box-sizing: border-box; display: none; justify-content: space-between; align-items: center; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-content { background: #FFF; width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; padding: 25px; box-sizing: border-box; }
        
        /* จุดสะสมแต้ม */
        .point-box { background: #F9F9F9; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px dashed #DDD; }
        input[type="tel"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #DDD; margin: 10px 0; box-sizing: border-box; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<div id="table-overlay">
    <div class="table-box">
        <img src="https://img1.pic.in.th/images/-------2.png" width="80">
        <h2>WITHU</h2>
        <select id="table-select">
            <option value="" disabled selected>เลือกเลขโต๊ะ...</option>
            <option value="1">โต๊ะ 1</option><option value="2">โต๊ะ 2</option>
            <option value="3">โต๊ะ 3</option><option value="4">โต๊ะ 4</option>
            <option value="5">โต๊ะ 5</option>
        </select>
        <button class="btn-main" onclick="lockTable()">เข้าสู่หน้าเมนู</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div style="background:#FFF; padding:15px; text-align:center; font-weight:bold; position:sticky; top:0; z-index:100;">
        WITHU - <span id="display-table"></span>
    </div>
    <div class="app-container">
        <div id="category-nav" style="display:flex; overflow-x:auto; gap:10px; padding-bottom:15px;"></div>
        <div id="main-content"></div>
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div id="cart-info" style="font-weight:bold;">ตะกร้า (0)</div>
    <button onclick="openReceipt()" style="background:#000; color:#fff; border:none; padding:10px 20px; border-radius:20px; font-family:'Prompt';">ดูบิล ฿<span id="cart-sum">0</span></button>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)this.style.display='none'">
    <div id="modal-body" class="modal-content"></div>
</div>

<script>
    const API_URL = "YOUR_API_URL_HERE"; // ⚠️ ใส่ URL ของคุณที่นี่
    let currentTable = ""; let cart = []; let menuData = [];

    function lockTable() {
        let s = document.getElementById("table-select");
        if(!s.value) return alert("กรุณาเลือกโต๊ะ");
        currentTable = s.value;
        document.getElementById("display-table").innerText = "โต๊ะ " + currentTable;
        document.getElementById("table-overlay").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        loadMenu();
    }

    function loadMenu() {
        fetch(API_URL + "?action=getMenu").then(res => res.json()).then(data => {
            menuData = data; renderMenu("ทั้งหมด");
        });
    }

    function renderMenu(filter) {
        let container = document.getElementById("main-content");
        let categories = [...new Set(menuData.map(item => item[2]))];
        
        // Render Nav
        let nav = document.getElementById("category-nav");
        nav.innerHTML = `<button onclick="renderMenu('ทั้งหมด')" style="padding:8px 15px; border-radius:20px; border:none; background:${filter==='ทั้งหมด'?'#000':'#EEE'}; color:${filter==='ทั้งหมด'?'#fff':'#000'}; font-family:'Prompt';">ทั้งหมด</button>`;
        categories.forEach(c => {
            nav.innerHTML += `<button onclick="renderMenu('${c}')" style="padding:8px 15px; border-radius:20px; border:none; background:${filter===c?'#000':'#EEE'}; color:${filter===c?'#fff':'#000'}; font-family:'Prompt'; white-space:nowrap;">${c}</button>`;
        });

        // Render Items
        container.innerHTML = "";
        menuData.forEach((item, idx) => {
            if(filter !== "ทั้งหมด" && item[2] !== filter) return;
            container.innerHTML += `
                <div class="menu-item">
                    <img src="${item[4]||''}" class="menu-img">
                    <div class="menu-info">
                        <div style="font-weight:600;">${item[0]}</div>
                        <div style="color:grey; font-size:14px;">${item[3]||''}</div>
                        <div style="font-weight:bold; margin-top:5px;">฿${item[1]}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="margin-bottom:8px;">
                            <span class="qty-btn" onclick="uQty(${idx},-1)">-</span>
                            <span id="q-${idx}" style="margin:0 10px; font-weight:bold;">1</span>
                            <span class="qty-btn" onclick="uQty(${idx},1)">+</span>
                        </div>
                        <button onclick="add('${item[0]}',${item[1]},${idx})" style="background:none; border:1px solid #000; padding:5px 10px; border-radius:15px; font-family:'Prompt'; font-size:12px;">ใส่ตะกร้า</button>
                    </div>
                </div>
            `;
        });
    }

    function uQty(idx, v) {
        let el = document.getElementById("q-"+idx);
        let n = parseInt(el.innerText) + v;
        if(n > 0) el.innerText = n;
    }

    function add(name, price, idx) {
        let qty = parseInt(document.getElementById("q-"+idx).innerText);
        cart.push({name, price, qty, total: price*qty});
        updateCart();
    }

    function updateCart() {
        let bar = document.getElementById("cart-bar");
        if(cart.length > 0) bar.style.display = "flex";
        let sum = cart.reduce((s,i) => s + i.total, 0);
        document.getElementById("cart-sum").innerText = sum.toLocaleString();
        document.getElementById("cart-info").innerText = `ตะกร้า (${cart.length})`;
    }

    function openReceipt() {
        let sum = cart.reduce((s,i) => s + i.total, 0);
        let html = `<h3>สรุปรายการ</h3><div style="max-height:300px; overflow-y:auto;">`;
        cart.forEach((i, idx) => {
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${i.qty}x ${i.name}</span>
                <span>฿${i.total} <span style="color:red; margin-left:10px;" onclick="cart.splice(${idx},1);updateCart();openReceipt();">✕</span></span>
            </div>`;
        });
        html += `</div><div style="font-size:20px; font-weight:bold; border-top:1px dashed #EEE; padding-top:15px; margin-top:15px; display:flex; justify-content:space-between;">
            <span>รวมทั้งสิ้น</span><span>฿${sum.toLocaleString()}</span>
        </div>
        <button class="btn-main" style="margin-top:20px;" onclick="submitOrder()">ยืนยันออเดอร์</button>`;
        document.getElementById("modal-body").innerHTML = html;
        document.getElementById("modal").style.display = "flex";
    }

    function submitOrder() {
        let sum = cart.reduce((s,i) => s + i.total, 0);
        document.getElementById("modal-body").innerHTML = "กำลังส่งออเดอร์...";
        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({action:'submitOrder', table:currentTable, cart:cart})
        }).then(() => {
            let qr = `https://promptpay.io/0931805507/${sum}.png`;
            document.getElementById("modal-body").innerHTML = `
                <div style="text-align:center;">
                    <h3 style="margin-top:0;">สั่งออเดอร์แล้ว!</h3>
                    <div style="background:#FFF; padding:15px; border-radius:15px; border:1px solid #EEE;">
                        <img src="${qr}" style="width:100%; max-width:200px;">
                        <div style="font-size:24px; font-weight:bold; margin-top:10px;">฿${sum.toLocaleString()}</div>
                    </div>
                    <div class="point-box" id="point-box">
                        <div style="font-weight:600;">🌟 สะสมแต้ม (25.- = 1 แต้ม)</div>
                        <input type="tel" id="phone" placeholder="กรอกเบอร์โทรศัพท์">
                        <button onclick="savePoints(${sum})" style="width:100%; background:#28a745; color:#fff; border:none; padding:12px; border-radius:10px; font-family:'Prompt'; font-weight:600;">รับแต้มสะสม</button>
                    </div>
                    <p style="font-size:12px; color:red; margin:15px 0;">* แจ้งสลิปและเบอร์สมาชิกที่เคาน์เตอร์ *</p>
                    <button class="btn-main" onclick="location.reload()">กลับหน้าหลัก</button>
                </div>
            `;
            cart = []; updateCart();
        });
    }

    function savePoints(amount) {
        let phone = document.getElementById("phone").value;
        if(phone.length < 9) return alert("กรุณากรอกเบอร์โทรศัพท์");
        document.getElementById("point-box").innerHTML = "กำลังบันทึก...";
        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({action:'addPoints', phone, amount})
        }).then(res => res.json()).then(res => {
            let d = res.data;
            document.getElementById("point-box").innerHTML = `
                <div style="color:#28a745; font-weight:bold;">✅ บันทึกแต้มสำเร็จ!</div>
                <div style="font-size:14px; margin-top:5px;">คุณ ${d.name} | ได้รับ +${d.added} แต้ม</div>
                <div style="font-size:16px; font-weight:bold;">รวมสะสม: ${d.total} แต้ม</div>
                <div style="font-size:12px; color:grey;">(แลกส่วนลดได้ ฿${(d.total/10).toFixed(0)})</div>
            `;
        });
    }
</script>
</body>
</html>
