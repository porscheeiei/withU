<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WITHU | Ordering Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #1a1a1a; 
            --bg: #fdfdfd; 
            --card: #ffffff; 
            --border: #f1f5f9; 
            --darkred: #ef4444; 
            --blue: #2563eb;
            --gray: #64748b;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
            --radius-lg: 30px;
            --radius-md: 20px;
        }

        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; color: var(--p); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* --- ⏳ Loading & Skeleton --- */
        .skeleton { background: #f1f5f9; background-image: linear-gradient(90deg, #f1f5f9 0px, #f8fafc 40px, #f1f5f9 80px); background-size: 600px; animation: shine-lines 1.6s infinite linear; }
        @keyframes shine-lines { 0% { background-position: -100px; } 100% { background-position: 500px; } }
        .skeleton-card { height: 180px; border-radius: var(--radius-lg); margin-bottom: 20px; width: 100%; }

        /* --- 🏗 Layout --- */
        .app-container { width: 100%; max-width: 800px; margin: 0 auto; padding: 0 20px 140px 20px; box-sizing: border-box; }
        
        /* --- 🔝 Top Bar --- */
        .top-bar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 800; font-size: 22px; letter-spacing: -0.5px; color: var(--p); }
        .table-badge { background: var(--p); color: #fff; padding: 5px 16px; border-radius: 50px; font-size: 14px; font-weight: 600; }
        .call-btn { background: #fee2e2; color: var(--darkred); border: none; padding: 8px 18px; border-radius: 50px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .call-btn:active { transform: scale(0.95); }

        /* --- 🔍 Search Area --- */
        .search-area { position: sticky; top: 62px; z-index: 950; background: var(--bg); padding: 15px 0 10px 0; }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; padding: 16px 20px 16px 55px; border-radius: 50px; border: 1px solid var(--border); background: var(--card); font-family: 'Prompt'; font-size: 15px; outline: none; box-shadow: var(--shadow); transition: 0.3s; }
        .search-input:focus { border-color: var(--p); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.08); }
        .search-icon { position: absolute; left: 22px; color: var(--gray); display: flex; }

        /* --- 🏷 Category Navigation --- */
        #category-nav { display: flex; overflow-x: auto; padding: 10px 0 20px 0; scrollbar-width: none; gap: 10px; }
        #category-nav::-webkit-scrollbar { display: none; }
        .nav-pill { background: var(--card); border: 1px solid var(--border); padding: 10px 24px; border-radius: 50px; font-size: 14px; white-space: nowrap; cursor: pointer; color: var(--gray); font-weight: 500; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .nav-pill.active { background: var(--p); color: #fff; border-color: var(--p); transform: scale(1.05); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); }

        /* --- 🍽 Menu Grid --- */
        #main-content { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 650px) { #main-content { grid-template-columns: 1fr 1fr; } }

        .menu-item { background: var(--card); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); transition: 0.3s; animation: fadeIn 0.5s ease; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .menu-item:hover { transform: translateY(-5px); }
        .menu-img { width: 100%; height: 180px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 15px; background: #f8fafc; }
        .menu-item h3 { margin: 0; font-size: 18px; font-weight: 700; color: var(--p); }
        .price { font-weight: 800; font-size: 22px; color: var(--p); margin: 5px 0 15px 0; }

        /* --- 🎚 Options (Accordion) --- */
        .sweet-selector { display: flex; gap: 6px; margin-bottom: 12px; }
        .sweet-btn { border: 1px solid var(--border); padding: 8px 0; border-radius: 12px; font-size: 11px; cursor: pointer; background: #f8fafc; flex: 1; text-align: center; color: var(--gray); font-weight: 600; transition: 0.2s; }
        .sweet-btn.active { background: var(--p); color: #fff; border-color: var(--p); }
        
        .acc-btn { font-size: 13px; color: var(--blue); font-weight: 600; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px; border-radius: 12px; background: #f0f7ff; }
        .acc-content { max-height: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .acc-content.open { max-height: 400px; opacity: 1; padding-bottom: 15px; }
        
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .top-chip { border: 1px solid var(--border); padding: 10px; border-radius: 15px; font-size: 12px; text-align: center; cursor: pointer; font-weight: 600; background: #fff; transition: 0.2s; }
        .top-chip.active { background: #eef2ff; border-color: var(--blue); color: var(--blue); }
        
        .btn-add { background: #000; color: #fff; border: none; padding: 16px; border-radius: 50px; font-family: 'Prompt'; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; margin-top: auto; transition: 0.3s; }
        .btn-add:active { transform: scale(0.96); }
        .sold-out { opacity: 0.6; filter: grayscale(0.8); pointer-events: none; }

        /* --- 🛒 Bottom Bar --- */
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); padding: 20px 25px 40px 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); display: none; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1100; border-radius: 40px 40px 0 0; }
        .btn-checkout { background: var(--p); color: #fff; border: none; padding: 15px 35px; border-radius: 50px; font-weight: 700; font-size: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- 🏠 Table Overlay --- */
        #table-overlay { position: fixed; inset: 0; background: rgba(248, 249, 250, 0.95); backdrop-filter: blur(25px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .table-box { background: var(--card); padding: 50px 40px; border-radius: 45px; text-align: center; width: 85%; max-width: 400px; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15); border: 1px solid #fff; }
        .logo-top { width: 110px; height: 110px; border-radius: 50%; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app-header" class="top-bar" style="display:none;">
    <div class="brand">WITHU</div>
    <div style="display:flex; align-items:center; gap:12px;">
        <button class="call-btn" onclick="callStaff()">เรียกพนักงาน</button>
        <span id="display-table" class="table-badge"></span>
    </div>
</div>

<div id="table-overlay">
    <div class="table-box">
        <img src="https://img1.pic.in.th/images/-------2.png" class="logo-top" alt="Logo">
        <h2 style="margin:0 0 10px 0; font-weight:800;">WITHU CAFE</h2>
        <p style="color:var(--gray); font-size:14px; margin-bottom:30px;">Thai Tea & Restaurant</p>
        
        <select id="table-select" style="width:100%; padding:18px; border-radius:20px; border:1px solid #e2e8f0; margin-bottom:25px; font-family:'Prompt'; text-align-last:center; font-size:16px; background:#f8fafc; outline:none; appearance:none;">
            <option value="" disabled selected>กรุณาเลือกหมายเลขโต๊ะ</option>
            <script>for(let i=1;i<=15;i++) document.write(`<option value="${i}">โต๊ะ ${i}</option>`);</script>
        </select>
        
        <button class="btn-add" style="font-size:17px;" onclick="lockTable()">เริ่มต้นสั่งอาหาร</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="app-container">
        
        <div class="search-area">
            <div class="search-box">
                <span class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="text" id="menu-search" class="search-input" placeholder="ค้นหาชื่อเมนูที่ต้องการ..." oninput="handleSearch()">
            </div>
        </div>

        <div id="category-nav"></div>

        <div id="loading-skeleton">
            <div class="skeleton-card skeleton"></div>
            <div class="skeleton-card skeleton"></div>
            <div class="skeleton-card skeleton"></div>
        </div>

        <div id="main-content"></div>
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div>
        <div style="font-size: 13px; color: var(--gray);">รายการในตะกร้า</div>
        <div style="font-weight:800; font-size: 20px;"><span id="cart-count">0</span> รายการ</div>
    </div>
    <button onclick="openReceipt()" class="btn-checkout">สรุปยอด ฿<span id="cart-sum">0</span></button>
</div>

<div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:none;z-index:2000;align-items:flex-end;justify-content:center;" onclick="if(event.target==this)this.style.display='none'">
    <div id="modal-body" style="background:#fff;width:100%;max-width:550px;border-radius:45px 45px 0 0;padding:40px;box-sizing:border-box;"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 
    let currentTable = "", cart = [], fullMenu = [], toppingsData = [], currentS = {}, itemOpt = {}, itemExpanded = {}, currentF = "ทั้งหมด", currentSearch = "", sInterval;

    function lockTable() { 
        let s = document.getElementById("table-select"); 
        if(!s.value) { alert("กรุณาเลือกโต๊ะก่อนค่ะ"); return; }
        currentTable = s.value; 
        document.getElementById("display-table").innerText = "โต๊ะ " + currentTable; 
        document.getElementById("table-overlay").style.display = "none"; 
        document.getElementById("app-content").style.display = "block"; 
        document.getElementById("app-header").style.display = "flex"; 
        loadMenu(); 
    }

    async function loadMenu() { 
        try {
            const r = await fetch(API_URL + "?action=getMenu");
            const d = await r.json();
            if (d.menu) {
                fullMenu = d.menu; 
                toppingsData = d.toppings; 
                document.getElementById('loading-skeleton').style.display = 'none';
                renderMenu("ทั้งหมด"); 
            }
        } catch(e) { console.error(e); }
    }

    function handleSearch() {
        currentSearch = document.getElementById('menu-search').value.toLowerCase();
        renderMenu(currentF);
    }

    function renderMenu(f) {
        currentF = f; 
        const m = document.getElementById('main-content'); 
        const n = document.getElementById('category-nav');
        
        let cats = [...new Set(fullMenu.map(r => r[2] || "อื่นๆ"))];
        n.innerHTML = `<button onclick="renderMenu('ทั้งหมด')" class="nav-pill ${f==='ทั้งหมด'?'active':''}"> ทั้งหมด </button>` + 
                      cats.map(c => `<button onclick="renderMenu('${c}')" class="nav-pill ${f===c?'active':''}">${c}</button>`).join('');
        
        const filtered = fullMenu.filter(r => {
            const matchesCat = (f === "ทั้งหมด" || r[2] === f);
            const matchesSearch = r[0].toLowerCase().includes(currentSearch);
            return matchesCat && matchesSearch;
        });

        let h = ""; 
        filtered.forEach((r) => {
            const originalIdx = fullMenu.findIndex(item => item[0] === r[0]);
            let isAvail = (r[5] !== "หมด"), cat = r[2] || "", 
                isD = (cat === "เครื่องดื่ม" || cat === "สมูทตี้"), 
                showSmoothieOpt = (cat === "เครื่องดื่ม"), 
                isExp = itemExpanded[originalIdx] || false;
            
            if(isD && !currentS[originalIdx]) currentS[originalIdx] = "100%"; 
            if(!itemOpt[originalIdx]) itemOpt[originalIdx] = { toppings: [], smoothie: false };

            h += `
            <div class="menu-item ${isAvail ? '' : 'sold-out'}">
                <img src="${r[4]||'https://via.placeholder.com/200'}" class="menu-img">
                <div>
                    <h3>${r[0]}</h3>
                    <div class="price">฿${r[1]}</div>
                    ${isAvail && isD ? `
                        <div class="sweet-selector">
                            ${['0%','50%','100%'].map(l=>`
                                <div class="sweet-btn ${currentS[originalIdx]===l?'active':''}" onclick="setS(${originalIdx},'${l}')">${l}</div>
                            `).join('')}
                        </div>
                        ${showSmoothieOpt ? `
                            <div style="border:1px solid var(--border);padding:10px;border-radius:12px;font-size:12px;text-align:center;margin-bottom:12px;font-weight:600; cursor:pointer;" 
                                 class="${itemOpt[originalIdx].smoothie?'active':''}" onclick="tS(${originalIdx})">
                                ${itemOpt[originalIdx].smoothie ? '✓ ปั่นเรียบร้อย (+฿10)' : '+ เพิ่มปั่น (+฿10)'}
                            </div>
                        ` : ''}
                        
                        <div class="acc-btn" onclick="toggleAcc(${originalIdx})">
                            ${isExp ? '❌ ปิดตัวเลือก' : '➕ เลือกท็อปปิ้ง'}
                        </div>
                        
                        <div class="acc-content ${isExp ? 'open' : ''}">
                            <div class="top-grid">
                                ${toppingsData.map(t => { 
                                    let isTOut = (t[2] === "หมด"); 
                                    return `<div class="top-chip ${itemOpt[originalIdx].toppings.includes(t[0])?'active':''} ${isTOut?'sold-out':''}" onclick="tT(${originalIdx},'${t[0]}')">${t[0]}<br>+฿${t[1]}</div>`; 
                                }).join('')}
                            </div>
                        </div>
                    ` : ''}
                    <button class="btn-add" onclick="addC('${r[0]}',${r[1]},${originalIdx},${isD})">เพิ่มลงตะกร้า</button>
                </div>
            </div>`;
        }); 
        m.innerHTML = h || `<div style="text-align:center; padding:80px; color:var(--gray); grid-column: 1/-1;">ไม่พบเมนูที่คุณค้นหา</div>`;
    }

    function toggleAcc(idx) { itemExpanded[idx] = !itemExpanded[idx]; renderMenu(currentF); }
    function setS(i, l) { currentS[i] = l; renderMenu(currentF); }
    function tT(i, n) { 
        let t = itemOpt[i].toppings; 
        itemOpt[i].toppings = t.includes(n) ? t.filter(x => x !== n) : [...t, n]; 
        renderMenu(currentF); 
    }
    function tS(i) { itemOpt[i].smoothie = !itemOpt[i].smoothie; renderMenu(currentF); }

    function addC(n, p, idx, isD) {
        let fp = parseFloat(p), det = []; 
        if(isD) { 
            det.push("หวาน " + currentS[idx]); 
            if(itemOpt[idx].smoothie) { fp += 10; det.push("ปั่น"); } 
            itemOpt[idx].toppings.forEach(tn => { 
                let tObj = toppingsData.find(x => x[0] === tn); 
                if(tObj) { fp += parseFloat(tObj[1]); det.push(tn); } 
            }); 
        }
        cart.push({name: n, price: p, qty: 1, total: fp, sweetness: det.join(", ")||'-'}); 
        itemOpt[idx] = { toppings: [], smoothie: false }; 
        currentS[idx] = "100%";
        updateUI();
    }

    function updateUI() { 
        let b = document.getElementById('cart-bar'); 
        b.style.display = cart.length > 0 ? 'flex' : 'none'; 
        let total = cart.reduce((s,i)=>s+i.total,0);
        document.getElementById('cart-sum').innerText = total.toLocaleString(); 
        document.getElementById('cart-count').innerText = cart.length; 
    }

    function openReceipt() {
        let h = `<h2 style="margin:0 0 20px 0; font-weight:800;">สรุปออเดอร์</h2><div style="max-height:40vh; overflow-y:auto; padding-right:10px;">`;
        cart.forEach((i,idx) => h += `
            <div style="display:flex;justify-content:space-between;margin-bottom:18px; padding-bottom:15px; border-bottom:1px solid var(--border);">
                <span><b>${i.name}</b><br><small style="color:var(--gray)">${i.sweetness}</small></span>
                <span style="text-align:right;">฿${i.total.toLocaleString()}<br><span style="color:var(--darkred); font-size:12px; cursor:pointer; font-weight:700;" onclick="rem(${idx})">ลบ</span></span>
            </div>`);
        let total = cart.reduce((s,i)=>s+i.total,0);
        h += `</div><div style="margin-top:20px; display:flex; justify-content:space-between; font-weight:800; font-size:24px;"><span>ยอดรวม</span><span>฿${total.toLocaleString()}</span></div>
              <button class="btn-add" style="margin-top:30px; background:var(--p); height:60px; font-size:18px;" onclick="sub()">สั่งอาหารตอนนี้</button>`;
        document.getElementById('modal-body').innerHTML = h; 
        document.getElementById('modal').style.display = 'flex';
    }

    function rem(i) { cart.splice(i, 1); updateUI(); cart.length > 0 ? openReceipt() : document.getElementById('modal').style.display = 'none'; }

    async function sub() { 
        document.getElementById('modal-body').innerHTML = "<div style='text-align:center; padding:60px;'><div class='skeleton-card skeleton' style='height:40px; margin-bottom:20px;'></div><h3>กำลังส่งออเดอร์...</h3></div>";
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'submitOrder', table:currentTable, cart:cart}) });
            showStatus(); cart=[]; updateUI(); 
        } catch(e) { alert("ส่งไม่สำเร็จ กรุณาลองใหม่ค่ะ"); openReceipt(); }
    }

    function showStatus() {
        document.getElementById('modal').style.display='none'; 
        document.getElementById('app-header').style.display='none';
        document.getElementById('app-content').innerHTML = `
            <div class="app-container" style="padding-top:60px; text-align:center;">
                <div style="font-size:60px; margin-bottom:20px;">🎉</div>
                <h2 style="font-weight:800; font-size:30px; margin-bottom:10px;">สั่งสำเร็จแล้ว!</h2>
                <p style="color:var(--gray); margin-bottom:40px;">ออเดอร์โต๊ะ ${currentTable} กำลังรอคิวทำค่ะ</p>
                <div id="stat-list" style="margin-bottom:30px; text-align:left; background:#fff; padding:20px; border-radius:30px; box-shadow:var(--shadow);"></div>
                <button class="btn-add" style="background:#f1f5f9; color:var(--p);" onclick="location.reload()">สั่งเพิ่มอีก</button>
            </div>`;
        chk(); sInterval = setInterval(chk, 5000);
    }

    async function chk() {
        try {
            const r = await fetch(API_URL + "?action=getOrderStatus&table=" + currentTable); 
            const d = await r.json();
            if (!d || !d.length) { clearInterval(sInterval); return; }
            document.getElementById('stat-list').innerHTML = d.map(o => `
                <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f8fafc;">
                    <span><b>${o.qty}x</b> ${o.menu}</span>
                    <span style="color:var(--blue); font-weight:700;">${o.status}</span>
                </div>`).join('');
        } catch(e) {}
    }

    function callStaff() { 
        if(confirm("ต้องการเรียกพนักงานใช่ไหมคะ?")) { 
            fetch(API_URL,{method:'POST',body:JSON.stringify({action:'callStaff',table:currentTable,reason:'ทั่วไป'})}); 
            alert("แจ้งพนักงานเรียบร้อยค่ะ"); 
        } 
    }
</script>
</body>
</html>
