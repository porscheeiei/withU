<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #000; --bg: #FAFAFA; --card: #FFF; --border: #E8E8E8; --text: #333; --sub: #888; --darkred: #8B0000; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
        .app-container { width: 100%; max-width: 550px; margin: 0 auto; padding: 20px 15px 120px 15px; box-sizing: border-box; }
        
        /* Header & Table Badge */
        .top-bar { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .table-badge { background: #000; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; }

        /* Call Button Minimal */
        .call-btn { position: fixed; top: 70px; right: 15px; background: var(--darkred); color: #fff; border: none; padding: 6px 15px; border-radius: 4px; font-size: 11px; font-weight: 500; z-index: 99; cursor: pointer; letter-spacing: 0.5px; }

        /* Table Overlay */
        #table-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .table-box { background: var(--card); padding: 40px 30px; border-radius: 12px; text-align: center; width: 80%; border: 1px solid var(--border); }
        .table-box h2 { margin-bottom: 25px; font-weight: 500; letter-spacing: 2px; }
        select { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; font-family: 'Prompt'; outline: none; appearance: none; text-align-last: center; }
        .btn-black { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 500; font-size: 16px; cursor: pointer; }

        /* Category Nav */
        .category-nav { display: flex; overflow-x: auto; gap: 8px; padding: 15px 0; scrollbar-width: none; }
        .nav-pill { background: var(--card); border: 1px solid var(--border); padding: 6px 18px; border-radius: 4px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: 0.2s; color: var(--sub); }
        .nav-pill.active { border-color: #000; color: #000; font-weight: 500; }

        /* Menu Items */
        .menu-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; border: 1px solid var(--border); }
        .menu-img { width: 85px; height: 85px; object-fit: cover; border-radius: 8px; margin-right: 15px; background: #f9f9f9; }
        .menu-info { flex: 1; }
        .menu-info h3 { margin: 0 0 5px 0; font-size: 16px; font-weight: 500; }
        .price { font-weight: 600; font-size: 15px; margin-bottom: 10px; }
        .sold-out { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .sold-out-text { color: red; font-size: 11px; margin-left: 5px; font-weight: 400; }

        /* Sweetness & Options */
        .sweet-selector { display: flex; gap: 4px; margin: 10px 0; }
        .sweet-btn { border: 1px solid var(--border); padding: 5px 0; border-radius: 4px; font-size: 11px; cursor: pointer; background: #fff; flex: 1; text-align: center; color: var(--sub); }
        .sweet-btn.active { background: #000; color: #fff; border-color: #000; }
        
        .smoothie-btn { border: 1px solid var(--border); padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; display: inline-block; margin-bottom: 10px; color: var(--sub); }
        .smoothie-btn.active { border-color: #000; color: #000; font-weight: 500; background: #f9f9f9; }

        /* Accordion Toppings */
        .topping-toggle { font-size: 12px; color: var(--blue); cursor: pointer; margin-top: 8px; display: inline-block; text-decoration: underline; text-underline-offset: 3px; }
        .topping-drawer { max-height: 0; overflow: hidden; transition: 0.3s ease-in-out; }
        .topping-drawer.open { max-height: 500px; padding-top: 10px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .option-chip { border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; color: var(--sub); text-align: center; }
        .option-chip.active { border-color: #000; color: #000; font-weight: 500; background: #f9f9f9; }

        /* Add Button */
        .btn-add { background: #000; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 500; width: 100%; margin-top: 15px; font-size: 14px; cursor: pointer; }

        /* Cart Bar */
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 20px; display: none; box-sizing: border-box; justify-content: space-between; align-items: center; z-index: 900; color: #fff; }
        .cart-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 600; font-size: 14px; }

        /* Status Tracker Minimal */
        .status-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 30px 20px; text-align: center; }
        .stepper-mini { display: flex; justify-content: space-between; margin-bottom: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .step-mini { flex: 1; font-size: 10px; color: var(--sub); }
        .step-mini.active { color: #000; font-weight: 600; }
        .status-list-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

<button class="call-btn" id="call-btn-ui" style="display:none;" onclick="callStaff()">เรียกพนักงาน</button>

<div id="table-overlay">
    <div class="table-box">
        <h2>WITHU</h2>
        <select id="table-select">
            <option value="" disabled selected>เลือกโต๊ะ</option>
            <script>for(let i=1;i<=10;i++) document.write(`<option value="${i}">โต๊ะ ${i}</option>`);</script>
        </select>
        <button class="btn-black" onclick="lockTable()">เข้าสู่หน้าเมนู</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="top-bar">
        <span style="letter-spacing:1px; font-weight:600;">WITHU</span>
        <span id="display-table" class="table-badge"></span>
    </div>
    <div class="app-container">
        <div id="category-nav" class="category-nav"></div>
        <div id="loading" style="text-align:center; padding:50px; font-size:12px; color:#888;">กำลังจัดเตรียมเมนู...</div>
        <div id="main-content"></div> 
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div>ตะกร้า (<span id="cart-count">0</span>)</div>
    <button onclick="openReceipt()" class="cart-btn">สรุปรายการ ฿<span id="cart-sum">0</span></button>
</div>

<div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;z-index:2000;align-items:flex-end;justify-content:center;" onclick="if(event.target==this)this.style.display='none'">
    <div id="modal-body" style="background:#fff;width:100%;max-width:500px;border-radius:15px 15px 0 0;padding:25px;box-sizing:border-box;"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyOiAoYnqb5ECoNxKui3-q764YQUHOg4nE8MFz_g63Ir7rE7fWZEPjloc42NkJuUhtHLg/exec"; 

    let currentTable = ""; let cart = []; let fullMenu = []; let toppingsData = [];
    let currentS = {}; let itemOpt = {}; let itemExpanded = {}; let currentF = "ทั้งหมด"; let sInterval;

    function lockTable() {
        let sel = document.getElementById("table-select"); if(!sel.value) return;
        currentTable = sel.value; document.getElementById("display-table").innerText = "โต๊ะ " + currentTable;
        document.getElementById("table-overlay").style.display = "none"; document.getElementById("app-content").style.display = "block";
        document.getElementById("call-btn-ui").style.display = "block"; loadMenu();
    }

    function loadMenu() {
        fetch(API_URL + "?action=getMenu").then(res => res.json()).then(data => { 
            fullMenu = data.menu; toppingsData = data.toppings; renderMenu("ทั้งหมด"); 
            document.getElementById('loading').style.display = 'none';
        });
    }

    function renderMenu(f) {
        currentF = f; const m = document.getElementById('main-content'); const n = document.getElementById('category-nav');
        let cats = [...new Set(fullMenu.map(r => r[2] || "อื่นๆ"))];
        n.innerHTML = `<button onclick="renderMenu('ทั้งหมด')" class="nav-pill ${f==='ทั้งหมด'?'active':''}">ทั้งหมด</button>` + cats.map(c => `<button onclick="renderMenu('${c}')" class="nav-pill ${f===c?'active':''}">${c}</button>`).join('');

        let h = "";
        fullMenu.forEach((r, idx) => {
            if(f !== "ทั้งหมด" && r[2] !== f) return;
            let isAvail = (r[5] !== "หมด"); let cat = r[2] || ""; 
            let isD = (cat === "เครื่องดื่ม" || cat === "สมูทตี้"); let showS = (cat === "เครื่องดื่ม"); 
            let isExp = itemExpanded[idx] || false;

            if(isD && !currentS[idx]) currentS[idx] = "100%";
            if(!itemOpt[idx]) itemOpt[idx] = { toppings: [], smoothie: false };
            
            h += `<div class="menu-item ${isAvail ? '' : 'sold-out'}">
                <img src="${r[4]||''}" class="menu-img" onerror="this.src='https://via.placeholder.com/100'">
                <div class="menu-info">
                    <h3>${r[0]} ${isAvail ? '' : '<span class="sold-out-text">สินค้าหมด</span>'}</h3>
                    <div class="price">฿${r[1]}</div>
                    ${isAvail && isD ? `
                    <div class="sweet-selector">${['0%','25%','50%','75%','100%'].map(l=>`<div class="sweet-btn ${currentS[idx]==l?'active':''}" onclick="setS(${idx},'${l}')">${l}</div>`).join('')}</div>
                    ${showS ? `<div class="smoothie-btn ${itemOpt[idx].smoothie?'active':''}" onclick="tS(${idx})">ปั่น (+10)</div>` : ''}
                    <div class="topping-toggle" onclick="toggleDrawer(${idx})">${isExp ? 'ปิดท็อปปิ้ง' : 'เลือกท็อปปิ้งเพิ่มเติม'}</div>
                    <div class="topping-drawer ${isExp ? 'open' : ''}">
                        <div class="options-grid">
                            ${toppingsData.map(t => {
                                let isTOut = (t[2] === "หมด");
                                return `<div class="option-chip ${itemOpt[idx].toppings.includes(t[0])?'active':''} ${isTOut?'sold-out':''}" onclick="tT(${idx},'${t[0]}')">${t[0]} (+฿${t[1]})</div>`;
                            }).join('')}
                        </div>
                    </div>` : ''}
                    <button class="btn-add" ${isAvail ? '' : 'disabled'} onclick="addC('${r[0]}',${r[1]},${idx},${isD})">${isAvail ? 'เพิ่มลงตะกร้า' : 'สินค้าหมด'}</button>
                </div>
            </div>`;
        }); m.innerHTML = h;
    }

    function toggleDrawer(idx) { itemExpanded[idx] = !itemExpanded[idx]; renderMenu(currentF); }
    function setS(i, l) { currentS[i] = l; renderMenu(currentF); }
    function tT(i, n) { let t = itemOpt[i].toppings; itemOpt[i].toppings = t.includes(n) ? t.filter(x => x !== n) : [...t, n]; renderMenu(currentF); }
    function tS(i) { itemOpt[i].smoothie = !itemOpt[i].smoothie; renderMenu(currentF); }

    function addC(n, p, idx, isD) {
        let fp = p, det = [];
        if(isD) {
            det.push("หวาน " + currentS[idx]);
            if(itemOpt[idx].smoothie) { fp += 10; det.push("ปั่น"); }
            itemOpt[idx].toppings.forEach(tn => {
                let tObj = toppingsData.find(x => x[0] === tn);
                if(tObj) { fp += parseFloat(tObj[1]); det.push(tn); }
            });
        }
        cart.push({name: n, price: fp, qty: 1, total: fp, sweetness: det.join(", ")||'-'}); 
        itemOpt[idx] = { toppings: [], smoothie: false }; updateUI();
    }

    function updateUI() {
        let b = document.getElementById('cart-bar'); b.style.display = cart.length > 0 ? 'flex' : 'none';
        document.getElementById('cart-sum').innerText = cart.reduce((s,i)=>s+i.total,0).toLocaleString();
        document.getElementById('cart-count').innerText = cart.length;
    }

    function openReceipt() {
        let h = `<h3 style="margin:0 0 20px 0; font-weight:500;">รายการอาหาร</h3>`;
        cart.forEach((i,idx) => h += `<div style="display:flex;justify-content:space-between;margin-bottom:15px; font-size:14px;"><span><b>${i.name}</b><br><small style="color:#888">${i.sweetness}</small></span><span>฿${i.total} <span style="color:red; margin-left:12px; cursor:pointer;" onclick="rem(${idx})">ยกเลิก</span></span></div>`);
        h += `<div style="border-top:1px solid #eee; padding-top:15px; margin-top:15px; display:flex; justify-content:space-between; font-weight:600; font-size:18px;"><span>ยอดรวม</span><span>฿${cart.reduce((s,i)=>s+i.total,0).toLocaleString()}</span></div>`;
        h += `<button class="btn-black" style="margin-top:25px;" onclick="sub()">ยืนยันสั่งอาหาร</button>`;
        document.getElementById('modal-body').innerHTML = h; document.getElementById('modal').style.display = 'flex';
    }

    function rem(i) { cart.splice(i, 1); updateUI(); cart.length > 0 ? openReceipt() : document.getElementById('modal').style.display = 'none'; }
    function sub() { fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'submitOrder', table:currentTable, cart:cart}) }).then(() => { showStatus(); cart=[]; updateUI(); }); }

    function showStatus() {
        document.getElementById('modal').style.display='none';
        document.getElementById('app-content').innerHTML = `
            <div class="app-container"><div class="status-card">
                <h3 style="font-weight:500;">โต๊ะ ${currentTable}</h3>
                <div id="stat-list" style="margin:25px 0; text-align:left;"></div>
                <div class="stepper-mini">
                    <div class="step-mini" id="st-1">1 รับออเดอร์</div>
                    <div class="step-mini" id="st-2">2 กำลังทำ</div>
                    <div class="step-mini" id="st-3">3 รอเสิร์ฟ</div>
                    <div class="step-mini" id="st-4">4 เรียบร้อย</div>
                </div>
                <button class="btn-black" style="background:#f1f5f9; color:#000; font-size:13px;" onclick="location.reload()">สั่งเพิ่ม</button>
            </div></div>`;
        chk(); sInterval = setInterval(chk, 5000);
    }

    async function chk() {
        const r = await fetch(API_URL + "?action=getOrderStatus&table=" + currentTable); const d = await r.json();
        if (!d.length) { upS(4); clearInterval(sInterval); return; }
        const p = {"รับออเดอร์":1, "กำลังทำ":2, "รอเสิร์ฟ":3, "เสิร์ฟเรียบร้อย":4};
        let min = d[0].status; d.forEach(o => { if (p[o.status] < p[min]) min = o.status; });
        upS(p[min]);
        document.getElementById('stat-list').innerHTML = d.map(o => `<div class="status-list-item"><span>${o.qty}x ${o.menu}</span><b style="color:#2563eb">${o.status}</b></div>`).join('');
    }

    function upS(s) { for(let i=1;i<=4;i++) document.getElementById('st-'+i).classList.toggle('active',i<=s); }
    function callStaff() { if(confirm("ต้องการเรียกพนักงานใช่ไหมคะ?")) { fetch(API_URL,{method:'POST',body:JSON.stringify({action:'callStaff',table:currentTable,reason:'ทั่วไป'})}); alert("ส่งสัญญาณแล้วค่ะ!"); } }
</script>
</body>
</html>
