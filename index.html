<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WITHU | Premium Ordering</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #1a1a1a; --bg: #f8fafc; --card: #ffffff; --border: #f1f5f9; 
            --darkred: #ff0000; --blue: #2563eb; --gray: #64748b; --accent: #10b981;
            --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
            --radius-lg: 45px;
        }

        * { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); margin: 0; color: var(--p); -webkit-font-smoothing: antialiased; }
        
        .app-container { width: 100%; max-width: 550px; margin: 0 auto; padding: 0 20px 140px 20px; }

        /* --- 🔝 Header --- */
        .top-bar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 800; font-size: 24px; letter-spacing: 0.5px; }
        .table-badge { background: var(--p); color: #fff; padding: 8px 24px; border-radius: 50px; font-size: 20px; font-weight: 800; }
        .call-btn { background: var(--darkred); color: #fff !important; border: none; padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 5px 15px rgba(255,0,0,0.2); }

        /* --- 🔍 Search & Nav --- */
        .search-area { position: sticky; top: 65px; z-index: 950; background: var(--bg); padding: 15px 0 10px 0; }
        .search-input { width: 100%; padding: 16px 20px 16px 55px; border-radius: 50px; border: 1px solid var(--border); background: var(--card); font-size: 16px; outline: none; box-shadow: var(--shadow); }
        .search-icon { position: absolute; left: 22px; top: 32px; color: #b2bec3; display: flex; }
        #category-nav { display: flex; overflow-x: auto; padding: 10px 0 20px 0; scrollbar-width: none; gap: 10px; }
        .nav-pill { background: var(--card); border: 1px solid var(--border); padding: 10px 26px; border-radius: 50px; font-size: 14px; white-space: nowrap; cursor: pointer; color: var(--gray); font-weight: 600; }
        .nav-pill.active { background: var(--p); color: #fff; }

        /* --- 🍽 Menu Cards --- */
        .menu-item { background: var(--card); border-radius: var(--radius-lg); padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; flex-direction: column; margin-bottom: 20px; animation: fadeIn 0.4s ease; }
        .menu-top { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .menu-img { width: 110px; height: 110px; object-fit: cover; border-radius: 25px; margin-right: 20px; background: #f8fafc; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .menu-item h3 { margin: 0; font-size: 20px; font-weight: 700; }
        .price { font-weight: 800; font-size: 26px; color: var(--p); margin-top: 5px; }

        /* --- 🎚 Options (จุดที่แก้เพี้ยน) --- */
        .sweet-selector { display: flex; gap: 5px; margin-bottom: 15px; }
        .sweet-btn { border: 1px solid #f1f5f9; padding: 10px 0; border-radius: 15px; font-size: 11px; cursor: pointer; background: #f8fafc; flex: 1; text-align: center; color: var(--gray); font-weight: 700; transition: 0.2s; }
        .sweet-btn.active { background: var(--p); color: #fff; border-color: var(--p); }
        .opt-btn { border: 1px solid var(--border); padding: 12px 20px; border-radius: 18px; font-size: 12px; width: 100%; font-weight: 800; cursor: pointer; margin-bottom: 15px; background: #f8fafc; color: var(--gray); text-align: center; }
        .opt-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

        .acc-btn { font-size: 14px; color: var(--blue); font-weight: 700; cursor: pointer; margin: 5px 0 15px 0; text-align: center; text-decoration: underline; text-underline-offset: 4px; }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s ease; opacity: 0; }
        .acc-content.open { max-height: 800px; opacity: 1; padding-bottom: 15px; }
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .top-chip { border: 1px solid var(--border); padding: 12px; border-radius: 18px; font-size: 12px; text-align: center; cursor: pointer; font-weight: 700; background: #fff; }
        .top-chip.active { background: var(--p); color: #fff; }
        
        .note-input { width: 100%; padding: 15px; border-radius: 18px; border: 1px solid var(--border); background: #f8fafc; font-size: 14px; margin-bottom: 15px; outline: none; }
        .btn-add { background: transparent; border: 2.5px solid #000; padding: 16px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); background: #eee; }
        .sold-out { opacity: 0.5; filter: grayscale(1); pointer-events: none; }

        /* --- 🛒 Bottom Bar --- */
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 25px 30px 45px 30px; box-shadow: 0 -15px 40px rgba(0,0,0,0.08); display: none; justify-content: space-between; align-items: center; z-index: 1100; border-radius: 45px 45px 0 0; }
        .btn-checkout { background: var(--p); color: #fff; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 800; font-size: 17px; cursor: pointer; }

        /* --- 🔢 Status UI --- */
        .status-card { background: #fff; border-radius: 50px; padding: 50px 30px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-top: 20px; }
        .status-stepper { display: flex; justify-content: space-between; align-items: center; margin: 40px 0; position: relative; }
        .status-stepper::before { content: ''; position: absolute; top: 20px; left: 10%; right: 10%; height: 2px; background: #eee; z-index: 1; }
        .step-point { position: relative; z-index: 2; flex: 1; text-align: center; }
        .step-circle { width: 40px; height: 40px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; margin: 0 auto 10px auto; color: #cbd5e1; }
        .step-point.active .step-circle { background: var(--p); color: #fff; transform: scale(1.15); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .step-point.active .step-label { color: var(--p); font-weight: 800; }
        .queue-box { background: rgba(37, 99, 235, 0.05); color: var(--blue); padding: 15px; border-radius: 20px; font-size: 15px; font-weight: 800; margin-bottom: 25px; }

        /* --- 🧾 Custom Modal --- */
        .custom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: none; z-index: 5000; align-items: center; justify-content: center; }
        .custom-modal { background: #fff; width: 85%; max-width: 380px; padding: 40px 30px; border-radius: 45px; text-align: center; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.25); }
        .m-btn-confirm { background: #ffaa99; color: #4a1d1d; border: none; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 16px; width: 100%; margin-bottom: 10px; cursor: pointer; }
        .m-btn-cancel { background: #f1f5f9; color: var(--gray); border: none; padding: 18px; border-radius: 20px; font-weight: 700; width: 100%; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="confirm-modal" class="custom-overlay">
    <div class="custom-modal">
        <div style="font-size: 50px; margin-bottom: 15px;">☕️</div>
        <div style="font-size: 22px; font-weight: 800; margin-bottom: 10px;">ยืนยันจบการสั่งซื้อ<br>และออกจากโต๊ะนี้ใช่ไหมคะ?</div>
        <div style="font-size: 15px; color: var(--gray); margin-bottom: 30px;">ประวัติการสั่งซื้อจะถูกล้างออกจากเครื่อง<br>ตรวจสอบยอดเงินก่อนนะคะอ้วน</div>
        <button class="m-btn-confirm" onclick="executeClearSession()">จบการสั่งซื้อ</button>
        <button class="m-btn-cancel" onclick="closeConfirmModal()">กลับไปหน้าเดิม</button>
    </div>
</div>

<div id="app-header" class="top-bar" style="display:none;">
    <div class="brand">WITHU</div>
    <div style="display:flex; align-items:center; gap:12px;">
        <button class="call-btn" onclick="callStaff()">เรียกพนักงาน</button>
        <span id="display-table" class="table-badge"></span>
    </div>
</div>

<div id="table-overlay">
    <div class="table-box" style="background:#fff; padding:60px 40px; border-radius:50px; text-align:center; width:85%; max-width:400px; margin: 15% auto; box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.15);">
        <img src="https://img1.pic.in.th/images/-------2.png" style="width:120px; height:120px; border-radius:50%; margin-bottom:20px;">
        <h2 style="font-weight:800; font-size:28px; margin:0 0 35px 0;">WITHU CAFE</h2>
        <select id="table-select" style="width:100%; padding:25px; border-radius:22px; border:2px solid #e2e8f0; margin-bottom:30px; text-align-last:center; font-size:22px; background:#f8fafc; outline:none; appearance:none; font-weight:800;">
            <option value="" disabled selected>เลือกหมายเลขโต๊ะ</option>
            <script>for(let i=1;i<=15;i++) document.write(`<option value="${i}">โต๊ะ ${i}</option>`);</script>
        </select>
        <button class="btn-checkout" style="width:100%; height:75px; font-size:20px;" onclick="lockTable()">เข้าสู่เมนูอาหาร</button>
    </div>
</div>

<div id="menu-view" style="display:none;">
    <div class="app-container">
        <div class="search-area">
            <span class="search-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
            <input type="text" id="menu-search" class="search-input" placeholder="ค้นหาเมนู..." oninput="handleSearch()">
        </div>
        <div id="category-nav"></div>
        <div id="main-content"></div>
    </div>
</div>

<div id="status-view" style="display:none;">
    <div class="app-container" style="padding-top:20px; text-align:center;">
        <div class="status-card">
            <h2 id="status-table-title" style="font-weight:900; font-size:32px; margin-bottom:10px;">ออเดอร์โต๊ะ -</h2>
            <div id="queue-info" class="queue-box">กำลังตรวจสอบ...</div>
            <div class="status-stepper">
                <div class="step-point" id="st-1"><div class="step-circle">1</div><div class="step-label" style="font-size:11px;font-weight:700;">รับออเดอร์</div></div>
                <div class="step-point" id="st-2"><div class="step-circle">2</div><div class="step-label" style="font-size:11px;font-weight:700;">กำลังทำ</div></div>
                <div class="step-point" id="st-3"><div class="step-circle">3</div><div class="step-label" style="font-size:11px;font-weight:700;">รอเสิร์ฟ</div></div>
                <div class="step-point" id="st-4"><div class="step-circle">4</div><div class="step-label" style="font-size:11px;font-weight:700;">สำเร็จ</div></div>
            </div>
            <div id="stat-list" style="margin:30px 0; text-align:left; border-top:1px solid #f8fafc; padding-top:20px;"></div>
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:22px; margin-bottom:30px;">
                <span>ยอดรวม:</span><span style="color:var(--blue)">฿<span id="stat-sum-val">0</span></span>
            </div>
            <button class="btn-checkout" style="width:100%; height:70px; border:2.5px solid #000; background:transparent; color:#000; margin-bottom:12px;" onclick="orderMore()">สั่งเมนูเพิ่ม</button>
            <button class="btn-checkout" style="width:100%; height:60px; background:transparent; color:var(--gray); border:1px solid #eee; font-size:14px;" onclick="clearSession()">จบการสั่งซื้อ / เช็คบิล</button>
            <div id="auto-close-msg" style="margin-top:20px; font-size:12px; color:#aaa; font-weight:600;"></div>
        </div>
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div><div style="font-size: 14px; color: var(--gray); font-weight: 600;">ตะกร้าของคุณ</div><div style="font-weight:800; font-size: 24px;"><span id="cart-count">0</span> รายการ</div></div>
    <button onclick="openReceipt()" class="btn-checkout">สั่งออเดอร์ ฿<span id="cart-sum">0</span></button>
</div>

<div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:none;z-index:2000;align-items:flex-end;justify-content:center;" onclick="if(event.target==this)this.style.display='none'">
    <div id="modal-body" style="background:#fff;width:100%;max-width:550px;border-radius:45px 45px 0 0;padding:40px;box-sizing:border-box;"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 
    let currentTable = "", cart = [], fullMenu = [], toppingsData = [], currentS = {}, itemOpt = {}, itemExpanded = {}, currentF = "ทั้งหมด", currentSearch = "", sInterval, autoCloseTimer;

    window.onload = async () => {
        const savedTable = localStorage.getItem('withu_table');
        const hasActiveOrder = localStorage.getItem('withu_order_active');
        if(savedTable) { currentTable = savedTable; startApp(); if(hasActiveOrder === 'true') showStatus(); }
    }

    function lockTable() { 
        let s = document.getElementById("table-select"); if(!s.value) return; 
        currentTable = s.value; localStorage.setItem('withu_table', currentTable); startApp();
    }

    function startApp() {
        document.getElementById("display-table").innerText = "โต๊ะ " + currentTable; 
        document.getElementById("table-overlay").style.display = "none"; 
        document.getElementById("menu-view").style.display = "block"; 
        document.getElementById("app-header").style.display = "flex"; 
        loadMenu(); 
    }

    async function loadMenu() { 
        try {
            const r = await fetch(API_URL + "?action=getMenu");
            const d = await r.json();
            if (d.menu) { fullMenu = d.menu; toppingsData = d.toppings; renderMenu("ทั้งหมด"); }
        } catch(e) {}
    }

    function renderMenu(f) {
        currentF = f; const m = document.getElementById('main-content'); const n = document.getElementById('category-nav');
        let cats = [...new Set(fullMenu.map(r => r[2] || "อื่นๆ"))];
        n.innerHTML = `<button onclick="renderMenu('ทั้งหมด')" class="nav-pill ${f==='ทั้งหมด'?'active':''}"> ทั้งหมด </button>` + cats.map(c => `<button onclick="renderMenu('${c}')" class="nav-pill ${f===c?'active':''}">${c}</button>`).join('');
        
        const filtered = fullMenu.filter(r => (f === "ทั้งหมด" || r[2] === f) && r[0].toLowerCase().includes(currentSearch));
        let h = ""; 
        filtered.forEach((r) => {
            const idx = fullMenu.findIndex(item => item[0] === r[0]);
            let isAvail = (r[5] !== "หมด"), cat = r[2] || "", isD = (cat === "เครื่องดื่ม" || cat === "สมูทตี้"), isExp = itemExpanded[idx] || false;
            if(isD && !currentS[idx]) currentS[idx] = "100%"; 
            if(!itemOpt[idx]) itemOpt[idx] = { toppings: [], smoothie: false };

            h += `<div class="menu-item ${isAvail ? '' : 'sold-out'}">
                <div class="menu-top"><img src="${r[4]||''}" class="menu-img"><div class="menu-info"><h3>${r[0]}</h3><div class="price">฿${r[1]}</div></div></div>
                ${isAvail && isD ? `
                    <div class="sweet-selector">${['0%','25%','50%','75%','100%'].map(l=>`<div class="sweet-btn ${currentS[idx]===l?'active':''}" onclick="setS(${idx},'${l}')">${l}</div>`).join('')}</div>
                    ${cat === "เครื่องดื่ม" ? `<div class="opt-btn ${itemOpt[idx].smoothie?'active':''}" onclick="tS(${idx})">+ เพิ่มปั่น (+฿10)</div>` : ''}
                    <div class="acc-btn" onclick="toggleAcc(${idx})">เลือกท็อปปิ้งเพิ่มเติม</div>
                    <div class="acc-content ${isExp ? 'open' : ''}"><div class="top-grid">${toppingsData.map(t => `<div class="top-chip ${itemOpt[idx].toppings.includes(t[0])?'active':''} ${t[2]==='หมด'?'sold-out':''}" onclick="tT(${idx},'${t[0]}')">${t[0]} (+฿${t[1]})</div>`).join('')}</div></div>
                ` : ''}
                ${isAvail ? `<input type="text" id="note-${idx}" class="note-input" placeholder="ระบุหมายเหตุ (เช่น หวานน้อยมาก)">` : ''}
                <button class="btn-add" onclick="addC('${r[0]}',${r[1]},${idx},${isD})">${isAvail ? 'ใส่ตะกร้า' : 'สินค้าหมด'}</button>
            </div>`;
        }); 
        m.innerHTML = h || `<div style="text-align:center; padding:40px; color:var(--gray);">ไม่พบรายการ</div>`;
    }

    function toggleAcc(idx) { itemExpanded[idx] = !itemExpanded[idx]; renderMenu(currentF); }
    function setS(i, l) { currentS[i] = l; renderMenu(currentF); }
    function tT(i, n) { let t = itemOpt[i].toppings; itemOpt[i].toppings = t.includes(n) ? t.filter(x => x !== n) : [...t, n]; renderMenu(currentF); }
    function tS(i) { itemOpt[i].smoothie = !itemOpt[i].smoothie; renderMenu(currentF); }

    function addC(n, p, idx, isD) {
        let fp = parseFloat(p), det = []; 
        let noteEl = document.getElementById(`note-${idx}`); let userNote = noteEl ? noteEl.value.trim() : "";
        if(isD) { 
            det.push("หวาน " + currentS[idx]); 
            if(itemOpt[idx].smoothie) { fp += 10; det.push("ปั่น"); } 
            itemOpt[idx].toppings.forEach(tn => { let tObj = toppingsData.find(x => x[0] === tn); if(tObj) { fp += parseFloat(tObj[1]); det.push(tn); } }); 
        }
        cart.push({name: n, price: p, qty: 1, total: fp, sweetness: det.join(", ")||'-', note: userNote}); 
        itemOpt[idx] = { toppings: [], smoothie: false }; currentS[idx] = "100%"; if(noteEl) noteEl.value = ""; updateUI();
    }

    function updateUI() { 
        let b = document.getElementById('cart-bar'); b.style.display = cart.length > 0 ? 'flex' : 'none'; 
        let total = cart.reduce((s,i)=>s+i.total,0); document.getElementById('cart-sum').innerText = total.toLocaleString(); 
        document.getElementById('cart-count').innerText = cart.length; 
    }

    function openReceipt() {
        let h = `<h2 style="margin:0 0 20px 0; font-weight:800; font-size:24px;">รายการในตะกร้า</h2>`;
        cart.forEach((i,idx) => h += `<div style="display:flex;justify-content:space-between;margin-bottom:15px;"><span><b>${i.name}</b><br><small style="color:#888">${i.sweetness}${i.note ? ' | '+i.note : ''}</small></span><span style="text-align:right;">฿${i.total.toLocaleString()}<br><span style="color:red; font-size:12px; cursor:pointer;" onclick="rem(${idx})">ลบ</span></span></div>`);
        let total = cart.reduce((s,i)=>s+i.total,0);
        h += `<div style="border-top:2px solid #eee; padding-top:15px; margin-top:15px; display:flex; justify-content:space-between; font-weight:900; font-size:24px;"><span>ยอดรวม</span><span>฿${total.toLocaleString()}</span></div><button class="btn-checkout" style="margin-top:30px; width:100%; height:65px;" onclick="sub()">ยืนยันสั่งอาหาร</button>`;
        document.getElementById('modal-body').innerHTML = h; document.getElementById('modal').style.display = 'flex';
    }

    function rem(i) { cart.splice(i, 1); updateUI(); cart.length > 0 ? openReceipt() : document.getElementById('modal').style.display = 'none'; }

    async function sub() { 
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `<div style="text-align:center; padding:30px;"><div class="queue-box">กำลังส่งออเดอร์...</div></div>`;
        try { 
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'submitOrder', table:currentTable, cart:cart}) }); 
            localStorage.setItem('withu_order_active', 'true');
            showStatus(); cart=[]; updateUI();
        } catch(e) { alert("ส่งไม่สำเร็จ กรุณาลองใหม่"); }
    }

    function orderMore() {
        document.getElementById('status-view').style.display = 'none';
        document.getElementById('menu-view').style.display = 'block';
        if(autoCloseTimer) clearInterval(autoCloseTimer);
        document.getElementById('auto-close-msg').innerText = "";
    }

    function clearSession() { document.getElementById('confirm-modal').style.display = 'flex'; }
    function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    function executeClearSession() {
        localStorage.removeItem('withu_table');
        localStorage.removeItem('withu_order_active');
        location.href = location.pathname;
    }

    function showStatus() {
        document.getElementById('modal').style.display='none'; 
        document.getElementById('menu-view').style.display='none';
        document.getElementById('status-view').style.display='block';
        document.getElementById('status-table-title').innerText = "ออเดอร์โต๊ะ " + currentTable;
        chk(); if(!sInterval) sInterval = setInterval(chk, 5000);
    }

    async function chk() {
        try {
            const r = await fetch(API_URL + "?action=getAdminData"); const d = await r.json();
            const myOrders = d.orders.filter(o => o.table == currentTable);
            if (myOrders.length === 0) { 
                upS(4); document.getElementById('queue-info').innerText = "ขอบคุณที่ใช้บริการค่ะ";
                if(!autoCloseTimer) {
                    let sec = 300; autoCloseTimer = setInterval(() => {
                        sec--; let m = Math.floor(sec/60), s = sec%60;
                        document.getElementById('auto-close-msg').innerText = `ระบบจะจบการสั่งซื้ออัตโนมัติใน ${m}:${s<10?'0':''}${s}`;
                        if(sec <= 0) executeClearSession();
                    }, 1000);
                }
                return; 
            }
            const myRank = [...new Set(d.orders.map(o => o.table))].indexOf(currentTable.toString());
            document.getElementById('queue-info').innerText = myRank > 0 ? `เหลืออีก ${myRank} คิวก่อนหน้าคุณ` : "กำลังเตรียมออเดอร์ลำดับถัดไป";
            let minVal = 4, totalSum = 0;
            myOrders.forEach(o => { 
                const p = {"รับออเดอร์":1, "กำลังทำ":2, "รอเสิร์ฟ":3, "สำเร็จ":4};
                if (p[o.status] < minVal) minVal = p[o.status]; 
                totalSum += parseFloat(String(o.total).replace(/,/g,'')) || 0;
            });
            upS(minVal); document.getElementById('stat-sum-val').innerText = totalSum.toLocaleString();
            document.getElementById('stat-list').innerHTML = myOrders.map(o => `<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;"><span><b>${o.qty}x</b> ${o.menu}</span><b style="color:var(--blue)">${o.status}</b></div>`).join('');
        } catch(e) {}
    }

    function upS(s) { for(let i=1;i<=4;i++) { const el = document.getElementById('st-'+i); if(el) el.classList.toggle('active',i<=s); } }
    function handleSearch() { currentSearch = document.getElementById('menu-search').value.toLowerCase(); renderMenu(currentF); }
    function callStaff() { if(confirm("ต้องการเรียกพนักงานใช่ไหมคะ?")) fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'callStaff', table:currentTable, reason:'ทั่วไป'}) }); }
</script>
</body>
</html>
