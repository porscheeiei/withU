<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #000; --bg: #F8F9FA; --card: #FFF; --border: #E5E5EA; --darkred: #8B0000; --blue: #007AFF; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; color: #000; -webkit-font-smoothing: antialiased; }
        .app-container { width: 100%; max-width: 550px; margin: 0 auto; padding: 15px 15px 120px 15px; box-sizing: border-box; }
        
        .call-btn { position: fixed; top: 15px; right: 15px; background: var(--darkred); color: #fff; border: none; padding: 8px 18px; border-radius: 12px; font-weight: 600; font-size: 13px; z-index: 1000; cursor: pointer; font-family: 'Prompt'; }
        #table-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .table-box { background: var(--card); padding: 40px 25px; border-radius: 30px; text-align: center; width: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        select { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--border); margin-bottom: 25px; font-family: 'Prompt'; font-size: 18px; outline: none; text-align-last: center; }
        .btn-black { width: 100%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 600; font-size: 18px; cursor: pointer; font-family: 'Prompt'; }

        .top-bar { padding: 25px 0; text-align: center; }
        .top-bar h1 { margin: 0; font-size: 26px; font-weight: 700; display: inline-block; vertical-align: middle; }
        .table-badge { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-left: 12px; vertical-align: middle; }

        .category-nav { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 25px; scrollbar-width: none; }
        .nav-pill { background: var(--card); border: 1px solid var(--border); padding: 8px 25px; border-radius: 25px; font-size: 14px; white-space: nowrap; cursor: pointer; font-weight: 600; }
        .nav-pill.active { background: #000; color: #fff; border-color: #000; }

        .menu-item { background: var(--card); border-radius: 30px; padding: 25px; margin-bottom: 20px; display: flex; border: 1px solid #F0F0F0; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .menu-img { width: 100px; height: 100px; object-fit: cover; border-radius: 20px; margin-right: 20px; background: #eee; }
        .menu-info { flex: 1; }
        .menu-info h3 { margin: 0; font-size: 20px; font-weight: 700; }
        .menu-price { font-size: 20px; font-weight: 700; margin: 5px 0 15px 0; }
        .sold-out { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .sold-out-tag { color: #ef4444; font-size: 13px; font-weight: 700; }

        .sweet-selector { display: flex; gap: 5px; margin-bottom: 15px; }
        .sweet-btn { border: 1px solid var(--border); padding: 10px 0; border-radius: 10px; font-size: 13px; cursor: pointer; background: #fff; flex: 1; text-align: center; font-family: 'Prompt'; font-weight: 600; }
        .sweet-btn.active { background: #000; color: #fff; border-color: #000; }
        
        .acc-btn { font-size: 12px; color: var(--blue); font-weight: 600; cursor: pointer; margin-bottom: 12px; display: inline-block; text-decoration: underline; text-underline-offset: 4px; }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s ease-out; }
        .acc-content.open { max-height: 500px; padding-bottom: 15px; }
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .top-chip { border: 1px solid #eee; padding: 10px; border-radius: 12px; font-size: 11px; text-align: center; cursor: pointer; font-weight: 600; background: #fff; }
        .top-chip.active { background: #f1f5f9; border-color: #000; }
        
        .smoothie-btn { border: 1px solid #ddd; padding: 8px 18px; border-radius: 15px; font-size: 12px; cursor: pointer; display: inline-block; margin-bottom: 15px; font-weight: 600; background: #f8f9fa; }
        .smoothie-btn.active { background: #000; color: #fff; }
        .btn-add { background: transparent; border: 2.5px solid #000; padding: 15px; border-radius: 35px; font-family: 'Prompt'; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }

        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 25px; box-shadow: 0 -5px 25px rgba(0,0,0,0.08); display: none; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 900; border-radius: 35px 35px 0 0; }
        .btn-checkout { background: #000; color: #fff; border: none; padding: 15px 35px; border-radius: 25px; font-family: 'Prompt'; font-weight: 700; font-size: 16px; }

        .status-card { background: #fff; border-radius: 35px; padding: 45px 25px; text-align: center; border: 1px solid #eee; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        .status-stepper { display: flex; justify-content: space-between; align-items: center; margin: 40px 0; position: relative; }
        .status-stepper::before { content: ''; position: absolute; top: 15px; left: 10%; right: 10%; height: 2px; background: #eee; z-index: 1; }
        .step-point { position: relative; z-index: 2; flex: 1; }
        .step-circle { width: 32px; height: 32px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin: 0 auto 10px auto; color: #888; }
        .step-point.active .step-circle { background: #000; color: #fff; }
        .step-label { font-size: 11px; color: #BBB; font-weight: 700; }
        .step-point.active .step-label { color: #000; }
        .btn-more { background: #F1F3F5; border: none; padding: 18px; border-radius: 20px; font-family: 'Prompt'; font-weight: 700; color: #495057; width: 80%; margin-top: 30px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<button class="call-btn" id="call-ui" style="display:none;" onclick="callStaff()">เรียกพนักงาน</button>

<div id="table-overlay">
    <div class="table-box">
        <h2 style="font-size: 30px; margin-top:0;">WITHU</h2>
        <select id="table-select">
            <option value="" disabled selected>เลือกเลขโต๊ะ...</option>
            <script>for(let i=1;i<=10;i++) document.write(`<option value="${i}">โต๊ะ ${i}</option>`);</script>
        </select>
        <button class="btn-lock" onclick="lockTable()">เข้าสู่หน้าเมนู</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="top-bar">
        <h1>WITHU <span id="display-table" class="table-badge"></span></h1>
    </div>
    <div class="app-container">
        <div id="category-nav" class="category-nav"></div>
        <div id="loading" style="text-align:center; padding:50px; color: #999;">กำลังเตรียมเมนู...</div>
        <div id="main-content"></div> 
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div style="font-weight:700; font-size: 20px;">ตะกร้า (<span id="cart-count">0</span>)</div>
    <button onclick="openReceipt()" class="btn-checkout">สรุปรายการ ฿<span id="cart-sum">0</span></button>
</div>

<div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:2000;align-items:flex-end;justify-content:center;" onclick="if(event.target==this)this.style.display='none'"><div id="modal-body" style="background:#fff;width:100%;max-width:550px;border-radius:35px 35px 0 0;padding:35px;box-sizing:border-box;"></div></div>

<script>
    const API_URL = "ใส่_API_URL_ตรงนี้"; 

    let currentTable = ""; let cart = []; let fullMenu = []; let toppingsData = [];
    let currentS = {}; let itemOpt = {}; let itemExpanded = {}; let currentF = "ทั้งหมด"; let sInterval;

    function lockTable() {
        let sel = document.getElementById("table-select"); if(!sel.value) return;
        currentTable = sel.value; document.getElementById("display-table").innerText = "โต๊ะ " + currentTable;
        document.getElementById("table-overlay").style.display = "none"; document.getElementById("app-content").style.display = "block";
        document.getElementById("call-ui").style.display = "block"; loadMenu();
    }

    function loadMenu() {
        fetch(API_URL + "?action=getMenu").then(res => res.json()).then(data => { 
            fullMenu = data.menu; toppingsData = data.toppings; renderMenu("ทั้งหมด"); 
            document.getElementById('loading').style.display = 'none';
        });
    }

    function renderMenu(f) {
        currentF = f; const m = document.getElementById('main-content'); const n = document.getElementById('category-nav');
        let cats = [...new Set(fullMenu.map(r => r[2] || "อื่นๆ"))];
        n.innerHTML = `<button onclick="renderMenu('ทั้งหมด')" class="nav-pill ${f==='ทั้งหมด'?'active':''}">ทั้งหมด</button>` + cats.map(c => `<button onclick="renderMenu('${c}')" class="nav-pill ${f===c?'active':''}">${c}</button>`).join('');

        let h = "";
        fullMenu.forEach((r, idx) => {
            if(f !== "ทั้งหมด" && r[2] !== f) return;
            let isAvail = (r[5] !== "หมด"); let cat = r[2] || ""; 
            let isD = (cat === "เครื่องดื่ม" || cat === "สมูทตี้"); let showS = (cat === "เครื่องดื่ม"); 
            let isExp = itemExpanded[idx] || false;
            if(isD && !currentS[idx]) currentS[idx] = "100%";
            if(!itemOpt[idx]) itemOpt[idx] = { toppings: [], smoothie: false };
            
            h += `<div class="menu-item ${isAvail ? '' : 'sold-out'}">
                <img src="${r[4]||''}" class="menu-img" onerror="this.src='https://via.placeholder.com/100'">
                <div class="menu-info">
                    <h3>${r[0]} ${isAvail ? '' : '<span class="sold-out-tag">หมด</span>'}</h3>
                    <div class="menu-price">฿${r[1]}</div>
                    ${isAvail && isD ? `
                    <div class="sweet-selector">${['0%','25%','50%','75%','100%'].map(l=>`<div class="sweet-btn ${currentS[idx]==l?'active':''}" onclick="setS(${idx},'${l}')">${l}</div>`).join('')}</div>
                    ${showS ? `<div class="smoothie-btn ${itemOpt[idx].smoothie?'active':''}" onclick="tS(${idx})">เพิ่มปั่น (+10)</div>` : ''}
                    <br><div class="acc-btn" onclick="toggleAcc(${idx})">${isExp ? 'ปิดตัวเลือกเพิ่มเติม' : 'เลือกท็อปปิ้งเพิ่มเติม'}</div>
                    <div class="acc-content ${isExp ? 'open' : ''}">
                        <div class="top-grid">${toppingsData.map(t => {
                                let isTOut = (t[2] === "หมด");
                                return `<div class="top-chip ${itemOpt[idx].toppings.includes(t[0])?'active':''} ${isTOut?'sold-out':''}" onclick="tT(${idx},'${t[0]}')">${t[0]} (+฿${t[1]})</div>`;
                            }).join('')}</div>
                    </div>` : ''}
                    <button class="btn-add" ${isAvail ? '' : 'disabled'} onclick="addC('${r[0]}',${r[1]},${idx},${isD})">${isAvail ? 'ใส่ตะกร้า' : 'สินค้าหมด'}</button>
                </div>
            </div>`;
        }); m.innerHTML = h;
    }

    function toggleAcc(idx) { itemExpanded[idx] = !itemExpanded[idx]; renderMenu(currentF); }
    function setS(i, l) { currentS[i] = l; renderMenu(currentF); }
    function tT(i, n) { let t = itemOpt[i].toppings; itemOpt[i].toppings = t.includes(n) ? t.filter(x => x !== n) : [...t, n]; renderMenu(currentF); }
    function tS(i) { itemOpt[i].smoothie = !itemOpt[i].smoothie; renderMenu(currentF); }

    function addC(n, p, idx, isD) {
        let fp = p, det = [];
        if(isD) {
            det.push("หวาน " + currentS[idx]);
            if(itemOpt[idx].smoothie) { fp += 10; det.push("ปั่น"); }
            itemOpt[idx].toppings.forEach(tn => {
                let tObj = toppingsData.find(x => x[0] === tn);
                if(tObj) { fp += parseFloat(tObj[1]); det.push(tn); }
            });
        }
        cart.push({name: n, price: fp, qty: 1, total: fp, sweetness: det.join(", ")||'-'}); 
        itemOpt[idx] = { toppings: [], smoothie: false }; updateUI();
    }

    function updateUI() {
        let b = document.getElementById('cart-bar'); b.style.display = cart.length > 0 ? 'flex' : 'none';
        document.getElementById('cart-sum').innerText = cart.reduce((s,i)=>s+i.total,0).toLocaleString();
        document.getElementById('cart-count').innerText = cart.length;
    }

    function openReceipt() {
        let h = `<h3 style="margin-top:0; font-weight:700; font-size:22px;">ยืนยันออเดอร์</h3>`;
        cart.forEach((i,idx) => h += `<div style="display:flex;justify-content:space-between;margin-bottom:18px; font-size:16px;"><span><b>${i.name}</b><br><small style="color:#888">${i.sweetness}</small></span><span>฿${i.total} <span style="color:red; margin-left:12px; cursor:pointer;" onclick="rem(${idx})">ลบ</span></span></div>`);
        h += `<div style="border-top:2px solid #eee; padding-top:20px; margin-top:20px; display:flex; justify-content:space-between; font-weight:700; font-size:22px;"><span>ยอดรวม</span><span>฿${cart.reduce((s,i)=>s+i.total,0).toLocaleString()}</span></div>`;
        h += `<button class="btn-lock" style="margin-top:35px; border-radius:35px; padding:20px;" onclick="sub()">สั่งเลย</button>`;
        document.getElementById('modal-body').innerHTML = h; document.getElementById('modal').style.display = 'flex';
    }

    function rem(i) { cart.splice(i, 1); updateUI(); cart.length > 0 ? openReceipt() : document.getElementById('modal').style.display = 'none'; }
    function sub() { fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'submitOrder', table:currentTable, cart:cart}) }).then(() => { showStatus(); cart=[]; updateUI(); }); }

    function showStatus() {
        document.getElementById('modal').style.display='none';
        document.getElementById('app-content').innerHTML = `
            <div class="app-container"><div class="status-card">
                <h2 style="font-weight:700; font-size:28px;">ออเดอร์โต๊ะ ${currentTable}</h2>
                <div class="status-stepper">
                    <div class="step-point" id="st-1"><div class="step-circle">1</div><div class="step-label">รับออเดอร์</div></div>
                    <div class="step-point" id="st-2"><div class="step-circle">2</div><div class="step-label">กำลังทำ</div></div>
                    <div class="step-point" id="st-3"><div class="step-circle">3</div><div class="step-label">รอเสิร์ฟ</div></div>
                    <div class="step-point" id="st-4"><div class="step-circle">4</div><div class="step-label">สำเร็จ</div></div>
                </div>
                <div id="stat-list" style="margin:30px 0; text-align:left; border-top:1px solid #f8f8f8; padding-top:20px;"></div>
                <button class="btn-more" onclick="location.reload()">สั่งเพิ่ม</button>
            </div></div>`;
        chk(); sInterval = setInterval(chk, 5000);
    }

    async function chk() {
        const r = await fetch(API_URL + "?action=getOrderStatus&table=" + currentTable); const d = await r.json();
        if (!d.length) { upS(4); clearInterval(sInterval); 
            setTimeout(() => {
                document.getElementById('app-content').innerHTML = `<div class="app-container"><div class="status-card"><h2>ขอบคุณค่ะ</h2><p>ขอบคุณที่ใช้บริการ WITHU นะคะ</p><button class="btn-lock" style="margin-top:30px;" onclick="location.reload()">กลับหน้าหลัก</button></div></div>`;
            }, 3000);
            return; 
        }
        const p = {"รับออเดอร์":1, "กำลังทำ":2, "รอเสิร์ฟ":3, "สำเร็จ":4};
        let min = d[0].status; d.forEach(o => { if (p[o.status] < p[min]) min = o.status; });
        upS(p[min] || 1);
        document.getElementById('stat-list').innerHTML = d.map(o => `<div style="display:flex;justify-content:space-between;padding:15px 0;border-bottom:1px solid #f9f9f9;font-size:16px;"><span>${o.qty}x ${o.menu}</span><b style="color:var(--blue)">${o.status}</b></div>`).join('');
    }

    function upS(s) { for(let i=1;i<=4;i++) document.getElementById('st-'+i).classList.toggle('active',i<=s); }
    function callStaff() { if(confirm("ต้องการเรียกพนักงานใช่ไหมคะ?")) { fetch(API_URL,{method:'POST',body:JSON.stringify({action:'callStaff',table:currentTable,reason:'ทั่วไป'})}); alert("ส่งสัญญาณแล้วค่ะ!"); } }
</script>
</body>
</html>
