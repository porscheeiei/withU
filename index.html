<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WITHU | Premium Ordering Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #1a1a1a; --bg: #f8fafc; --card: #ffffff; --border: #f1f5f9; 
            --darkred: #ff0000; --blue: #2563eb; --gray: #64748b; --accent: #10b981;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
            --radius-lg: 35px;
        }

        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; color: var(--p); -webkit-font-smoothing: antialiased; }
        .app-container { width: 100%; max-width: 550px; margin: 0 auto; padding: 0 20px 140px 20px; box-sizing: border-box; }
        
        /* --- ⏳ Loaders --- */
        .skeleton { background: #f1f5f9; background-image: linear-gradient(90deg, #f1f5f9 0px, #f8fafc 40px, #f1f5f9 80px); background-size: 600px; animation: shine-lines 1.6s infinite linear; }
        @keyframes shine-lines { 0% { background-position: -100px; } 100% { background-position: 500px; } }
        .skeleton-card { height: 180px; border-radius: var(--radius-lg); margin-bottom: 20px; width: 100%; }

        /* --- 🔝 Header --- */
        .top-bar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 800; font-size: 24px; letter-spacing: 0.5px; }
        .table-badge { background: var(--p); color: #fff; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 700; }
        .call-btn { background: var(--darkred); color: #fff !important; border: none; padding: 10px 22px; border-radius: 50px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }

        /* --- 🔍 Search & Nav --- */
        .search-area { position: sticky; top: 65px; z-index: 950; background: var(--bg); padding: 15px 0 10px 0; }
        .search-input { width: 100%; padding: 16px 20px 16px 55px; border-radius: 50px; border: 1px solid var(--border); background: var(--card); font-family: 'Prompt'; font-size: 15px; outline: none; box-shadow: var(--shadow); box-sizing: border-box; }
        .search-icon { position: absolute; left: 22px; top: 32px; color: #b2bec3; display: flex; }
        #category-nav { display: flex; overflow-x: auto; padding: 10px 0 20px 25px; scrollbar-width: none; gap: 10px; margin-left: -20px; margin-right: -20px; }
        .nav-pill { background: var(--card); border: 1px solid var(--border); padding: 10px 26px; border-radius: 50px; font-size: 14px; white-space: nowrap; cursor: pointer; color: var(--gray); font-weight: 600; transition: 0.3s; }
        .nav-pill.active { background: var(--p); color: #fff; }

        /* --- 🍽 Menu Cards --- */
        .menu-item { background: var(--card); border-radius: var(--radius-lg); padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); animation: fadeIn 0.4s ease; display: flex; flex-direction: column; margin-bottom: 15px; }
        .menu-top { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .menu-img { width: 110px; height: 110px; object-fit: cover; border-radius: 20px; margin-right: 20px; background: #f8fafc; }
        .menu-info { flex: 1; }
        .menu-item h3 { margin: 0; font-size: 20px; font-weight: 700; color: var(--p); }
        .price { font-weight: 800; font-size: 26px; color: var(--p); margin: 5px 0; }

        /* --- 🎚 Options --- */
        .sweet-selector { display: flex; gap: 5px; margin-bottom: 12px; }
        .sweet-btn { border: 1px solid #f1f1f1; padding: 8px 0; border-radius: 12px; font-size: 11px; cursor: pointer; background: #f8f9fa; flex: 1; text-align: center; color: var(--gray); font-weight: 600; transition: 0.2s; }
        .sweet-btn.active { background: var(--p); color: #fff; }
        
        /* 🚩 สำหรับปุ่มปั่น (Option Button) */
        .opt-btn { border: 1px solid var(--border); padding: 10px 20px; border-radius: 15px; font-size: 12px; width: fit-content; font-weight: 700; cursor: pointer; margin-bottom: 15px; background: #f8f9fa; color: var(--gray); transition: 0.3s; }
        .opt-btn.active { background: var(--p); color: #fff; border-color: var(--p); }

        .acc-btn { font-size: 14px; color: var(--blue); font-weight: 600; cursor: pointer; margin-bottom: 15px; text-decoration: underline; text-underline-offset: 4px; }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s ease; opacity: 0; }
        .acc-content.open { max-height: 500px; opacity: 1; padding-bottom: 15px; }
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .top-chip { border: 1px solid var(--border); padding: 12px; border-radius: 15px; font-size: 12px; text-align: center; cursor: pointer; font-weight: 700; background: #fff; }
        .top-chip.active { background: var(--p); color: #fff; }
        .sold-out { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .note-input { width: 100%; padding: 12px 15px; border-radius: 15px; border: 1px solid var(--border); background: #f8fafc; font-family: 'Prompt'; font-size: 13px; margin-bottom: 15px; outline: none; box-sizing: border-box; transition: 0.3s; }
        .note-input:focus { border-color: var(--blue); background: #fff; }

        /* --- 🛒 Buttons --- */
        .btn-add { background: transparent; border: 2.5px solid #000; padding: 15px; border-radius: 50px; font-family: 'Prompt'; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); background: #eee; }
        .btn-checkout { background: var(--p); color: #fff; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 800; font-size: 17px; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); padding: 25px 30px 45px 30px; box-shadow: 0 -15px 40px rgba(0,0,0,0.06); display: none; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1100; border-radius: 45px 45px 0 0; }

        /* --- 🔔 Call Staff UI --- */
        .call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: none; z-index: 3000; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
        .call-modal { background: #fff; padding: 45px 30px; border-radius: 50px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bell-icon { font-size: 60px; margin-bottom: 20px; display: inline-block; animation: ring 2s infinite; }
        @keyframes ring { 0%, 100% { transform: rotate(0); } 10%, 30%, 50% { transform: rotate(15deg); } 20%, 40%, 60% { transform: rotate(-15deg); } 80% { transform: rotate(0); } }
        .call-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; color: var(--p); }
        .call-sub { font-size: 15px; color: var(--gray); margin-bottom: 30px; line-height: 1.5; }
        .btn-confirm-call { background: var(--p); color: #fff; border: none; padding: 16px; border-radius: 50px; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .btn-cancel-call { background: transparent; color: var(--gray); border: none; font-weight: 600; cursor: pointer; font-family: 'Prompt'; }

        /* --- 🍳 Sending UI --- */
        .sending-container { text-align: center; padding: 30px 0; }
        .pulse-loader { width: 80px; height: 80px; background: var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px auto; position: relative; color: #fff; font-size: 32px; }
        .pulse-loader::after { content: ''; position: absolute; inset: 0; border: 4px solid var(--p); border-radius: 50%; animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        .success-check { color: var(--accent); font-size: 80px; margin-bottom: 20px; animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- 🔢 Queue Status --- */
        .status-card { background: #fff; border-radius: 40px; padding: 40px 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .status-stepper { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; position: relative; }
        .status-stepper::before { content: ''; position: absolute; top: 18px; left: 10%; right: 10%; height: 2px; background: #eee; z-index: 1; }
        .step-point { position: relative; z-index: 2; flex: 1; text-align: center; }
        .step-circle { width: 36px; height: 36px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; margin: 0 auto 10px auto; color: #aaa; transition: 0.3s; }
        .step-label { font-size: 11px; color: #ccc; font-weight: 700; }
        .step-point.active .step-circle { background: var(--p); color: #fff; transform: scale(1.1); }
        .step-point.active .step-label { color: var(--p); }
        .queue-box { background: #f0f7ff; color: var(--blue); padding: 12px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-bottom: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app-header" class="top-bar" style="display:none;">
    <div class="brand">WITHU</div>
    <div style="display:flex; align-items:center; gap:12px;">
        <button class="call-btn" onclick="callStaff()">เรียกพนักงาน</button>
        <span id="display-table" class="table-badge"></span>
    </div>
</div>

<div id="table-overlay">
    <div class="table-box" style="background:#fff; padding:60px 40px; border-radius:50px; text-align:center; width:85%; max-width:400px; margin: 15% auto; box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.15);">
        <img src="https://img1.pic.in.th/images/-------2.png" style="width:120px; height:120px; border-radius:50%; margin-bottom:20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);" alt="Logo">
        <h2 style="font-weight:800; font-size:28px; margin:0 0 35px 0;">WITHU CAFE</h2>
        <select id="table-select" style="width:100%; padding:20px; border-radius:22px; border:1px solid #e2e8f0; margin-bottom:30px; font-family:'Prompt'; text-align-last:center; font-size:17px; background:#f8fafc; outline:none; appearance:none; font-weight:600;">
            <option value="" disabled selected>เลือกหมายเลขโต๊ะ</option>
            <script>for(let i=1;i<=15;i++) document.write(`<option value="${i}">โต๊ะ ${i}</option>`);</script>
        </select>
        <button class="btn-checkout" style="width:100%; height:65px; font-size:18px;" onclick="lockTable()">เข้าสู่เมนูอาหาร</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="app-container">
        <div class="search-area">
            <span class="search-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
            <input type="text" id="menu-search" class="search-input" placeholder="ค้นหาเมนู..." oninput="handleSearch()">
        </div>
        <div id="category-nav"></div>
        <div id="loading-skeleton">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>
        <div id="main-content"></div>
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div><div style="font-size: 14px; color: var(--gray); font-weight: 600;">ตะกร้าของคุณ</div><div style="font-weight:800; font-size: 24px;"><span id="cart-count">0</span> รายการ</div></div>
    <button onclick="openReceipt()" class="btn-checkout">ยืนยันออเดอร์ ฿<span id="cart-sum">0</span></button>
</div>

<div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:none;z-index:2000;align-items:flex-end;justify-content:center;" onclick="if(event.target==this)this.style.display='none'">
    <div id="modal-body" style="background:#fff;width:100%;max-width:550px;border-radius:45px 45px 0 0;padding:40px;box-sizing:border-box;"></div>
</div>

<div id="call-staff-modal" class="call-overlay">
    <div class="call-modal" id="call-modal-content">
        <div class="bell-icon">🔔</div>
        <div class="call-title">เรียกพนักงาน</div>
        <div class="call-sub">อ้วนต้องการความช่วยเหลือด้านใดงับ? <br>พนักงานจะรีบไปที่โต๊ะของคุณค่ะ</div>
        <button class="btn-confirm-call" onclick="sendCallRequest()">ยืนยันการเรียก</button>
        <button class="btn-cancel-call" onclick="closeCallModal()">ยกเลิก</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxl4GeYKx0_j-TIPAe_G4na34VwBD3dobTftL1F5Vgv6pnfXG2C6g70FG9VQbuzsIORnQ/exec"; 
    let currentTable = "", cart = [], fullMenu = [], toppingsData = [], currentS = {}, itemOpt = {}, itemExpanded = {}, currentF = "ทั้งหมด", currentSearch = "", sInterval;

    // 🚩 1. ระบบ Session Persistence & URL Detect
    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const tParam = params.get('table');
        const savedTable = localStorage.getItem('withu_table');
        const hasActiveOrder = localStorage.getItem('withu_order_active');

        if(tParam) {
            currentTable = tParam;
            localStorage.setItem('withu_table', tParam);
            startApp();
        } else if(savedTable) {
            currentTable = savedTable;
            startApp();
            if(hasActiveOrder === 'true') showStatus();
        }
    }

    function lockTable() { 
        let s = document.getElementById("table-select"); 
        if(!s.value) return; 
        currentTable = s.value; 
        localStorage.setItem('withu_table', currentTable);
        startApp();
    }

    function startApp() {
        document.getElementById("display-table").innerText = "โต๊ะ " + currentTable; 
        document.getElementById("table-overlay").style.display = "none"; 
        document.getElementById("app-content").style.display = "block"; 
        document.getElementById("app-header").style.display = "flex"; 
        loadMenu(); 
    }

    async function loadMenu() { 
        try {
            const r = await fetch(API_URL + "?action=getMenu");
            const d = await r.json();
            if (d.menu) { fullMenu = d.menu; toppingsData = d.toppings; document.getElementById('loading-skeleton').style.display='none'; renderMenu("ทั้งหมด"); }
        } catch(e) { console.error(e); }
    }

    function handleSearch() { currentSearch = document.getElementById('menu-search').value.toLowerCase(); renderMenu(currentF); }

    function renderMenu(f) {
        currentF = f; 
        const m = document.getElementById('main-content'); 
        const n = document.getElementById('category-nav');
        let cats = [...new Set(fullMenu.map(r => r[2] || "อื่นๆ"))];
        n.innerHTML = `<button onclick="renderMenu('ทั้งหมด')" class="nav-pill ${f==='ทั้งหมด'?'active':''}"> ทั้งหมด </button>` + 
                      cats.map(c => `<button onclick="renderMenu('${c}')" class="nav-pill ${f===c?'active':''}">${c}</button>`).join('');
        
        const filtered = fullMenu.filter(r => (f === "ทั้งหมด" || r[2] === f) && r[0].toLowerCase().includes(currentSearch));

        let h = ""; 
        filtered.forEach((r) => {
            const originalIdx = fullMenu.findIndex(item => item[0] === r[0]);
            let isAvail = (r[5] !== "หมด"), cat = r[2] || "", isD = (cat === "เครื่องดื่ม" || cat === "สมูทตี้"), showSmoothieOpt = (cat === "เครื่องดื่ม"), isExp = itemExpanded[originalIdx] || false;
            if(isD && !currentS[originalIdx]) currentS[originalIdx] = "100%"; 
            if(!itemOpt[originalIdx]) itemOpt[originalIdx] = { toppings: [], smoothie: false };

            h += `<div class="menu-item ${isAvail ? '' : 'sold-out'}">
                <div class="menu-top"><img src="${r[4]||'https://via.placeholder.com/150'}" class="menu-img"><div class="menu-info"><h3>${r[0]}</h3><div class="price">฿${r[1]}</div></div></div>
                ${isAvail && isD ? `
                    <div class="sweet-selector">${['0%','25%','50%','75%','100%'].map(l=>`<div class="sweet-btn ${currentS[originalIdx]===l?'active':''}" onclick="setS(${originalIdx},'${l}')">${l}</div>`).join('')}</div>
                    
                    ${showSmoothieOpt ? `<div class="opt-btn ${itemOpt[originalIdx].smoothie?'active':''}" onclick="tS(${originalIdx})">+ เพิ่มปั่น (+฿10)</div>` : ''}
                    
                    <div class="acc-btn" onclick="toggleAcc(${originalIdx})">เลือกท็อปปิ้งเพิ่มเติม</div>
                    <div class="acc-content ${isExp ? 'open' : ''}"><div class="top-grid">${toppingsData.map(t => `<div class="top-chip ${itemOpt[originalIdx].toppings.includes(t[0])?'active':''} ${t[2]==='หมด'?'sold-out':''}" onclick="tT(${originalIdx},'${t[0]}')">${t[0]} (+฿${t[1]})</div>`).join('')}</div></div>
                ` : ''}
                ${isAvail ? `<input type="text" id="note-${originalIdx}" class="note-input" placeholder="ระบุหมายเหตุ (เช่น หวานน้อยมาก, ไม่ใส่ไข่มุก)">` : ''}
                <button class="btn-add" onclick="addC('${r[0]}',${r[1]},${originalIdx},${isD})">${isAvail ? 'ใส่ตะกร้า' : 'สินค้าหมด'}</button>
            </div>`;
        }); 
        m.innerHTML = h || `<div style="text-align:center; padding:40px; color:var(--gray);">ไม่พบรายการที่ค้นหา</div>`;
    }

    function toggleAcc(idx) { itemExpanded[idx] = !itemExpanded[idx]; renderMenu(currentF); }
    function setS(i, l) { currentS[i] = l; renderMenu(currentF); }
    function tT(i, n) { let t = itemOpt[i].toppings; itemOpt[i].toppings = t.includes(n) ? t.filter(x => x !== n) : [...t, n]; renderMenu(currentF); }
    
    // 🚩 ปุ่มปั่นแก้สีไม่ได้ เพราะต้องเรียก renderMenu ใหม่
    function tS(i) { itemOpt[i].smoothie = !itemOpt[i].smoothie; renderMenu(currentF); }

    function addC(n, p, idx, isD) {
        let fp = parseFloat(p), det = []; 
        let noteEl = document.getElementById(`note-${idx}`);
        let userNote = noteEl ? noteEl.value.trim() : "";
        if(isD) { 
            det.push("หวาน " + currentS[idx]); 
            if(itemOpt[idx].smoothie) { fp += 10; det.push("ปั่น"); } 
            itemOpt[idx].toppings.forEach(tn => { let tObj = toppingsData.find(x => x[0] === tn); if(tObj) { fp += parseFloat(tObj[1]); det.push(tn); } }); 
        }
        cart.push({name: n, price: p, qty: 1, total: fp, sweetness: det.join(", ")||'-', note: userNote}); 
        itemOpt[idx] = { toppings: [], smoothie: false }; currentS[idx] = "100%"; if(noteEl) noteEl.value = ""; updateUI();
    }

    function updateUI() { 
        let b = document.getElementById('cart-bar'); b.style.display = cart.length > 0 ? 'flex' : 'none'; 
        let total = cart.reduce((s,i)=>s+i.total,0); document.getElementById('cart-sum').innerText = total.toLocaleString(); 
        document.getElementById('cart-count').innerText = cart.length; 
    }

    function openReceipt() {
        let h = `<h2 style="margin:0 0 20px 0; font-weight:800; font-size:24px;">ตรวจสอบรายการ</h2>`;
        cart.forEach((i,idx) => h += `<div style="display:flex;justify-content:space-between;margin-bottom:15px;"><span><b>${i.name}</b><br><small style="color:#888">${i.sweetness}${i.note ? ' | '+i.note : ''}</small></span><span style="text-align:right;">฿${i.total.toLocaleString()}<br><span style="color:red; font-size:12px; cursor:pointer;" onclick="rem(${idx})">ลบ</span></span></div>`);
        let total = cart.reduce((s,i)=>s+i.total,0);
        h += `<div style="border-top:2px solid #eee; padding-top:15px; margin-top:15px; display:flex; justify-content:space-between; font-weight:800; font-size:22px;"><span>ยอดรวม</span><span>฿${total.toLocaleString()}</span></div><button class="btn-checkout" style="margin-top:30px; width:100%; height:60px;" onclick="sub()">สั่งอาหารตอนนี้</button>`;
        document.getElementById('modal-body').innerHTML = h; document.getElementById('modal').style.display = 'flex';
    }

    function rem(i) { cart.splice(i, 1); updateUI(); cart.length > 0 ? openReceipt() : document.getElementById('modal').style.display = 'none'; }

    // 🚩 2. UI ส่งออเดอร์กระทะ 🍳 & บันทึกสถานะสั่งแล้ว
    async function sub() { 
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `<div class="sending-container"><div class="pulse-loader">🍳</div><div class="call-title">กำลังส่งออเดอร์งับ...</div><div class="call-sub">ออเดอร์ของอ้วนกำลังเดินทาง <br>กรุณารอสักครู่นะคะอ้วน</div></div>`;
        try { 
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'submitOrder', table:currentTable, cart:cart}) }); 
            localStorage.setItem('withu_order_active', 'true');
            modalBody.innerHTML = `<div class="sending-container"><div class="success-check">✅</div><div class="call-title">ส่งออเดอร์เรียบร้อย!</div><div class="call-sub">ได้รับออเดอร์แล้วค่ะ <br>กำลังเตรียมความอร่อยให้คุณ...</div></div>`;
            setTimeout(() => { showStatus(); cart=[]; updateUI(); }, 2000);
        } catch(e) { alert("ส่งไม่สำเร็จ กรุณาลองใหม่"); openReceipt(); }
    }

    // 🚩 3. เรียกพนักงานแบบพรีเมียม
    function callStaff() { document.getElementById('call-staff-modal').style.display = 'flex'; }
    function closeCallModal() { document.getElementById('call-staff-modal').style.display = 'none'; }
    async function sendCallRequest() {
        const modal = document.getElementById('call-modal-content'); const originalHtml = modal.innerHTML;
        modal.innerHTML = `<div class="bell-icon">⏳</div><div class="call-title">กำลังแจ้งพนักงาน...</div><div class="call-sub">กรุณารอสักครู่นะคะ</div>`;
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'callStaff', table:currentTable, reason:'ทั่วไป'}) });
            modal.innerHTML = `<div class="bell-icon">✅</div><div class="call-title">เรียบร้อยค่ะ</div><div class="call-sub">พนักงานได้รับแจ้งแล้ว <br>กำลังเดินทางไปที่โต๊ะ ${currentTable} ค่ะ</div>`;
            setTimeout(() => { closeCallModal(); modal.innerHTML = originalHtml; }, 3000);
        } catch(e) { alert("เกิดข้อผิดพลาด"); closeCallModal(); modal.innerHTML = originalHtml; }
    }

    function showStatus() {
        document.getElementById('modal').style.display='none'; 
        document.getElementById('app-header').style.display='flex';
        document.getElementById('app-content').innerHTML = `
            <div class="app-container" style="padding-top:40px; text-align:center;">
                <div class="status-card">
                    <h2 style="font-weight:800; font-size:28px; margin-bottom:10px;">ออเดอร์โต๊ะ ${currentTable}</h2>
                    <div id="queue-info" class="queue-box">กำลังคำนวณคิวของคุณ...</div>
                    <div class="status-stepper">
                        <div class="step-point" id="st-1"><div class="step-circle">1</div><div class="step-label">รับออเดอร์</div></div>
                        <div class="step-point" id="st-2"><div class="step-circle">2</div><div class="step-label">กำลังทำ</div></div>
                        <div class="step-point" id="st-3"><div class="step-circle">3</div><div class="step-label">รอเสิร์ฟ</div></div>
                        <div class="step-point" id="st-4"><div class="step-circle">4</div><div class="step-label">สำเร็จ</div></div>
                    </div>
                    <div id="stat-list" style="margin:30px 0; text-align:left; border-top:1px solid #f8fafc; padding-top:20px;"></div>
                    <div style="display:flex; justify-content:space-between; font-weight:800; font-size:20px; margin-bottom:25px; padding:0 10px;">
                        <span>ยอดรวมออเดอร์:</span><span style="color:var(--blue)">฿<span id="stat-sum-val">0</span></span>
                    </div>
                    <button class="btn-checkout" style="background:#f1f5f9; color:var(--p); width:100%; border:none; margin-bottom:10px;" onclick="location.reload()">สั่งเมนูเพิ่ม</button>
                    <button class="btn-checkout" style="background:transparent; color:var(--gray); width:100%; border:1px solid #eee;" onclick="clearSession()">ล้างข้อมูลโต๊ะ</button>
                </div>
            </div>`;
        chk(); sInterval = setInterval(chk, 5000);
    }

    function clearSession() {
        if(confirm("ต้องการล้างข้อมูลเพื่อเริ่มโต๊ะใหม่ใช่ไหมคะ?")) {
            localStorage.removeItem('withu_table');
            localStorage.removeItem('withu_order_active');
            location.href = location.pathname;
        }
    }

    async function chk() {
        try {
            const r = await fetch(API_URL + "?action=getAdminData"); const d = await r.json();
            const myOrders = d.orders.filter(o => o.table == currentTable);
            if (myOrders.length === 0) { 
                upS(4); 
                document.getElementById('queue-info').innerText = "ออเดอร์เสร็จสิ้นแล้ว"; 
                localStorage.setItem('withu_order_active', 'false');
                return; 
            }
            const uniqueTables = [...new Set(d.orders.map(o => o.table))];
            const myRank = uniqueTables.indexOf(currentTable.toString());
            const queueAhead = myRank > 0 ? myRank : 0;
            document.getElementById('queue-info').innerText = queueAhead > 0 ? `เหลืออีก ${queueAhead} คิวก่อนหน้าคุณ` : "กำลังเตรียมออเดอร์ของคุณเป็นลำดับถัดไป";
            const p = {"รับออเดอร์":1, "กำลังทำ":2, "รอเสิร์ฟ":3, "สำเร็จ":4};
            let minVal = 4; let totalSum = 0;
            myOrders.forEach(o => { 
                if (p[o.status] < minVal) minVal = p[o.status]; 
                totalSum += parseFloat(String(o.total).replace(/,/g,'')) || 0;
            });
            upS(minVal); document.getElementById('stat-sum-val').innerText = totalSum.toLocaleString();
            document.getElementById('stat-list').innerHTML = myOrders.map(o => `<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f8fafc;"><span><b>${o.qty}x</b> ${o.menu}</span><b style="color:var(--blue)">${o.status}</b></div>`).join('');
        } catch(e) {}
    }

    function upS(s) { for(let i=1;i<=4;i++) { const el = document.getElementById('st-'+i); if(el) el.classList.toggle('active',i<=s); } }
</script>
</body>
</html>
